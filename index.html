          <div style="display:flex;align-items:flex-end"><button id="sr-filter" style="padding:10px 14px;border-radius:10px;border:none;background:linear-gradient(135deg,#6366f1,#4F46E5);color:#fff;font-size:12px;font-weight:800;cursor:pointer">🔍</button></div>
        </div>
        <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
          ${[['Aaj','today'],['Kal','yesterday'],['7 Din','week'],['Is Mahine','month']].map(([l,k])=>`<button data-quick="${k}" style="padding:6px 12px;border-radius:99px;border:1.5px solid rgba(99,102,241,.25);background:rgba(99,102,241,.06);color:#4F46E5;font-size:11px;font-weight:700;cursor:pointer">${l}</button>`).join('')}

          <div style="background:linear-gradient(135deg,#6366f1,#4F46E5);border-radius:13px;padding:12px 14px;color:#fff"><div style="font-size:10px;font-weight:700;opacity:.8;margin-bottom:3px">TOTAL BILLS</div><div style="font-size:20px;font-weight:800">${bills.length}</div></div>
          <div style="background:rgba(251,191,36,.12);border:1.5px solid rgba(251,191,36,.3);border-radius:13px;padding:10px 14px"><div style="font-size:10px;font-weight:700;color:#92400e;margin-bottom:2px">💵 Cash</div><div style="font-size:16px;font-weight:800;color:#78350f">₹${cashAmt.toLocaleString('en-IN')}</div></div>

/* Shows a 4-digit PIN entry overlay.
   opts: { title, subtitle, icon, onSuccess(pin), onCancel }
   If ST.resetPin is set, validates against it.
   If ST.resetPin is NOT set, onSuccess is called with entered pin (for first-time set). */
function _showPinDialog(opts){
  /* opts:
     title, subtitle, icon  — display text
     validate: 'saved'|'none'|string  — how to check entered PIN
       'saved'  = match against ST.resetPin  (default when ST.resetPin exists)
       'none'   = accept any 4 digits, call onSuccess(pin)
       'XXXX'   = match against this specific string (for confirm-step)
     onSuccess(enteredPin) — called when PIN accepted
     onCancel()            — called when Cancel tapped
  */
  const{title='PIN Dalo',subtitle='',icon='🔐',validate,onSuccess,onCancel}=opts||{};

  /* Determine validation mode */
  const _vmode = validate !== undefined ? validate
               : (ST.resetPin ? 'saved' : 'none');

  /* BUG FIX v104: uid collision fix — Date.now() same ms mein same value deta tha.
     Global counter use karo — guaranteed unique. */
  window._pinDialogCounter = (window._pinDialogCounter||0) + 1;
  const uid = window._pinDialogCounter;

  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;z-index:9999;background:rgba(0,20,10,.88);display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box';

  ov.innerHTML=`
    <div class="pin-card-${uid}" style="background:#fff;border-radius:22px;padding:28px 24px 22px;width:100%;max-width:320px;box-shadow:0 20px 60px rgba(0,0,0,.35);animation:scaleIn .22s cubic-bezier(.16,1,.3,1);box-sizing:border-box">
      <div style="text-align:center;margin-bottom:18px">
        <div style="font-size:38px;margin-bottom:8px;line-height:1">${icon}</div>
        <div style="font-family:'Outfit',sans-serif;font-size:17px;font-weight:800;color:#1a1a1a;line-height:1.3">${title}</div>
        ${subtitle?`<div style="font-size:11px;color:#6b7280;margin-top:5px;line-height:1.45;padding:0 4px">${subtitle}</div>`:''}
      </div>

      <!-- PIN dots — scoped inside ov, no global class needed -->
      <div style="display:flex;justify-content:center;gap:16px;margin-bottom:20px">
        <div data-dot="0" style="width:16px;height:16px;border-radius:50%;background:#e5e7eb;border:2px solid #d1d5db;transition:background .12s,border-color .12s"></div>
        <div data-dot="1" style="width:16px;height:16px;border-radius:50%;background:#e5e7eb;border:2px solid #d1d5db;transition:background .12s,border-color .12s"></div>
        <div data-dot="2" style="width:16px;height:16px;border-radius:50%;background:#e5e7eb;border:2px solid #d1d5db;transition:background .12s,border-color .12s"></div>
        <div data-dot="3" style="width:16px;height:16px;border-radius:50%;background:#e5e7eb;border:2px solid #d1d5db;transition:background .12s,border-color .12s"></div>
      </div>

      <!-- Error -->
      <div data-err style="text-align:center;font-size:12px;font-weight:700;color:#EF4444;min-height:18px;margin-bottom:10px;transition:opacity .2s"></div>

      <!-- Numpad -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px">
        ${[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(k=>{
          if(k==='') return `<div style="height:52px"></div>`;
          const isDel = k==='⌫';
          return `<button data-key="${k}" style="height:52px;border-radius:12px;border:1.5px solid ${isDel?'rgba(239,68,68,.2)':'rgba(0,0,0,.08)'};background:${isDel?'rgba(239,68,68,.06)':'#f9fafb'};font-family:'Outfit',sans-serif;font-size:${isDel?'20px':'19px'};font-weight:700;color:${isDel?'#EF4444':'#111827'};cursor:pointer;transition:background .1s,transform .08s;-webkit-tap-highlight-color:transparent">${k}</button>`;
        }).join('')}
      </div>

      <div style="display:flex;gap:8px;margin-top:0">
        ${_vmode==='saved'&&ST.resetPinQ?`<button data-forgot style="flex:1;padding:12px;border-radius:12px;border:1.5px solid rgba(239,68,68,.2);background:rgba(239,68,68,.05);font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;color:#EF4444;cursor:pointer">🔑 Bhool Gaya?</button>`:''}
        <button data-cancel style="flex:1;padding:12px;border-radius:12px;border:1.5px solid rgba(0,0,0,.09);background:#f3f4f6;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;color:#6b7280;cursor:pointer">Cancel</button>
      </div>
    </div>`;

  document.body.appendChild(ov);

  let entered='';
  const card   = ov.querySelector(`.pin-card-${uid}`);
  const dots   = ov.querySelectorAll('[data-dot]');
  const errEl  = ov.querySelector('[data-err]');

  const updateDots=()=>{
    dots.forEach((d,i)=>{
      const filled = i < entered.length;
      d.style.background   = filled ? '#2563EB' : '#e5e7eb';
      d.style.borderColor  = filled ? '#1d4ed8' : '#d1d5db';
      d.style.transform    = filled ? 'scale(1.15)' : 'scale(1)';
    });
  };

  const shakeCard=()=>{
    /* BUG FIX v103: Force reflow before setting animation — warna same animation dobara trigger nahi hoti.
       card.offsetWidth read = browser ko reflow force hota hai. */
    card.style.animation='none';
    void card.offsetWidth; // force reflow
    card.style.animation='shake .4s cubic-bezier(.36,.07,.19,.97)';
    setTimeout(()=>{ card.style.animation='none'; },420);
  };

  /* BUG FIX v104: _pendingFour declaration moved UP — 'let' is not hoisted.
     resetInput uses _pendingFour so it must be declared before resetInput. */
  let _pendingFour = false;

  const resetInput=()=>{ entered=''; errEl.textContent=''; _pendingFour=false; updateDots(); };

  const handleFour=()=>{
    /* BUG FIX v103: Agar dialog pehle hi close ho chuka ho (Cancel race) toh abort karo */
    if(!document.body.contains(ov)) return;
    /* BUG FIX v103: Double-fire guard — already processing toh ignore karo */
    if(_pendingFour) return;
    _pendingFour = true;

    /* Decide pass/fail based on _vmode */
    let pass = false;
    if(_vmode==='none'){
      pass = true;
    } else if(_vmode==='saved'){
      pass = (entered === (ST.resetPin||''));
    } else {
      /* validate is a specific PIN string to match against */
      pass = (entered === String(_vmode));
    }

    if(pass){
      ov.remove();
      onSuccess&&onSuccess(entered);
    } else {
      _pendingFour = false; /* allow retry on wrong PIN */
      errEl.textContent = _vmode==='none' ? '' : '❌ Galat PIN! Dobara try karo.';
      shakeCard();
      setTimeout(resetInput, 750);
    }
  };

  ov.querySelectorAll('[data-key]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const k = btn.dataset.key;
      /* Press feedback */
      btn.style.background = k==='⌫' ? 'rgba(239,68,68,.18)' : '#e2e8f0';
      btn.style.transform  = 'scale(.93)';
      setTimeout(()=>{
        btn.style.background = k==='⌫' ? 'rgba(239,68,68,.06)' : '#f9fafb';
        btn.style.transform  = 'scale(1)';
      }, 110);

      if(k==='⌫'){
        entered = entered.slice(0,-1);
        errEl.textContent = '';
        updateDots();
        return;
      }
      if(entered.length >= 4) return;
      entered += k;
      updateDots();
      if(entered.length === 4){
        /* Small delay so last dot fills visually before action */
        setTimeout(handleFour, 120);
      }
    });
  });

  ov.querySelector('[data-cancel]').addEventListener('click',()=>{
    ov.remove();
    onCancel&&onCancel();
  });

  /* BUG FIX v102: Keyboard input support — physical/software keyboard se PIN type karo */
  const handleKeyboard=(e)=>{
    if(!document.body.contains(ov)) return; // dialog band ho gaya
    if(e.key>='0'&&e.key<='9'){
      if(entered.length>=4) return;
      entered+=e.key;
      updateDots();
      if(entered.length===4) setTimeout(handleFour,120);
    } else if(e.key==='Backspace'){
      entered=entered.slice(0,-1);
      errEl.textContent='';
      updateDots();
    } else if(e.key==='Escape'){
      ov.remove();
      onCancel&&onCancel();
    }
  };
  document.addEventListener('keydown',handleKeyboard);
  /* Cleanup keyboard listener jab dialog band ho */
  const _origRemove=ov.remove.bind(ov);
  ov.remove=()=>{ document.removeEventListener('keydown',handleKeyboard); _origRemove(); };

  /* Forgot PIN — security question recovery */
  /* BUG FIX v103: onCancelled callback pass karo — cancel pe PIN dialog wapas open hoga */
  ov.querySelector('[data-forgot]')?.addEventListener('click',()=>{
    ov.remove();
    _showForgotPin(onSuccess, ()=>{
      /* User cancelled forgot-PIN — PIN dialog wapas dikhao */
      _showPinDialog({title,subtitle,icon,validate,onSuccess,onCancel});
    });
  });

  /* Tap outside to cancel */
  ov.addEventListener('click', e=>{ if(e.target===ov){ ov.remove(); onCancel&&onCancel(); } });
}

/* ── Security Question Setup — shown after PIN set ── */
function _showSecurityQuestionSetup(onDone){
  const QUESTIONS=[

const ru2=n=>`₹${parseFloat(n||0).toFixed(2)}`;

const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
function getVillage(id){return ST.villages.find(v=>v.id===+id);}
function getShop(vid,sid){return getVillage(vid)?.shops?.find(s=>s.id===+sid);}
function getAllShops(){return ST.villages.flatMap(v=>v.shops.map(s=>({...s,villageName:v.name,villageId:v.id})));}
function pieceCost(p){return p.piecesPerBox>0?p.boxPrice/p.piecesPerBox:0;}
/* ── Session Price Helper ──
   getEffectivePrice(pid): returns session override if set, else product's saved boxPrice.
   ST.products is NEVER mutated during billing — no accidental DB saves. */
function getEffectivePrice(pid){
  const override=ST.sessionPrices?.[+pid];
  if(override!==undefined)return override;
  const p=ST.products.find(x=>x.id===+pid);
  return p?p.boxPrice:0;
}
function cartTotal(){return Object.entries(ST.cart).reduce((s,[id,bq])=>s+getEffectivePrice(+id)*bq,0);}
function cartCount(){return Object.values(ST.cart).reduce((s,q)=>s+q,0);}
function cartItems(){return Object.entries(ST.cart).map(([id,bq])=>{
  const p=ST.products.find(x=>x.id===+id);if(!p)return null;
  const ep=getEffectivePrice(+id);
  return{...p,boxPrice:ep,boxQty:+bq,amount:ep*bq};
}).filter(Boolean);}
function calcScheme(amt,items){
  const sc=ST.scheme;
  if(!sc.enabled||amt<sc.minPurchase)return{schemeApplied:false,freeProduct:null,totalGoodsValue:amt,factor:1,pieceRates:[]};
  const fp=ST.products.find(p=>p.id===sc.freeProductId);if(!fp)return{schemeApplied:false,freeProduct:null,totalGoodsValue:amt,factor:1,pieceRates:[]};
  /* Multiplier: 5000=1box, 10000=2box, 15000=3box etc */
  const multiplier=Math.floor(amt/sc.minPurchase);
  const freeBoxes=multiplier*sc.freeBoxQty;
  const fv=fp.boxPrice*freeBoxes,tg=amt+fv,f=amt/tg;
  return{schemeApplied:true,freeProduct:{id:fp.id,name:fp.name,boxQty:freeBoxes,value:fv,boxPrice:fp.boxPrice},totalGoodsValue:tg,factor:f,
    pieceRates:items.map(it=>({name:it.name,normalPieceCost:pieceCost(it),finalPieceCost:pieceCost(it)*f}))};
}

/* toYMD: Date → "YYYY-MM-DD" local */
function toYMD(d){
  const dt=new Date(d);
  const y=dt.getFullYear();
  const m=String(dt.getMonth()+1).padStart(2,"0");
  const dy=String(dt.getDate()).padStart(2,"0");
  return`${y}-${m}-${dy}`;
}
/* fromYMD: "YYYY-MM-DD" → midnight timestamp */
function fromYMD(s){
  if(!s)return null;
  const [y,m,d]=s.split("-").map(Number);
  return new Date(y,m-1,d).getTime();
}
/* dateInRange: check if bill/expense date is in range (from, to are "YYYY-MM-DD" or "") */
function dateInRange(ts,from,to){
  const d=new Date(ts);
  const dMid=new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();
  if(from){const fMid=fromYMD(from);if(dMid<fMid)return false;}
  if(to){const tMid=fromYMD(to);if(dMid>tMid)return false;}
  return true;
}
/* formatDateRange: show human readable range label */
function formatDateRangeLabel(from,to){
  const fD=from?new Date(fromYMD(from)).toLocaleDateString("en-IN",{day:"2-digit",month:"short"}):"";
  const tD=to?new Date(fromYMD(to)).toLocaleDateString("en-IN",{day:"2-digit",month:"short"}):"";
  if(from&&to&&from===to)return fD;
  if(from&&to)return`${fD} – ${tD}`;
  if(from)return`${fD} se`;
  if(to)return`– ${tD} tak`;
  return"";
}

/* bindDateFilter: attach events for the date filter widget */
function bindDateFilter(prefix,onChange){
  const applyBtn=document.getElementById(`df_${prefix}_apply`);
  const clrBtn=document.getElementById(`df_${prefix}_clr`);
  if(applyBtn){
    applyBtn.addEventListener("click",()=>{
      const f=document.getElementById(`df_${prefix}_from`)?.value||"";
      const t=document.getElementById(`df_${prefix}_to`)?.value||"";
      ST[prefix+"DateFrom"]=f;ST[prefix+"DateTo"]=t;
      if(onChange)onChange();else render();
    });
  }
  if(clrBtn){
    clrBtn.addEventListener("click",()=>{
      ST[prefix+"DateFrom"]="";ST[prefix+"DateTo"]="";
      if(onChange)onChange();else render();
    });
  }
  /* Quick period pills — for profit/expense/dash */
  document.querySelectorAll(`[data-dfq^="${prefix}_"]`).forEach(el=>{
    el.addEventListener("click",()=>{
      const period=el.dataset.dfq.replace(prefix+"_","");
      ST[prefix+"Period"]=period;
      ST[prefix+"DateFrom"]="";ST[prefix+"DateTo"]="";
      if(onChange)onChange();else render();
    });
  });
  document.querySelector(`[data-dfclear="${prefix}"]`)?.addEventListener("click",()=>{
    ST[prefix+"DateFrom"]="";ST[prefix+"DateTo"]="";
    if(onChange)onChange();else render();
  });
  /* Also bind live date inputs (no button needed for single-date use) */
  const fromInp=document.getElementById(`df_${prefix}_from`);
  const toInp=document.getElementById(`df_${prefix}_to`);
  if(fromInp&&toInp){
    fromInp.addEventListener("change",()=>{
      /* if both filled, auto-apply */
      if(toInp.value||!fromInp.value){
        ST[prefix+"DateFrom"]=fromInp.value;
        ST[prefix+"DateTo"]=toInp.value;
        if(onChange)onChange();else render();
      }
    });
    toInp.addEventListener("change",()=>{
      ST[prefix+"DateFrom"]=fromInp.value;
      ST[prefix+"DateTo"]=toInp.value;
      if(onChange)onChange();else render();
    });
  }
}

function render(){clearTimeout(_rt);_rt=setTimeout(_r,4);}
function _r(){
  _hdr();
  const body=document.getElementById("body");if(!body)return;
  const T=ST.tab;
  /* FIX Bug#25: Reset bulk mode when leaving history tab */
  if(T!=="history"&&ST.historyBulk){ST.historyBulk=false;ST.historySelected=[];}
  /* BUG FIX: Always clear stale selection when tab changes */
  if(T!=="history")ST.historySelected=[];
  /* FIX: Clear recycle bin bulk mode when navigating away */
  if(T!=="recyclebin"){ST.rbBulkMode=false;ST.rbSelected=[];}
  if(T==="billing")  {
    /* FIX v86-3-3: Settings se wapas aaye toh bill + cart + selection restore karo */
    if(ST._savedShowBill&&!ST.showBill){
      ST.showBill=ST._savedShowBill;
      if(ST._savedCart)ST.cart=ST._savedCart;
      if(ST._savedSessionPrices)ST.sessionPrices=ST._savedSessionPrices;
      if(ST._savedSelVillageId)ST.selVillageId=ST._savedSelVillageId;
      if(ST._savedSelShopId)ST.selShopId=ST._savedSelShopId;
      ST._savedShowBill=null;ST._savedCart=null;ST._savedSessionPrices=null;
      ST._savedSelVillageId=null;ST._savedSelShopId=null;
    }
    body.innerHTML=rBill();  bBill();
  }
  if(T==="products") {body.innerHTML=rProducts();bProducts();}
  if(T==="villages") {body.innerHTML=rVillages();bVillages();}
  if(T==="dashboard"){body.innerHTML=rDash();   bDash();}
  if(T==="profit")   {body.innerHTML=rProfit(); bProfit();}
  if(T==="expense")  {body.innerHTML=rExpense();bExpense();}
  if(T==="udhari")   {body.innerHTML=rUdhari(); bUdhari();}
  if(T==="ledger")   {body.innerHTML=rLedger(); bLedger();}
  if(T==="walkin-khata"){body.innerHTML=rWalkInKhata(); bWalkInKhata();}
  if(T==="history")  {body.innerHTML=rHistory();bHistory();}
  if(T==="stock")    {body.innerHTML=rStock();  bStock();}
  if(T==="partywise"){body.innerHTML=rPartywise();bPartywise();}
  if(T==="settings")     {try{body.innerHTML=rSets();}catch(e){console.error("rSets error:",e);body.innerHTML=`<div class="page"><div class="pk">APP</div><div class="ph">Settings</div><div style="background:#fff;border-radius:16px;padding:18px;margin-top:10px;border:1.5px solid rgba(239,68,68,.2)"><div style="font-size:22px;margin-bottom:8px">⚠️</div><div style="font-weight:700;color:#DC2626;margin-bottom:6px">Settings load nahi hua</div><div style="font-size:12px;color:#666;margin-bottom:14px">Error: ${e.message||"Unknown"}</div><button onclick="ST.setPage='main';render();" style="background:#00A650;color:#fff;border:none;border-radius:11px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer">🔄 Dobara Try Karo</button></div></div>`;}try{bSets();}catch(e){console.error("bSets error:",e);}}
  if(T==="paisasummary"){body.innerHTML=rPaisaSummary();bPaisaSummary();}
  if(T==="sheets")    {body.innerHTML=rSheets();  bSheets();}
  if(T==="recyclebin"){body.innerHTML=rRecycleBin();bRecycleBin();}
  _ovs();
  document.querySelectorAll(".nb").forEach(b=>b.classList.toggle("on",b.dataset.tab===T));
}
function _hdr(){
  const now=new Date();
  const hdEl=document.getElementById("hd");
  if(hdEl)hdEl.textContent=now.toLocaleDateString("en-IN",{weekday:"short",day:"2-digit",month:"short"});
  /* BUG FIX v85: Header mein dynamic business name update */
  const hdrBiz=document.getElementById("hdr_bizname");
  if(hdrBiz){const bn=(ST.profile?.bizName||ST.businessName||"SONEY EXCELLENT").toUpperCase();hdrBiz.textContent=bn;}
  const td=(ST.bills||[]).filter(b=>new Date(b.date).toDateString()===todS()&&!b.returned).length;
  const hcEl=document.getElementById("hc");
  if(hcEl)hcEl.textContent=`● ${td} bills today`;
}

/* ══════════════ BILLING ══════════════ */
function rBill(){
  const village=ST.selVillageId?getVillage(ST.selVillageId):null;
  const shop=ST.selVillageId&&ST.selShopId?getShop(ST.selVillageId,ST.selShopId):null;
  const filt=ST.products.filter(p=>p.name.toLowerCase().includes(ST.search.toLowerCase()));
  const total=cartTotal(),cnt=cartCount(),sc=ST.scheme;
  const hit=sc.enabled&&total>=sc.minPurchase,near=sc.enabled&&total>0&&total<sc.minPurchase;
  /* Multiplier strip values */
  const _scMult=hit?Math.floor(total/sc.minPurchase):0;
  const _scFreeBoxes=_scMult*(sc.freeBoxQty||1);
  const _scNextSlab=hit?((_scMult+1)*sc.minPurchase):sc.minPurchase;
  const _scNextNeed=_scNextSlab-total;
  const _scFp=ST.products.find(p=>p.id===sc.freeProductId);
  const cartItms=cartItems();
  const wm=ST.walkMode; /* walk-in mode */

  /* autocomplete suggestions */
  const wq=(ST.walkShopName||"").toLowerCase().trim();
  const suggestions=wq.length>=1?(ST.walkingCustomers||[]).filter(c=>c.shopName.toLowerCase().includes(wq)).slice(0,5):[];

  return`<div id="bsh">
    <div id="btop">

      <!-- Walk-in Mode Toggle -->
      <div style="display:flex;align-items:center;gap:8px;padding:7px 12px 0">
        <div id="walk_toggle" style="flex:1;display:flex;align-items:center;gap:8px;background:${wm?"rgba(245,158,11,.1)":"rgba(0,166,80,.06)"};border:1.5px solid ${wm?"rgba(245,158,11,.3)":"rgba(0,166,80,.18)"};border-radius:11px;padding:8px 12px;cursor:pointer;transition:all .2s">
          <span style="font-size:16px">${wm?"🚶":"🏘️"}</span>
          <div style="flex:1">
            <div style="font-size:11px;font-weight:800;color:${wm?"#92400E":"var(--pri2)"}">${wm?"WALK-IN MODE":"GAON/SHOP MODE"}</div>
            <div style="font-size:9px;color:var(--t3);margin-top:1px">${wm?"Walk-in customer billing":"Gaon/Shop billing"}</div>
          </div>
          <div style="background:${wm?"#F59E0B":"var(--pri)"};color:#fff;border-radius:99px;font-size:9px;font-weight:800;padding:2px 8px">${wm?"ON":"OFF"}</div>
        </div>
      </div>

      ${wm?`
      <!-- WALK-IN Customer Fields -->
      <div style="padding:8px 12px 2px;position:relative">
        <div style="font-size:10px;font-weight:700;color:#92400E;letter-spacing:1px;margin-bottom:6px">🚶 WALK-IN CUSTOMER</div>

        <!-- Shop Name (Required) -->
        <div style="position:relative;margin-bottom:7px">
          <input id="walk_shop" class="inp" placeholder="🏪 Shop / Customer Name *" value="${esc(ST.walkShopName||"")}"
            autocomplete="off"
            style="font-size:13px;font-weight:700;border-color:${ST.walkShopName?"rgba(0,166,80,.4)":"rgba(245,158,11,.4)"};background:${ST.walkShopName?"#fff":"rgba(245,158,11,.04)"}">
          <div style="font-size:9px;color:${ST.walkShopName?"var(--pri2)":"var(--acc)"};margin-top:3px;font-weight:700">
            ${ST.walkShopName?"✓ Required field filled":"⚠️ Required — bill print ke liye zaroori"}
          </div>
          <!-- Autocomplete suggestions — JS se dynamically inject hoti hain -->
        </div>


        <!-- Mobile (Optional) + Contact Picker -->
        <div style="display:flex;gap:7px;margin-bottom:5px;align-items:center">
          <input id="walk_mob" class="inp" type="tel" placeholder="📞 Mobile (optional)" value="${esc(ST.walkMobile||"")}"
            inputmode="numeric" style="font-size:13px;flex:1;margin-bottom:0">
          <button id="walk_contact_pick" type="button" class="btn rip" style="flex-shrink:0;background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;border:none;border-radius:11px;padding:10px 13px;font-size:18px;cursor:pointer;line-height:1" title="Contact se number chuniye">📒</button>
        </div>

        <!-- Previous bills of this customer -->
        ${ST.walkShopName&&(ST.walkingCustomers||[]).find(c=>c.shopName.toLowerCase()===ST.walkShopName.toLowerCase())?`
        <div style="background:rgba(0,166,80,.06);border:1px solid rgba(0,166,80,.18);border-radius:9px;padding:7px 10px;font-size:10px;font-weight:600;color:var(--pri2)">
          📋 Pehle ka customer! ${(()=>{const c=(ST.walkingCustomers||[]).find(x=>x.shopName.toLowerCase()===ST.walkShopName.toLowerCase());return c?`${c.billCount||0} bills · Last visit: ${fmtD(c.lastDate)}`:"";})()}
        </div>`:""}
      </div>`:`
      <!-- Normal Gaon/Shop mode — Shop pehle, Village auto-set -->
      <div class="vs-bar">
        <div class="vs-btn ${shop?"selected":""} rip" id="ssel" style="flex:2">
          <span class="vs-ic">🏪</span>
          <div class="vs-txt">
            <div class="vs-label">SHOP</div>
            <div class="vs-val ${shop?"":"vs-val-ph"}">${shop?esc(shop.name):"Shop search karo..."}</div>
          </div>
          <span class="vs-arr">▾</span>
        </div>
        <div class="vs-btn ${village?"selected":""}" id="vsel" style="flex:1;${shop?"cursor:pointer":"opacity:.5;pointer-events:none"}">
          <span class="vs-ic">🏘️</span>
          <div class="vs-txt">
            <div class="vs-label">GAON</div>
            <div class="vs-val ${village?"":"vs-val-ph"}" style="font-size:10px">${village?esc(village.name):"Auto"}</div>
          </div>
          ${shop?'<span class="vs-arr">▾</span>':""}
        </div>
      </div>
      ${shop?`<div class="shop-strip">
        <div class="ss-av">🏪</div>
        <div style="flex:1"><div class="ss-name">${esc(shop.name)}</div><div class="ss-info">👤 ${esc(shop.ownerName)} · 📞 ${esc(shop.mobile)}</div></div>
        ${(()=>{const cnt=Object.keys(ST.sessionPrices||{}).length;return cnt>0?`<div style="background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.4);border-radius:99px;padding:2px 8px;font-size:9px;font-weight:800;color:#92400E;white-space:nowrap">💰 ${cnt} Wholesale Rate</div>`:"";})()}
      </div>`:""}`}

      ${hit?`<div class="astrip as-green">🎉 Scheme! ${_scFreeBoxes} Box FREE · ${_scFp?esc(_scFp.name):"Product"} · +${rup(_scNextNeed)} pe ${_scMult+1} slab</div>`:""}
      ${near?`<div class="astrip as-amber">⚡ ${rup(sc.minPurchase-total)} aur chahiye scheme ke liye <span>${rup(total)}/${rup(sc.minPurchase)}</span></div>`:""}
      <div class="sbar"><input id="ps" placeholder="🔍 Product search..." value="${esc(ST.search)}"></div>
    </div>
    <div id="psc">
      ${(!wm&&!shop)?`<div class="bill-empty">
        <span class="eic">🏪</span>
        <div style="font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;font-size:17px;font-weight:800;color:var(--t1);margin-bottom:6px">Shop Select Karo</div>
        <div style="font-size:12px;color:var(--t3)">Upar SHOP pe tap karo — naam search karo, village auto-set ho jaayega</div>
      </div>`:""}
      ${(wm||shop)?`
      <div class="prod-grid" id="pgrid">
        ${filt.map(p=>{const bq=ST.cart[p.id]||0;const liveStock=Math.max(0,(p.stock||0)-bq);const stockLow=liveStock<=5;return`
        <div class="pgc ${bq>0?"in-cart":""}" data-pid="${p.id}">
          <div class="pgc-img">
            ${p.emoji}
            ${bq>0?`<div class="pgc-badge">${bq}</div>`:""}
          </div>
          <div class="pgc-body">
            <div class="pgc-name" data-namepid="${p.id}">${esc(p.name)}</div>
            <!-- Box rate — always visible, highlights when session override active -->
            ${(()=>{const ep=getEffectivePrice(p.id);const isOverride=ST.sessionPrices&&ST.sessionPrices[p.id]!==undefined;return`<div data-ratedisp="${p.id}" style="font-size:11px;font-weight:800;${isOverride?"color:#D97706;background:rgba(245,158,11,.12);border-radius:5px;padding:1px 5px;margin-bottom:2px;display:inline-block;":"color:var(--pri);margin-bottom:2px;"}">${isOverride?"✏️ ":""}₹${ep}</div>`})()}
            <div class="pgc-piece" data-piecepid="${p.id}" style="margin-bottom:4px"><span class="pgc-piece-val">${ru2(p.piecesPerBox>0?getEffectivePrice(p.id)/p.piecesPerBox:0)}</span>/pc <span style="color:var(--t4);font-size:7px">· hold=rate</span></div>
            <div class="pgc-live-stock" data-stock-pid="${p.id}" style="font-size:8px;font-weight:700;padding:2px 4px;border-radius:5px;margin-bottom:4px;display:inline-block;${liveStock===0?"background:rgba(239,68,68,.12);color:var(--err)":stockLow?"background:rgba(245,158,11,.12);color:#92400E":"background:rgba(0,166,80,.08);color:var(--pri2)"}">
              ${liveStock===0?"❌ Out":`📦 ${liveStock}`}
            </div>
            <!-- INLINE STEPPER -->
            ${liveStock===0&&bq===0
              ? `<div class="pgc-oos-btn" data-oospid="${p.id}">❌ Out of Stock</div>`
              : bq>0
                ? `<div class="pgc-stepper" data-spid="${p.id}">
                    <button class="pgc-step-btn pgc-step-minus" data-smin="${p.id}">−</button>
                    <input class="pgc-step-val" type="number" inputmode="numeric" min="0" data-sqty="${p.id}" value="${bq}">
                    <button class="pgc-step-btn pgc-step-plus" data-sadd="${p.id}">+</button>
                  </div>`
                : `<button class="pgc-add-btn" data-sadd="${p.id}">+ Add</button>`
            }
          </div>
        </div>`}).join("")}
      </div>
      `:""}
    </div>
    ${cnt>0?`<div id="cbar">
      <div class="cart-items-preview">
        <div class="cip-row">${cartItms.map(i=>`<div class="cip-chip">${i.emoji} ${i.boxQty}</div>`).join("")}</div>
        <div class="ctot" id="ctotval">${rup(total)}</div>
      </div>
      <button class="bbtn rip" id="bn">Bill Banao →</button>
    </div>`:""}
  </div>`;
}

function bBill(){
  document.getElementById("ps")?.addEventListener("input",e=>{
    ST.search=e.target.value;
    /* PERF FIX: render() ko debounce karo — har keypress pe full re-render nahi */
    clearTimeout(window._searchRT);
    window._searchRT=setTimeout(()=>render(),80);
  });
  /* Shop pehle — village auto-set hoga */
  document.getElementById("ssel")?.addEventListener("click",()=>_pickShop());
  /* Village badge — sirf tab clickable jab shop select ho (change village manually) */
  document.getElementById("vsel")?.addEventListener("click",()=>{if(ST.selShopId)_pickVillage();});

  /* Walk-in mode toggle */
  document.getElementById("walk_toggle")?.addEventListener("click",()=>{
    ST.walkMode=!ST.walkMode;
    if(ST.walkMode){ST.selVillageId=null;ST.selShopId=null;}
    ST.cart={};ST.sessionPrices={};render();
  });

  /* Walk-in shop name input — keyboard ek baar click karne ke baad tab/blur pe band nahi hogi */
  const walkShopEl=document.getElementById("walk_shop");
  if(walkShopEl){
    /* render() ke baad bhi focus/cursor position preserve karna */
    let _walkFocused=false;
    walkShopEl.addEventListener("focus",()=>{ _walkFocused=true; });
    walkShopEl.addEventListener("input",e=>{
      ST.walkShopName=e.target.value;
      /* Suggestions update ke liye sirf suggestions area re-render karo, pura render nahi */
      const wq=(ST.walkShopName||"").toLowerCase().trim();
      const suggestions=wq.length>=1?(ST.walkingCustomers||[]).filter(c=>c.shopName.toLowerCase().includes(wq)).slice(0,5):[];
      /* Suggestion dropdown update */
      let sugBox=document.getElementById("walk_suggest_box");
      if(suggestions.length>0){
        const html=suggestions.map(c=>`<div class="walk-suggest rip" data-suggest="${esc(c.shopName)}" data-smob="${esc(c.mobile||"")}" style="padding:9px 12px;border-bottom:1px solid rgba(0,166,80,.07);cursor:pointer;display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-size:12px;font-weight:700;color:var(--t1)">${esc(c.shopName)}</div>
            <div style="font-size:10px;color:var(--t3)">${c.mobile?`📞 ${c.mobile}`:""} · ${c.billCount||0} bills</div>
          </div>
          <div style="font-size:10px;font-weight:700;color:var(--pri2)">→</div>
        </div>`).join("");
        if(!sugBox){
          sugBox=document.createElement("div");
          sugBox.id="walk_suggest_box";
          sugBox.style.cssText="position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid rgba(0,166,80,.25);border-radius:11px;box-shadow:0 6px 20px rgba(0,80,30,.12);z-index:50;overflow:hidden;margin-top:3px";
          walkShopEl.parentElement.style.position="relative";
          walkShopEl.parentElement.appendChild(sugBox);
        }
        sugBox.innerHTML=html;
        /* Suggestion click listeners */
        sugBox.querySelectorAll(".walk-suggest").forEach(el=>el.addEventListener("mousedown",e=>{
          e.preventDefault(); /* blur ko rokne ke liye */
          ST.walkShopName=el.dataset.suggest;
          ST.walkMobile=el.dataset.smob||"";
          walkShopEl.value=ST.walkShopName;
          if(sugBox)sugBox.remove();
          walkShopEl.focus();
        }));
      } else {
        if(sugBox)sugBox.remove();
      }
    });
    /* Blur pe sirf suggestions band karo, keyboard nahi */
    walkShopEl.addEventListener("blur",()=>{
      _walkFocused=false;
      setTimeout(()=>{
        const sugBox=document.getElementById("walk_suggest_box");
        if(sugBox)sugBox.remove();
      },200);
    });
  }
  /* Walk-in mobile input */
  document.getElementById("walk_mob")?.addEventListener("input",e=>{ST.walkMobile=e.target.value;});

  /* Walk-in Contact Picker button */
  document.getElementById("walk_contact_pick")?.addEventListener("click", async ()=>{
    const btn=document.getElementById("walk_contact_pick");
    if(!("contacts" in navigator && "ContactsManager" in window)){
      _showToast("⚠️ Is browser/device mein Contact Picker support nahi — number manually type karo","#F59E0B");
      document.getElementById("walk_mob")?.focus();
      return;
    }
    try{
      btn.textContent="⏳";btn.disabled=true;
      const contacts=await navigator.contacts.select(["name","tel"],{multiple:false});
      if(contacts&&contacts.length>0){
        const contact=contacts[0];
        const rawNum=(contact.tel||[])[0]||"";
        const cleaned=rawNum.replace(/\D/g,"").slice(-10);
        if(cleaned.length>=10){
          const inp=document.getElementById("walk_mob");
          if(inp){
            inp.value=cleaned;
            ST.walkMobile=cleaned;
            inp.style.border="2px solid var(--pri)";
            setTimeout(()=>inp.style.border="",2000);
          }
          /* Contact ka naam hamesha update karo (number change pe naam bhi badlo) */
          const nameInp=document.getElementById("walk_shop");
          if(nameInp&&contact.name?.[0]){
            nameInp.value=contact.name[0];
            ST.walkShopName=contact.name[0];
            nameInp.style.border="2px solid var(--pri)";
            setTimeout(()=>nameInp.style.border="",2000);
          }
          _showToast("✅ Contact se number add ho gaya!","#00A650");
        } else {
          _showToast("⚠️ Valid number nahi mila — manually type karo","#F59E0B");
          document.getElementById("walk_mob")?.focus();
        }
      }
    }catch(err){
      if(err.name!=="AbortError"){_showToast("❌ Contact access nahi ho saka","#EF4444");}
    }finally{
      if(btn){btn.textContent="📒";btn.disabled=false;}
    }
  });

  /* Autocomplete suggestion tap (for rendered suggestions in HTML) */
  document.querySelectorAll(".walk-suggest").forEach(el=>el.addEventListener("mousedown",e=>{
    e.preventDefault();
    ST.walkShopName=el.dataset.suggest;
    ST.walkMobile=el.dataset.smob||"";
    const ws=document.getElementById("walk_shop");
    if(ws){ws.value=ST.walkShopName;ws.focus();}
  }));

  // Card tap → +1 add to cart (stepper/add-btn/rate-box tap se block)
  document.querySelectorAll(".pgc").forEach(c=>{
    c.addEventListener("click",e=>{
      if(e.target.closest(".pgc-qr-box"))return;
      if(e.target.closest(".pgc-stepper"))return;
      if(e.target.closest(".pgc-add-btn"))return;
      if(e.target.closest(".pgc-oos-btn"))return;
      if(!ST.walkMode&&(!ST.selVillageId||!ST.selShopId))return;
      const pid=+c.dataset.pid;
      const prod=ST.products.find(p=>p.id===pid);
      if(!prod)return;
      const liveStock=Math.max(0,(prod.stock||0)-(ST.cart[pid]||0));
      if(liveStock<=0){_showToast("❌ Stock khatam!","#EF4444");return;}
      ST.cart[pid]=(ST.cart[pid]||0)+1;
      const rc=c.getBoundingClientRect();
      flyParticle(prod.emoji||"🍦",rc.left+rc.width/2,rc.top+20);
      dbSave();renderCartOnly();
    });
  });

  // STEPPER: + Add button (qty=0 state)
  document.querySelectorAll(".pgc-add-btn").forEach(el=>{
    el.addEventListener("click",e=>{
      e.stopPropagation();
      if(!ST.walkMode&&(!ST.selVillageId||!ST.selShopId))return;
      const pid=+el.dataset.sadd;
      const prod=ST.products.find(p=>p.id===pid);
      if(!prod)return;
      const liveStock=Math.max(0,(prod.stock||0)-(ST.cart[pid]||0));
      if(liveStock===0){_showToast("❌ Stock nahi hai!","#EF4444");return;}
      ST.cart[pid]=(ST.cart[pid]||0)+1;
      dbSave();
      flyParticle(prod.emoji||"🍦",e.clientX,e.clientY);
      renderCartOnly();
    });
  });

  // STEPPER: + button (qty>0 state)
  document.querySelectorAll(".pgc-step-plus").forEach(el=>{
    el.addEventListener("click",e=>{
      e.stopPropagation();
      if(!ST.walkMode&&(!ST.selVillageId||!ST.selShopId))return;
      const pid=+el.dataset.sadd;
      const prod=ST.products.find(p=>p.id===pid);
      if(!prod)return;
      const liveStock=Math.max(0,(prod.stock||0)-(ST.cart[pid]||0));
      if(liveStock===0){_showToast("❌ Stock khatam!","#EF4444");return;}
      ST.cart[pid]=(ST.cart[pid]||0)+1;
      dbSave();flyParticle(prod.emoji||"🍦",e.clientX,e.clientY);renderCartOnly();
    });
  });

  // STEPPER: − button
  document.querySelectorAll(".pgc-step-minus").forEach(el=>{
    el.addEventListener("click",e=>{
      e.stopPropagation();
      if(!ST.walkMode&&(!ST.selVillageId||!ST.selShopId))return;
      const pid=+el.dataset.smin;
      if(!ST.cart[pid])return;
      ST.cart[pid]--;
      if(ST.cart[pid]<=0)delete ST.cart[pid];
      dbSave();renderCartOnly();
    });
  });

  // STEPPER: middle input — direct qty edit (keyboard inline)
  document.querySelectorAll(".pgc-step-val").forEach(inp=>{
    inp.addEventListener("click",e=>e.stopPropagation());
    inp.addEventListener("focus",e=>{e.stopPropagation();inp.select();});
    inp.addEventListener("change",e=>{
      e.stopPropagation();
      const pid=+inp.dataset.sqty;
      let v=parseInt(inp.value)||0;
      if(v<0)v=0;
      const prod=ST.products.find(p=>p.id===pid);
      const maxStock=prod?Math.max(0,(prod.stock||0)):9999;
      if(v>maxStock){v=maxStock;_showToast("❌ Stock khatam!","#EF4444");}
      if(v<=0){delete ST.cart[pid];}else{ST.cart[pid]=v;}
      inp.value=v||"";
      dbSave();renderCartOnly();
    });
    inp.addEventListener("keydown",e=>{
      if(e.key==="Enter"){inp.blur();}
    });
  });

  // LONG PRESS on card → open price editor
  document.querySelectorAll(".pgc").forEach(c=>{
    let _lpt=null,_lpMoved=false,_lpFired=false,_lpX=0,_lpY=0;
    c.addEventListener("pointerdown",e=>{
      if(e.target.closest(".pgc-stepper")||e.target.closest(".pgc-add-btn")||e.target.closest(".pgc-oos-btn"))return;
      _lpMoved=false;
      _lpFired=false;
      _lpX=e.clientX;
      _lpY=e.clientY;
      _lpt=setTimeout(()=>{
        if(_lpMoved)return;
        if(!ST.walkMode&&(!ST.selVillageId||!ST.selShopId))return;
        const pid=+c.dataset.pid;
        const prod=ST.products.find(p=>p.id===pid);
        if(!prod)return;
        _lpFired=true; // mark that long press triggered — block next click
        _inlineRateEdit(pid,prod,c);
      },500);
    });
    // 8px threshold — finger ki microscopic trembling se cancel na ho
    c.addEventListener("pointermove",e=>{
      const dx=e.clientX-_lpX, dy=e.clientY-_lpY;
      if(dx*dx+dy*dy>64){_lpMoved=true;clearTimeout(_lpt);}
    });
    c.addEventListener("pointerup",  ()=>clearTimeout(_lpt));
    c.addEventListener("pointercancel",()=>{clearTimeout(_lpt);_lpFired=false;});
    // Block the click event that fires after long press — prevents accidental +1
    c.addEventListener("click",e=>{
      if(_lpFired){
        _lpFired=false;
        e.stopImmediatePropagation();
        e.preventDefault();
        return;
      }
    },true); // capture phase — runs before card's own click handler
  });

  document.getElementById("bn")?.addEventListener("click",_openBill);
}

/* Lightweight cart update without full re-render */
function renderCartOnly(){
  const total=cartTotal(),cnt=cartCount(),cartItms=cartItems();
  ST.products.forEach(p=>{
    const card=document.querySelector(`.pgc[data-pid="${p.id}"]`);if(!card)return;
    const bq=ST.cart[p.id]||0;
    const liveStock=Math.max(0,(p.stock||0)-bq);
    const stockLow=liveStock<=5;
    card.classList.toggle("in-cart",bq>0);
    const nameEl=card.querySelector(".pgc-name");
    if(nameEl)nameEl.style.color=bq>0?"var(--pri2)":"var(--t1)";
    // Badge
    let badge=card.querySelector(".pgc-badge");
    if(bq>0){if(!badge){badge=document.createElement("div");badge.className="pgc-badge";card.querySelector(".pgc-img").appendChild(badge);}badge.textContent=bq;}
    else if(badge)badge.remove();
    // Live stock update
    const stockEl=card.querySelector(`[data-stock-pid="${p.id}"]`);
    if(stockEl){
      stockEl.textContent=liveStock===0?"❌ Out":`📦 ${liveStock}`;
      stockEl.style.background=liveStock===0?"rgba(239,68,68,.12)":stockLow?"rgba(245,158,11,.12)":"rgba(0,166,80,.08)";
      stockEl.style.color=liveStock===0?"var(--err)":stockLow?"#92400E":"var(--pri2)";
    }
    // QTY stepper update
    const stepperEl=card.querySelector(`.pgc-stepper[data-spid="${p.id}"]`);
    const addBtn=card.querySelector(`.pgc-add-btn[data-sadd="${p.id}"]`);
    const oosBtn=card.querySelector(`.pgc-oos-btn[data-oospid="${p.id}"]`);
    const body=card.querySelector(".pgc-body");
    if(body){
      // OOS = stock is 0 AND nothing in cart (if in cart, show stepper so user can remove)
      const isOOS=(p.stock||0)===0&&bq===0;
      if(isOOS){
        // Out of stock — show OOS pill
        if(stepperEl)stepperEl.remove();
        if(addBtn)addBtn.remove();
        if(!oosBtn){const d=document.createElement("div");d.className="pgc-oos-btn";d.dataset.oospid=p.id;d.textContent="❌ Out of Stock";body.appendChild(d);}
      } else if(bq>0){
        // Show stepper (qty − val +)
        if(addBtn)addBtn.remove();
        if(oosBtn)oosBtn.remove();
        if(stepperEl){
          const sq=stepperEl.querySelector(`[data-sqty="${p.id}"]`);
          if(sq&&document.activeElement!==sq){sq.value=bq;}
        } else {
          const s=document.createElement("div");s.className="pgc-stepper";s.setAttribute("data-spid",String(p.id));
          s.innerHTML=`<button class="pgc-step-btn pgc-step-minus" data-smin="${p.id}">−</button><input class="pgc-step-val" type="number" inputmode="numeric" min="0" data-sqty="${p.id}" value="${bq}"><button class="pgc-step-btn pgc-step-plus" data-sadd="${p.id}">+</button>`;
          body.appendChild(s);
          const sqInp=s.querySelector(`[data-sqty]`);
          sqInp.addEventListener("click",e=>e.stopPropagation());
          sqInp.addEventListener("focus",e=>{e.stopPropagation();sqInp.select();});
          sqInp.addEventListener("change",e=>{
            e.stopPropagation();
            const pid2=+sqInp.dataset.sqty;
            let v=parseInt(sqInp.value)||0;if(v<0)v=0;
            const prod2=ST.products.find(x=>x.id===pid2);
            const mx=prod2?Math.max(0,(prod2.stock||0)):9999;
            if(v>mx){v=mx;_showToast("❌ Stock khatam!","#EF4444");}
            if(v<=0){delete ST.cart[pid2];}else{ST.cart[pid2]=v;}
            sqInp.value=v||"";
            dbSave();renderCartOnly();
          });
          sqInp.addEventListener("keydown",e=>{if(e.key==="Enter")sqInp.blur();});
          s.querySelector(`[data-smin]`).addEventListener("click",e=>{
            e.stopPropagation();
            const pid2=+e.currentTarget.dataset.smin;
            if(!ST.cart[pid2])return;
            ST.cart[pid2]--;
            if(ST.cart[pid2]<=0)delete ST.cart[pid2];
            dbSave();renderCartOnly();
          });
          s.querySelector(`[data-sadd]`).addEventListener("click",e=>{
            e.stopPropagation();
            const pid2=+e.currentTarget.dataset.sadd;
            const prod2=ST.products.find(x=>x.id===pid2);
            if(!prod2)return;
            const ls=Math.max(0,(prod2.stock||0)-(ST.cart[pid2]||0));
            if(ls===0){_showToast("❌ Stock khatam!","#EF4444");return;}
            ST.cart[pid2]=(ST.cart[pid2]||0)+1;
            dbSave();flyParticle(prod2.emoji||"🍦",e.clientX,e.clientY);renderCartOnly();
          });
        }
      } else {
        // bq===0, stock available — show "+ Add" button
        if(stepperEl)stepperEl.remove();
        if(oosBtn)oosBtn.remove();
        if(!addBtn){
          const b=document.createElement("button");b.className="pgc-add-btn";b.dataset.sadd=p.id;b.innerHTML="+ Add";
          body.appendChild(b);
          b.addEventListener("click",e=>{
            e.stopPropagation();
            const pid2=+b.dataset.sadd;
            const prod2=ST.products.find(x=>x.id===pid2);
            if(!prod2)return;
            const ls=Math.max(0,(prod2.stock||0)-(ST.cart[pid2]||0));
            if(ls===0){_showToast("❌ Stock nahi hai!","#EF4444");return;}
            ST.cart[pid2]=(ST.cart[pid2]||0)+1;
            dbSave();flyParticle(prod2.emoji||"🍦",e.clientX,e.clientY);renderCartOnly();
          });
        }
      }
    }
    // Rate display update — always show current rate, highlight if overridden
    const rateDisp=card.querySelector(`[data-ratedisp="${p.id}"]`);
    if(rateDisp){
      const hasOverride=ST.sessionPrices?.[p.id]!==undefined;
      const ep=getEffectivePrice(p.id);
      rateDisp.textContent=(hasOverride?"✏️ ":"")+"₹"+ep;
      // Piece rate update
      const pieceDisp=card.querySelector(`[data-piecepid="${p.id}"] .pgc-piece-val`);
      if(pieceDisp){
        const pc=p.piecesPerBox>0?ep/p.piecesPerBox:0;
        pieceDisp.textContent=`₹${parseFloat(pc||0).toFixed(2)}`;
      }
      rateDisp.style.display="";
      if(hasOverride){
        rateDisp.style.color="#D97706";
        rateDisp.style.background="rgba(245,158,11,.12)";
        rateDisp.style.borderRadius="5px";
        rateDisp.style.padding="1px 5px";
        rateDisp.style.fontWeight="800";
        rateDisp.style.fontSize="11px";
      } else {
        rateDisp.style.color="var(--pri)";
        rateDisp.style.background="";
        rateDisp.style.borderRadius="";
        rateDisp.style.padding="";
        rateDisp.style.fontWeight="800";
        rateDisp.style.fontSize="11px";
      }
    }
    // RATE box border + label asterisk (legacy — no longer rendered, skip)
    const rateBox=card.querySelector(`.pgc-rate-box[data-pricepid="${p.id}"]`);
    if(rateBox){
      const hasOverride=ST.sessionPrices?.[p.id]!==undefined;
      rateBox.style.borderColor=hasOverride?"rgba(245,158,11,.6)":"";
      rateBox.style.background=hasOverride?"rgba(245,158,11,.08)":"";
      const lbl=rateBox.querySelector(".pgc-qr-lbl");
      if(lbl)lbl.textContent=hasOverride?"RATE*":"RATE";
    }
  });
  // Cart bar
  let cbar=document.getElementById("cbar");
  if(cnt>0&&!cbar){
    /* Build cart bar dynamically without full render */
    const bsh=document.getElementById("bsh");
    if(bsh){
      const cb=document.createElement("div");cb.id="cbar";
      cb.style.cssText="position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:2px solid rgba(0,166,80,.15);padding:10px 13px;display:flex;align-items:center;gap:10px;box-shadow:0 -6px 24px rgba(0,80,30,.1);animation:slideUpFade .32s cubic-bezier(.16,1,.3,1)";
      cb.innerHTML=`<div class="cart-items-preview"><div class="cip-row">${cartItms.map(i=>`<div class="cip-chip">${i.emoji} ${i.boxQty}</div>`).join("")}</div><div class="ctot" id="ctotval">${rup(total)}</div></div><button class="bbtn rip" id="bn">Bill Banao →</button>`;
      bsh.style.position="relative";
      bsh.appendChild(cb);
      cb.querySelector("#bn")?.addEventListener("click",_openBill);
    }
    return;
  }
  if(cnt===0&&cbar){cbar.remove();return;}
  if(!cbar)return;
  const cip=cbar.querySelector(".cip-row");
  if(cip)cip.innerHTML=cartItms.map(i=>`<div class="cip-chip">${i.emoji} ${i.boxQty}</div>`).join("");
  const ctot=document.getElementById("ctotval");
  if(ctot){ctot.textContent=rup(total);ctot.classList.add("pop");setTimeout(()=>ctot.classList.remove("pop"),300);}
}

    ST.selVillageId=vid;
    ST.selShopId=sid;
    /* Custom rates auto-load */
    const selV=getVillage(vid);
    const selShop=selV?.shops.find(s=>s.id===sid);
    ST.sessionPrices={};
    if(selShop?.customRates&&Object.keys(selShop.customRates).length>0){
      Object.entries(selShop.customRates).forEach(([pid,rate])=>{
        if(!isNaN(+rate)&&+rate>0) ST.sessionPrices[+pid]=+rate;
      });
      if(Object.keys(ST.sessionPrices).length>0){
        _showToast(`💰 ${selShop.name} ke ${Object.keys(ST.sessionPrices).length} wholesale rate load ho gaye!`,"#00A650");
      }
    }
    div.remove();render();
  });

  setTimeout(()=>div.querySelector("#ssrch")?.focus(),100);

}

/* ══ BILL PREVIEW ══ */
function _openBill(){
  if(!cartCount())return;

  /* Walk-in mode */
  if(ST.walkMode){
    const wShop=(ST.walkShopName||"").trim();
    if(!wShop){
      /* Validation — block print */
      _showToast("❌ Shop Name zaroori hai — fill karo!","#EF4444");
      const el=document.getElementById("walk_shop");
      if(el){el.style.borderColor="var(--err)";el.focus();setTimeout(()=>{el.style.borderColor="";},2500);}
      return;
    }
    const items=cartItems(),amt=cartTotal();
    /* BUG FIX: Only count WLK-prefixed bills for walk-in bill number generation */
    const wBillNums=ST.bills.filter(b=>b.walkIn&&b.billNo&&/^WLK\d+$/.test(b.billNo)).map(b=>parseInt(b.billNo.replace("WLK",""))||0);
    const wNextNum=(wBillNums.length?Math.max(...wBillNums):0)+1;
    /* FIX Bug#11: Use Date.now() as unique id to prevent race-condition duplicates */
    const _billId=Date.now();
    ST.showBill={
      id:_billId,
      billNo:`WLK${String(wNextNum).padStart(4,"0")}`,
      villageId:null,villageName:"Walk-In",
      shopId:null,shopName:wShop,shopOwner:"",shopMobile:(ST.walkMobile||"").trim(),
      items,purchaseTotal:amt,...calcScheme(amt,items),
      printPieceRate:ST.printPieceRate,date:Date.now(),returned:false,
      walkIn:true, /* flag */
    };
    /* Compute prev udhari for this walk-in shop */
    const _wPrevU=ST.udhari.find(u=>u.shopName.toLowerCase().trim()===wShop.toLowerCase().trim()&&!u.cleared);
    ST.showBill._prevUdhariAmt=_wPrevU?Math.max(0,_wPrevU.amount-(_wPrevU.paid||0)):0;
    ST.showBill._grandTotal=ST.showBill.purchaseTotal+ST.showBill._prevUdhariAmt; /* recalculated in calcPay after discount */
    _ovs();
    return;
  }

  if(!ST.selVillageId||!ST.selShopId){alert("Pehle Shop select karo!");return;}
  const village=getVillage(ST.selVillageId),shop=getShop(ST.selVillageId,ST.selShopId);
  const items=cartItems(),amt=cartTotal();
  const _allBillNos=ST.bills.filter(b=>b.villageId===ST.selVillageId&&b.shopId===ST.selShopId).map(b=>{const m=b.billNo?.match(/B(\d+)$/);return m?parseInt(m[1]):0;});
  const _nextBillNum=(_allBillNos.length?Math.max(..._allBillNos):0)+1;
  /* FIX Bug#11: Pre-assign id to prevent duplicate bills on rapid tap */
  const _nBillId=Date.now();
  ST.showBill={
    id:_nBillId,
    billNo:fmtBN(ST.selVillageId,ST.selShopId,_nextBillNum),
    villageId:ST.selVillageId,villageName:village?.name||"",
    shopId:ST.selShopId,shopName:shop?.name||"",shopOwner:shop?.ownerName||"",shopMobile:shop?.mobile||"",
    items,purchaseTotal:amt,...calcScheme(amt,items),
    printPieceRate:ST.printPieceRate,date:Date.now(),returned:false,
  };
  /* Compute prev udhari for this shop */
  const _sPrevU=ST.udhari.find(u=>u.shopId===ST.selShopId&&u.villageId===ST.selVillageId&&!u.cleared);
  ST.showBill._prevUdhariAmt=_sPrevU?Math.max(0,_sPrevU.amount-(_sPrevU.paid||0)):0;
  ST.showBill._grandTotal=ST.showBill.purchaseTotal+ST.showBill._prevUdhariAmt;
  _ovs();
}

/* ══ OVERLAYS ══ */
function _ovs(){
  document.querySelectorAll(".ovlayer").forEach(e=>e.remove());
  if(ST.numKbFor!==null)_nkb();
  if(ST.showBill&&!ST.showScheme)_bprev();
  if(ST.showScheme)_spop();
}
function _nkb(){
  const p=ST.products.find(x=>x.id===ST.numKbFor);
  const div=document.createElement("div");div.className="ovlayer ovs";
  div.innerHTML=`<div class="ovsc as">
    <div style="text-align:center;font-size:11px;color:var(--t3);margin-bottom:4px">BOXES: ${esc(p?.name||"")}</div>
    <div class="nkd" id="nkd">${ST.numKbVal}</div>
    <div class="nkg">${["1","2","3","4","5","6","7","8","9","X","0","DEL"].map(k=>`<button class="nkb rip ${k==="X"?"nkx":""} ${k==="DEL"?"nkd2":""}" data-nk="${k}">${k==="DEL"?"⌫":k==="X"?"":k}</button>`).join("")}</div>
    <button class="btn b-pri bfl rip" id="nks">✓ Set Boxes</button>
  </div>`;
  div.addEventListener("click",e=>{if(e.target===div){ST.numKbFor=null;ST.numKbVal="0";_ovs();}});
  div.querySelectorAll("[data-nk]").forEach(b=>b.addEventListener("click",()=>{
    const k=b.dataset.nk;
    if(k==="X"){ST.numKbVal="0";}
    else if(k==="DEL"){ST.numKbVal=ST.numKbVal.length>1?ST.numKbVal.slice(0,-1):"0";}
    else{ST.numKbVal=ST.numKbVal==="0"?k:ST.numKbVal+k;}
    /* Always update display after any key */
    const disp=document.getElementById("nkd");if(disp)disp.textContent=ST.numKbVal;
  }));
  div.querySelector("#nks").addEventListener("click",()=>{
    const q=Math.max(0,parseInt(ST.numKbVal)||0);
    /* FIX Bug#24: Always clear numKbFor when keyboard is dismissed */
    if(q===0)delete ST.cart[ST.numKbFor];else ST.cart[ST.numKbFor]=q;
    ST.numKbFor=null;ST.numKbVal="0";render();
  });
  document.body.appendChild(div);
}

  bg.id="_ieqty_bg";
  bg.className="iepop-bg";
  bg.innerHTML=`<div class="iepop">
    <div class="iepop-pill"></div>
    <div class="iepop-hdr">
      <span class="iepop-emoji">${esc(prod.emoji||"📦")}</span>
      <div class="iepop-title">${esc(prod.name)}</div>
      <div class="iepop-sub">📦 Boxes ki quantity set karo</div>
    </div>
    <div class="iepop-body">
      <div class="iepop-qrow">
        <button class="iepop-qbtn iepop-qmn" id="_ieq_minus">−</button>
        <div class="iepop-inp-wrap" style="flex:1;margin-bottom:0">
          <input class="iepop-inp" id="_ieq_val" type="number" inputmode="decimal"
            min="0" max="${maxStock}" step="${decimalEnabled?'0.5':'1'}"
            value="${curQty||""}" placeholder="0"
            autocomplete="off" autocorrect="off">
        </div>
        <button class="iepop-qbtn iepop-qpl" id="_ieq_plus">+</button>
      </div>
      <div style="text-align:center;margin-bottom:16px">
        <span class="iepop-chip">📦 Stock Available: <b>${maxStock}</b> boxes${maxStock>0&&curQty>=maxStock?' &nbsp;⚠️ Max':''}</span>
      </div>
      <button class="iepop-save" id="_ieq_save">✓ &nbsp;Quantity Save Karo</button>
      <button class="iepop-cancel" id="_ieq_cancel">Cancel</button>
    </div>
  </div>`;

  const inp=bg.querySelector("#_ieq_val");
  const save=bg.querySelector("#_ieq_save");
  const cancel=bg.querySelector("#_ieq_cancel");
  const minus=bg.querySelector("#_ieq_minus");
  const plus=bg.querySelector("#_ieq_plus");

  function _getVal(){return parseFloat(inp.value)||0;}
  function _setVal(v){
    v=Math.max(0,v);
    if(!decimalEnabled)v=Math.round(v);
    inp.value=v>0?v:"";
  }

  minus.addEventListener("click",e=>{e.stopPropagation();_setVal(_getVal()-1);inp.focus();});
  plus.addEventListener("click",e=>{
    e.stopPropagation();
    const nv=_getVal()+1;
    if(nv>maxStock){_showToast("❌ Stock khatam!","#EF4444");return;}
    _setVal(nv);inp.focus();
  });

  save.addEventListener("click",()=>{
    const q=_getVal();
    if(q>maxStock){_showToast(`❌ Stock sirf ${maxStock} boxes hai!`,"#EF4444");return;}
    if(q<=0){delete ST.cart[pid];}else{ST.cart[pid]=q;}
    bg.remove();
    renderCartOnly();
  });

  cancel.addEventListener("click",()=>bg.remove());

  /* Enter key → save */
  inp.addEventListener("keydown",e=>{
    if(e.key==="Enter"||e.keyCode===13){e.preventDefault();save.click();}
  });

  /* Background tap → close */
  bg.addEventListener("click",e=>{if(e.target===bg)bg.remove();});

  document.body.appendChild(bg);

  /* Auto-focus + select all for quick type-over */
  requestAnimationFrame(()=>{
    inp.focus();
    inp.select();
  });
}

function _inlineRateEdit(pid,prod,cardEl){
  // Remove any existing inline rate editor
  document.getElementById("_ire_wrap")?.remove();

  const curPrice=getEffectivePrice(pid)||prod.boxPrice||0;
  const rc=cardEl.getBoundingClientRect();

  const wrap=document.createElement("div");
  wrap.id="_ire_wrap";
  wrap.style.cssText=`
    position:fixed;
    left:${Math.max(8,rc.left)}px;
    top:${rc.top-58}px;
    width:${Math.max(rc.width,120)}px;
    z-index:900;
    display:flex;align-items:center;gap:4px;
    background:#fff;
    border:2px solid #D97706;
    border-radius:12px;
    padding:5px 8px;
    box-shadow:0 4px 18px rgba(217,119,6,.35);
    animation:popIn .18s cubic-bezier(.16,1,.3,1) both;
    overflow:visible;
  `;
  wrap.innerHTML=`
    <span style="font-size:13px;color:#D97706;font-weight:800;flex-shrink:0">₹</span>
    <input id="_ire_inp" type="number" inputmode="decimal" min="0" step="1"
      value="${curPrice}"
      style="flex:1;border:none;outline:none;font-family:'Outfit',sans-serif;font-size:15px;font-weight:800;color:#92400E !important;-webkit-text-fill-color:#92400E;background:transparent;min-width:0;width:0;text-align:center;overflow:visible;opacity:1;caret-color:#D97706;">
    <button id="_ire_ok" style="background:#D97706;color:#fff;border:none;border-radius:7px;padding:4px 9px;font-size:12px;font-weight:800;cursor:pointer;flex-shrink:0">✓</button>
  `;

  // If card is near top, show below instead
  if(rc.top < 80){
    wrap.style.top=`${rc.bottom+6}px`;
  }

  document.body.appendChild(wrap);
  const inp=wrap.querySelector("#_ire_inp");
  const okBtn=wrap.querySelector("#_ire_ok");

  requestAnimationFrame(()=>{inp.focus();inp.select();});

  // Card pulse feedback
  cardEl.style.boxShadow="0 0 0 2.5px #D97706";
  cardEl.style.transition="box-shadow .2s";

  function _commit(){
    const np=parseFloat(inp.value);
    wrap.remove();
    cardEl.style.boxShadow="";
    if(isNaN(np)||np<0){_showToast("❌ Valid rate dalo!","#EF4444");return;}
    if(!ST.sessionPrices)ST.sessionPrices={};
    ST.sessionPrices[pid]=np;
    renderCartOnly();
    _showToast(`✅ ₹${np} set (sirf is bill ke liye)`,"#D97706");
  }

  okBtn.addEventListener("click",e=>{e.stopPropagation();_commit();});
  inp.addEventListener("keydown",e=>{
    if(e.key==="Enter"){e.preventDefault();_commit();}
    if(e.key==="Escape"){wrap.remove();cardEl.style.boxShadow="";}
  });
  // blur pe auto-commit NAHI — sirf OK button ya Enter se save hoga
  // (pehle blur->commit se long-press ke baad popup turant close hota tha)

  // Tap outside = cancel
  // 400ms delay: long-press ke pointerup + browser click event clear hone ke baad
  setTimeout(()=>{
    function _oc(e){
      if(!wrap.contains(e.target)){
        wrap.remove();
        cardEl.style.boxShadow="";
        document.removeEventListener("click",_oc,true);
      }
    }
    document.addEventListener("click",_oc,true);
  },400);
}

  /* Payment live calc — New Udhari Management Logic */
  window._currentBillTotal=b.purchaseTotal; /* discount listener ke liye — DOM parse se better */
  const calcPay=()=>{
    const prevUd=parseFloat(document.getElementById("py_prev_udhari")?.value)||0;
    const cash=parseFloat(document.getElementById("py_cash")?.value)||0;
    const upi=parseFloat(document.getElementById("py_upi")?.value)||0;
    const discPct=Math.min(100,Math.max(0,parseFloat(document.getElementById("py_disc_pct")?.value)||0));
    const discAmt=Math.round(b.purchaseTotal*discPct/100);
    const discountedBill=b.purchaseTotal-discAmt;
    const grandTotal=prevUd+discountedBill;
    const totalPaid=cash+upi;
    let remainUdhari=0;
    let currentBillAdjust=0;

    /* Live discount display */
    const _s=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
    const _sd=(id,v)=>{const el=document.getElementById(id);if(el)el.style.display=v;};
    const discAmtDisp=document.getElementById("py_disc_amt_disp");
    if(discAmtDisp)discAmtDisp.textContent=rup(discAmt);
    /* Receipt preview discount rows — size rules same as ESC/POS:
       - Sirf discount (no udhari): TOTAL chota, Net Total BADA
       - Sirf udhari (no discount): TOTAL normal, Grand Total BADA
       - Dono: TOTAL chota, Net Total chota, Grand Total BADA
       - Kuch nahi: TOTAL BADA */
    const discRow=document.getElementById("rcpt_disc_row");
    const netRow=document.getElementById("rcpt_net_row");
    const totalRowEl=document.getElementById("rcpt_total_row");
    const hasDisc2=discPct>0&&discAmt>0;
    const hasUd2=prevUd>0;
    /* TOTAL size */
    if(totalRowEl){
      if(hasDisc2||hasUd2){
        totalRowEl.style.fontSize="13px"; totalRowEl.style.fontWeight="bold";
      } else {
        totalRowEl.style.fontSize=""; totalRowEl.style.fontWeight="";
      }
    }
    if(hasDisc2){
      if(discRow){discRow.style.display="flex";}
      if(netRow){
        netRow.style.display="flex";
        /* Net Total size: bada jab sirf discount, chota jab udhari bhi ho */
        netRow.style.fontSize=hasUd2?"13px":"22px";
      }
      _s("rcpt_disc_label","Discount ("+discPct+"%)");
      _s("rcpt_disc_val","-Rs "+discAmt);
      _s("rcpt_net_val","Rs "+discountedBill);
    } else {
      if(discRow)discRow.style.display="none";
      if(netRow)netRow.style.display="none";
    }
    /* Aaj Ka Bill = discountedBill (not purchaseTotal) */
    const aajBillEl=document.getElementById("rcpt_aaj_bill_val");
    if(aajBillEl)aajBillEl.textContent="Rs  "+discountedBill;
    /* Summary discount row */
    const pDiscRow=document.getElementById("pbd_disc_row");
    if(discPct>0&&discAmt>0){
      if(pDiscRow)pDiscRow.style.display="flex";
      _s("pbd_disc_label","🏷️ Discount ("+discPct+"%)");
      _s("pbd_disc_val","-"+rup(discAmt));
    } else {
      if(pDiscRow)pDiscRow.style.display="none";
    }

    /* BUG FIX v101: Smart allocation — cash pehle current bill mein lagao, online purani udhari mein.
       Yeh natural behavior hai: customer cash = aaj ka bill, online = purani udhari.
       Agar cash > discountedBill, overflow online ke saath prevUd mein jaata hai.
       Agar cash < discountedBill, remaining current bill online se cover hota hai (prevUd ke baad). */
    const cashForCur=Math.min(cash, discountedBill);
    const cashOverflow=Math.max(0, cash-discountedBill);
    const onlineForPrevUd=Math.min(upi+cashOverflow, prevUd);
    const onlineRemain=Math.max(0, (upi+cashOverflow)-prevUd);
    const payForCur=cashForCur+onlineRemain;
    remainUdhari=Math.max(0, discountedBill-payForCur);
    currentBillAdjust=Math.min(discountedBill, payForCur);

    /* Payment splits for display */
    const _payForPrevDisp=Math.min(totalPaid,prevUd);
    const _prevUdRemain=Math.max(0,prevUd-_payForPrevDisp);
    const _totalBaaki=remainUdhari+_prevUdRemain;
    /* Update receipt preview cash/upi/paid/ud */
    const _s2=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
    _s2("rcpt_cash_prev",cash>0?rup(cash):"-");
    _s2("rcpt_upi_prev",upi>0?rup(upi):"-");
    _s2("rcpt_paid_prev",(cash+upi)>0?rup(cash+upi):"-");
    _s2("rcpt_ud_prev",_totalBaaki>0?rup(_totalBaaki):"✓ Clear");
    /* Update receipt preview Purani Udhari + Grand Total block */
    const rcptPrevUdBlock=document.getElementById("rcpt_prev_ud_block");
    if(rcptPrevUdBlock){
      rcptPrevUdBlock.style.display=prevUd>0?"block":"none";
      _s2("rcpt_prev_ud_val","Rs\u00a0\u00a0"+prevUd);
      _s2("rcpt_grand_val","Rs\u00a0\u00a0"+grandTotal);
    }

    /* Update grand total display */
    const gtEl=document.getElementById("py_grand_val");
    if(gtEl)gtEl.textContent=rup(grandTotal);
    const ptEl=document.getElementById("pbd_grand");
    if(ptEl)ptEl.textContent=rup(grandTotal);

    /* Update prev udhari display */
    const pvEl=document.getElementById("pbd_prev_ud");
    if(pvEl)pvEl.textContent=rup(prevUd);

    _s("pbd_cash",rup(cash));
    _s("pbd_upi",rup(upi));
    _s("pbd_total_paid",rup(totalPaid));
    _s("pbd_ud",rup(_totalBaaki));
    /* Quick summary strip — update amount AND color */
    _s("qps_ud",_totalBaaki>0?rup(_totalBaaki):"✓ Clear");
    const _qpsEl=document.getElementById("qps_ud");
    if(_qpsEl)_qpsEl.style.color=_totalBaaki>0?"var(--err)":"var(--ok)";

    const changeDue=totalPaid>grandTotal?totalPaid-grandTotal:0;
    const ovRow=document.getElementById("pbd_overflow_row");
    const ovAmt=document.getElementById("pbd_overflow");
    if(currentBillAdjust>0&&changeDue===0&&ovRow&&ovAmt){
      ovRow.style.display="block";
      ovAmt.textContent=rup(currentBillAdjust);
    } else if(ovRow){
      ovRow.style.display="none";
    }
    const changeRow=document.getElementById("pbd_change_row");
    const changeAmt=document.getElementById("pbd_change_amt");
    if(changeDue>0&&changeRow&&changeAmt){
      changeRow.style.display="flex";
      changeAmt.textContent=rup(changeDue);
    } else if(changeRow){
      changeRow.style.display="none";
    }

    const udInp=document.getElementById("py_udhari");
    if(udInp)udInp.value=String(_totalBaaki);

    /* ── Live QR amount update ──
       Auto mode: grandTotal - cash (UPI auto-fill ke saath sync)
       Manual mode: UPI field ki exact value (user ne khud type kiya) */
    const _upiFieldVal=parseFloat(document.getElementById("py_upi")?.value)||0;
    const _upiIsManual=window._upiUserEdited||false;
    const qrAmt=Math.max(0, _upiIsManual ? _upiFieldVal : (grandTotal - cash));
    const amtBadge=document.getElementById("upi_amt_badge");
    if(amtBadge)amtBadge.textContent=rup(qrAmt);
    (ST.upiAccounts||[]).forEach((_,i)=>{
      const lbl=document.getElementById(`upi_qr_amt_${i}`);
      if(lbl)lbl.textContent=rup(qrAmt);
    });
    clearTimeout(window._qrTimer);
    window._qrTimer=setTimeout(()=>{
      (ST.upiAccounts||[]).forEach((acc,i)=>{
        const img=document.getElementById(`upi_qr_img_${i}`);
        if(!img)return;
        const newSrc=`https://api.qrserver.com/v1/create-qr-code/?size=190x190&data=${encodeURIComponent("upi://pay?pa="+acc.upiId+"&pn="+encodeURIComponent(ST.businessName||"SONEY EXCELLENT")+"&am="+qrAmt+"&tn=Bill+"+encodeURIComponent(b.billNo||""))}`;
        if(img.src!==newSrc)img.src=newSrc;
      });
    },600);
  };
  const getPayment=()=>{
    const cash=parseFloat(document.getElementById("py_cash")?.value)||0;
    const upi=parseFloat(document.getElementById("py_upi")?.value)||0;
    const prevUd=parseFloat(document.getElementById("py_prev_udhari")?.value)||0;
    const discPct=Math.min(100,Math.max(0,parseFloat(document.getElementById("py_disc_pct")?.value)||0));
    const discAmt=Math.round(b.purchaseTotal*discPct/100);
    const discountedBill=b.purchaseTotal-discAmt;
    const grandTotal=prevUd+discountedBill;
    const totalPaid=cash+upi;
    /* BUG FIX v101: Smart allocation — cash pehle current bill mein, online purani udhari mein.
       cashForCur = cash jo aaj ke bill mein gaya
       onlineForPrevUd = online (+ cash overflow) jo purani udhari mein gaya
       payForCur = aaj ke bill mein total gaya */
    const cashForCur=Math.min(cash, discountedBill);
    const cashOverflow=Math.max(0, cash-discountedBill);
    const onlineForPrevUd=Math.min(upi+cashOverflow, prevUd);
    const onlineRemain=Math.max(0, (upi+cashOverflow)-prevUd);
    const payForCur=cashForCur+onlineRemain;
    const ud=Math.max(0, discountedBill-payForCur);
    return{cash,upi,udhari:ud,prevUdhari:prevUd,grandTotal,discountPct:discPct,discountAmt:discAmt,discountedBill};
  };

  /* Button listeners */
  div.querySelector("#prtog").addEventListener("click",()=>{
    ST.printPieceRate=!ST.printPieceRate;ST.showBill.printPieceRate=ST.printPieceRate;_ovs();
  });
  div.querySelector("#bpcl").addEventListener("click",()=>{ST.showBill=null;ST._pay=undefined;_ovs();});

  let _billSaved=false;
  div.querySelector("#bpok").addEventListener("click",()=>{
    if(_billSaved)return;
    /* FIX: Agar cash aur upi dono 0 hain to pura bill amount udhari mein chala jaayega — block mat karo */
    _billSaved=true;
    const pay=getPayment();_confirmBill(b,pay,false);
  });

    const wrap=slider.parentElement;
    wrap.addEventListener("touchstart",e=>{startX=e.touches[0].clientX;isDragging=true;},{passive:true});
    wrap.addEventListener("touchmove",e=>{
      if(!isDragging)return;
      dragDelta=e.touches[0].clientX-startX;
      slider.style.transition="none";
      slider.style.transform=`translateX(calc(-${curSlide*100}% + ${dragDelta}px))`;
    },{passive:true});
    wrap.addEventListener("touchend",()=>{
      slider.style.transition="transform .35s cubic-bezier(.16,1,.3,1)";
      if(Math.abs(dragDelta)>50)goTo(dragDelta<0?curSlide+1:curSlide-1);

function fixText(text,max){
  text=String(text||"");
  return text.length>max?text.substring(0,max-2)+"..":text;
}
/* NOTE: headerLine(), formatLine(), totalBoxes() are defined inside _buildEscLines()
   using configurable column widths — do NOT define them here to avoid shadowing bugs. */

function _buildEscLines(b,pay){
  const fp=b.freeProduct;
  const lines=[];

  /* ── Printer Settings se values lo ── */
  const ps      = ST.printerSettings||{};
  const CPL     = ps.charsPerLine  || 32;   /* 3.3 total chars per line */
  const C2      = ps.charsCol2     || 4;    /* 3.4 col2: Qty */
  const C3      = ps.charsCol3     || 6;    /* 3.5 col3: Rate */
  const C4      = ps.charsCol4     || 6;    /* 3.6 col4: Amount */
  const C1      = CPL - C2 - C3 - C4 - 3;  /* col1: Item name (auto) */
  const DIVIDER = "-".repeat(CPL);
  const FOOTER  = ps.printFooter   || "Thank You! Visit Again!";

  /* ── 5.4 Bill Print Customization ── */
  /* ESC/POS GS! size byte: bits 0-2 = width multiplier-1, bits 4-6 = height multiplier-1
     Named: Small=0 (1x), Medium=0x11 (2x), Large=0x22 (3x)
     Number 1-8: s=1→0, 2→0x11, 3→0x22, 4→0x33, 5→0x44, 6→0x55, 7→0x66, 8→0x77 */
  const _szFmt  = s=>{
    const n=parseInt(s);
    if(!isNaN(n)&&n>=1&&n<=8){ const m=n-1; return (m<<4)|m; }
    if(s==="Large") return 0x22;  /* BUG FIX: Large=3x3 (0x22), was incorrectly 0x11 */
    if(s==="Medium")return 0x11;  /* BUG FIX: Medium=2x2 (0x11), was incorrectly 0 */
    return 0; /* Small = 1x1 = normal */
  };
  const _alignFmt = a=>a==="Left"?0:a==="Right"?2:1; /* align: 0=left, 1=center, 2=right */
  const _bizFmt = _szFmt(ps.bizNameSize||"Medium");
  const _bizBold= ps.bizNameBold!==false ? 1 : 0;
  const _bizAlign = _alignFmt(ps.bizNameAlign||"Center");
  const _totFmt = _szFmt(ps.totalAmtSize||"Medium");
  const _savFmt = _szFmt(ps.savingAmtSize||"Small");
  const _netShow= ps.showNetTotal!==false;
  const _netLbl = (ps.netTotalLabel||"Net Total").trim()||"Net Total";
  const _netFmt = _szFmt(ps.netTotalSize||"Small");
  const _shopFmt= 0x01; /* FIXED v86: Tall only (1x wide, 2x tall) — bich ka size 58mm ke liye best */
  const _shopAlign = _alignFmt(ps.shopDetailsAlign||"Left");
  /* New v63 settings */
  const _addrShow = ps.addrShow!==false;
  const _addrBold = ps.addrBold?1:0;
  const _addrFmt  = _szFmt(ps.addrSize||"Small");
  const _mob1Show = ps.mob1Show!==false;
  const _mob1Bold = ps.mob1Bold?1:0;
  const _mob2Show = ps.mob2Show!==false;
  const _mob2Bold = ps.mob2Bold?1:0;
  const _mobOrder = ps.mobOrder||"mob1first";
  const _footerBold = ps.footerBold?1:0;
  const _footerFmt  = _szFmt(ps.footerSize||"Small");
  const _footerAlign= _alignFmt(ps.footerAlign||"Center");
  const _billNoFmt  = _szFmt(ps.billNoSize||"Small");
  const _dateFmt    = _szFmt(ps.dateSize||"Small");

  const txt=(content,bold,align,format)=>lines.push({type:0,content,bold:bold?1:0,align,format:format||0});
  const div=()=>txt(DIVIDER,0,0,4);
  const br=()=>txt(" ",0,0,0);

  /* ── Helper: pad/truncate to exact width ── */
  function fw(str,w){str=String(str||"");return str.length>w?str.slice(0,w):str.padEnd(w);}
  function fr(str,w){str=String(str||"");return str.length>w?str.slice(0,w):str.padStart(w);}

  /* ── Header line using col widths ── */
  function headerLine(){
    return fw("ITEM",C1)+" "+fr("QTY",C2)+" "+fr("RATE",C3)+" "+fr("AMT",C4);
  }

  /* ── Item line using col widths ── */
  function formatLine(name,qty,rate,amt){
    return fw(name,C1)+" "+fr(qty,C2)+" "+fr(rate,C3)+" "+fr(amt,C4);
  }

  function totalBoxes(items){return (items||[]).reduce((s,i)=>s+(i.boxQty||0),0);}

  const prof=ST.profile||{};
  const _headerOverride=(ST.printerSettings?.bizNameHeader||"").trim();
  const bizName=(_headerOverride||prof.bizName||ST.businessName||"SONEY EXCELLENT").toUpperCase();
  txt(bizName,_bizBold,_bizAlign,_bizFmt||0x11);
  /* Mobile order logic — phone pehle aayega, address baad mein center mein */
  {
    /* Both numbers on ONE line: "Ph: MOB1 / MOB2" */
    let _p1 = _mob1Show ? (prof.mobile||"") : "";
    let _p2 = _mob2Show ? (prof.mobile2||"") : "";
    if(_mobOrder==="mob2first"){ const _tmp=_p1;_p1=_p2;_p2=_tmp; }
    const _phones=[_p1,_p2].filter(p=>p).join(" / ");
    if(_phones){
      const _bold=(_mob1Bold||_mob2Bold)?1:0;
      txt("Ph: "+_phones,_bold,1,4);
    }
  }
  /* Address — phone ke niche, center aligned */
  if(_addrShow && prof.address){
    const _a=prof.address;
    txt(_a,_addrBold,1,_addrFmt||4);
  }
  /* Tagline — address ke niche, center aligned */
  if(prof.tagline){
    txt(prof.tagline,0,1,4);
  }
  txt("ICE CREAM BILLING",1,1,4);
  div();
  txt("SHOP DETAILS",1,_shopAlign,0x01); /* FIXED v86: 0x01 = Tall (1x wide, 2x tall) — bich ka size */
  if(b.shopName)    txt("Shop  : "+fw(b.shopName,CPL-8),1,0,0);
  if(b.shopOwner)   txt("Owner : "+fw(b.shopOwner,CPL-8),0,0,4);
  if(b.shopMobile)  txt("Mobile: "+b.shopMobile,0,0,4);
  if(b.villageName) txt("Gaon  : "+fw(b.villageName,CPL-8),0,0,4);
  div();
  txt("Bill No: "+b.billNo,1,0,_billNoFmt||0);
  txt("Date   : "+fmtD(b.date)+" "+fmtT(b.date),0,0,_dateFmt||4);
  div();
  /* Items header */
  txt(headerLine(),1,0,4);
  div();
  b.items.forEach(it=>{
    const line=formatLine(it.name,it.boxQty,it.boxPrice,it.amount);
    txt(line,0,0,4);
  });
  div();
  const tBoxes=totalBoxes(b.items);
  txt("Total Boxes: "+tBoxes,0,0,4);
  div();
  if(b.schemeApplied&&fp){
    txt("** SCHEME LAGA! **",1,1,0);
    txt("Rs "+ST.scheme.minPurchase+"+ kharid pe",0,1,4);
    txt("MUFT: "+fw(fp.name,CPL-10)+" x"+fp.boxQty+" Box",0,1,0);
    div();
  }
  const _discPct=pay?.discountPct||b.payment?.discountPct||0;
  const _discAmt=pay?.discountAmt||b.payment?.discountAmt||0;
  const _discBill=pay?.discountedBill||b.payment?.discountedBill||b.purchaseTotal;
  const cash=pay?.cash||0,upi=pay?.upi||0,ud=pay?.udhari||0;
  const prevUd=pay?.prevUdhari||0,grandTot=pay?.grandTotal??((prevUd)+_discBill);
  /* SIZE RULES:
     - Sirf discount (no udhari): TOTAL chota, Net Total BADA
     - Sirf udhari (no discount): TOTAL BADA, Grand Total BADA
     - Dono (discount+udhari): TOTAL chota, Net Total chota, Grand Total BADA
     - Kuch nahi: TOTAL BADA */
  const _hasDisc=_discPct>0&&_discAmt>0;
  const _hasUd=prevUd>0;
  const _totSize=(_hasDisc&&!_hasUd)?0:(_hasUd?4:(_totFmt||0x11));
  txt("TOTAL: Rs "+b.purchaseTotal,1,1,_totSize);
  if(_hasDisc){
    /* Discount line: "Discount(X%)" left, "- Rs XXXX" right — ek hi line mein fit */
    const _discAmtStr="- Rs "+_discAmt;
    const _discLbl="Discount("+_discPct+"%)";
    const _discLblW=CPL-_discAmtStr.length-1;
    txt(fw(_discLbl,_discLblW)+" "+_discAmtStr,0,0,0);
    if(_netShow){
      /* Net Total line: label left, amount right */
      const _netAmtStr="Rs "+_discBill;
      const _netLblW=CPL-_netAmtStr.length-1;
      txt(fw(_netLbl,_netLblW)+" "+_netAmtStr,1,0,_hasUd?0:0x11);
    }
    div();
  }
  const totalPaid=cash+upi;
  div();
  txt("PAYMENT SUMMARY",1,1,0);
  const lw=CPL-12; /* label width */
  if(_hasUd){
    txt(fw("Purani Udhari",lw)+"Rs "+fr(prevUd,8),0,0,4);
    txt(fw("Aaj Ka Bill",lw)+"Rs "+fr(_discBill,8),0,0,4);
    txt(fw("Grand Total",lw)+"Rs "+fr(grandTot,8),1,0,0x11);
    div();
  }
  if(cash>0) txt(fw("Cash",lw)+"Rs "+fr(cash,8),0,0,4);
  if(upi>0)  txt(fw("UPI",lw)+"Rs "+fr(upi,8),0,0,4);
  if(totalPaid>0) txt(fw("Total Paid",lw)+"Rs "+fr(totalPaid,8),1,0,4);
  if(ud>0)   txt(fw("Baaki Udhari",lw)+"Rs "+fr(ud,8),0,0,4);
  if(ST.printPieceRate&&b.schemeApplied&&b.pieceRates?.length){
    div();
    txt("PIECE RATE",1,1,0);
    txt("Factor: "+b.factor.toFixed(4),0,0,4);
    div();
    b.pieceRates.forEach(pr=>{
      txt(fw(pr.name,CPL-12)+" Rs "+fr(pr.finalPieceCost.toFixed(2),8),0,0,4);
    });
  }
  div();
  /* 5.9 Print Footer — settings se */
  txt(FOOTER,_footerBold,_footerAlign,_footerFmt||0);
  br();br();br();
  return lines;
}

function _doPrint(b,pay){
  try{
    // Check AndroidBT available
    if(!BT.ok()){
      _showPrintNotAvailable();
      return;
    }
    const status=BT.status();
    if(!status.startsWith("connected:")){
      _showPrinterNotConnected();
      return;
    }

    const lines=_buildEscLines(b,pay);

    // Show loading overlay
    const loadDiv=document.createElement("div");
    loadDiv.id="print_loading";
    loadDiv.style.cssText="position:fixed;inset:0;z-index:9999;background:rgba(0,40,15,.88);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px";
    loadDiv.innerHTML=`<div style="font-size:44px;animation:fadeIn .3s both">🖨️</div><div style="color:#fff;font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;font-size:16px;font-weight:800">Print ho raha hai...</div><div style="color:rgba(255,255,255,.6);font-size:12px">Please wait</div>`;
    document.body.appendChild(loadDiv);

    // ✅ ASYNC — UI thread never blocked
    BT.printBill(lines).then(res=>{
      if(document.getElementById("print_loading"))loadDiv.remove();
      if(res.ok){
        _showToast("✅ Print ho gaya!","#00A650");
      } else {
        _showPrintError(res.msg||"Unknown error");
      }
    });

  }catch(e){
    alert("Print error: "+e.message);
  }
}

function _closePopupOverlay(el){
  // Walk up DOM to find the fixed overlay and remove it
  var node=el;
  while(node&&node!==document.body){
    if(node.style&&node.style.position==="fixed"&&node.style.inset==="0px"){node.remove();return;}
    node=node.parentElement;
  }
  // fallback
  if(el.parentElement&&el.parentElement.parentElement)el.parentElement.parentElement.remove();
}
function _goToPrinterSettings(el){

  /* FIX v86-3-3: sab kuch save karo, phir null karo — settings clean render ho */

  ST._savedSelVillageId=ST.selVillageId;
  ST._savedSelShopId=ST.selShopId;
  ST.showBill=null;
  document.querySelectorAll(".ovlayer").forEach(e=>e.remove());
  ST.tab="settings";ST.setPage="print";
  requestAnimationFrame(function(){render();});
}

function _showToast(msg,bg){
  // Limit to max 3 stacked toasts — remove oldest if exceeded
  const existing=document.querySelectorAll(".soney-toast");
  if(existing.length>=3) existing[0].remove();
  const t=document.createElement("div");
  t.className="soney-toast";
  // Stack offset based on remaining toasts
  const stackCount=document.querySelectorAll(".soney-toast").length;
  const topPx=22+stackCount*54;
  t.style.cssText=`position:fixed;top:${topPx}px;left:50%;transform:translateX(-50%);background:${bg||"#00A650"};color:#fff;padding:12px 22px;border-radius:12px;font-size:13px;font-weight:700;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.25);max-width:90vw;text-align:center;animation:fadeIn .25s both;transition:top .2s`;
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.remove();},2800);
}
