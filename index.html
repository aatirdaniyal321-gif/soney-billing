<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#F0FAF3">
<title>SONEY EXCELLENT v101 · Web BT + SQLite</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap');
/* ══ Smart Chart ══ */
.smart-bar{transition:opacity .2s;}
.chart-mode-btn{font-family:'Outfit',sans-serif;letter-spacing:.3px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
<!-- sql.js: SQLite compiled to WebAssembly — fully offline after first load -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.11.0/sql-wasm.min.js"></script>
<!-- SheetJS: Excel (.xlsx) export support -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- html2canvas: DOM element ko image mein convert karne ke liye -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<!-- Firebase: Real-time multi-device sync -->
<script async src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script async src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>

:root{
  --bg:#F0FAF3;--bg2:#E6F5EB;--card:#FFFFFF;--card2:#F7FCF9;--card3:#EDF7F1;
  --pri:#00A650;--pri2:#007A38;--pri3:#00C060;--priL:#E6F5EB;
  --acc:#F59E0B;--acc2:#D97706;--accL:#FFFBEB;
  --ok:#00A650;--ok2:#007A38;
  --err:#EF4444;--err2:#DC2626;--errL:#FEF2F2;
  --info:#3B82F6;--infoL:#EFF6FF;
  --sp:#8B5CF6;--spL:#F5F3FF;
  --t1:#003A1A;--t2:#2D6A42;--t3:#7FAA8A;--t4:#B8D8C2;
  --b1:rgba(0,166,80,.18);--b2:rgba(0,166,80,.32);--b3:rgba(0,166,80,.1);
  --nav-bg:rgba(255,255,255,.97);--hdr-bg:#fff;
  --shadow:0 4px 20px rgba(0,80,30,.1);--shadow2:0 2px 8px rgba(0,80,30,.07);
  --glow:rgba(0,166,80,.25);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
input,select,button,textarea{font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased}

/* ══ NUMBER RENDERING FIX ══ */
/* All number/value elements get crisp number rendering */
[style*="font-family:'Outfit'"],[class*="sv"],[class*="ctot"],[class*="nkd"],[class*="gt-val"],
[class*="uc-bal"],[class*="sh-num"],[class*="gvr-amt"],[class*="bh-amt"],[class*="bh-stat-val"],
[class*="cl-shop-bal"],[class*="cl-entry-amt"],[class*="cl-balance-val"],[class*="cl-sum-val"]{
  font-variant-numeric:tabular-nums;
  -webkit-font-feature-settings:"tnum" 1;
  font-feature-settings:"tnum" 1;
  letter-spacing:-.3px;
}
/* Global number smoothing */
*{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

/* ══ ANIMATIONS ══ */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(60px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes ripOut{from{transform:translate(-50%,-50%) scale(0);opacity:.4}to{transform:translate(-50%,-50%) scale(4);opacity:0}}
@keyframes shimmer{0%{left:-100%}100%{left:200%}}
@keyframes flyUp{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-40px) scale(1.08)}100%{opacity:0;transform:translateY(-90px) scale(.7)}}
@keyframes popIn{0%{transform:scale(0);opacity:0}60%{transform:scale(1.18)}100%{transform:scale(1);opacity:1}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes cartBounce{0%{transform:scale(1)}30%{transform:scale(1.22)}60%{transform:scale(.92)}100%{transform:scale(1)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,166,80,.4)}70%{box-shadow:0 0 0 10px rgba(0,166,80,0)}}
@keyframes countUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 8px rgba(0,166,80,.3)}50%{box-shadow:0 0 24px rgba(0,166,80,.7)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
@keyframes slideUpFade{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}

.af{animation:fadeUp .3s cubic-bezier(.2,.8,.3,1) both}
.as{animation:slideUp .36s cubic-bezier(.16,1,.3,1) both}
.ac{animation:scaleIn .28s cubic-bezier(.16,1,.3,1) both}
/* PERF FIX: stag animation simplified — tab switch speed improve */
.stag>*{opacity:0;animation:fadeUp .2s cubic-bezier(.2,.8,.3,1) both}
.stag>*:nth-child(1){animation-delay:.02s}.stag>*:nth-child(2){animation-delay:.04s}
.stag>*:nth-child(3){animation-delay:.06s}.stag>*:nth-child(4){animation-delay:.08s}
.stag>*:nth-child(5){animation-delay:.10s}.stag>*:nth-child(6){animation-delay:.12s}
.stag>*:nth-child(7){animation-delay:.14s}.stag>*:nth-child(8){animation-delay:.16s}

/* Ripple */
.rip{position:relative;overflow:hidden;cursor:pointer}
.ripe{position:absolute;border-radius:50%;width:60px;height:60px;background:rgba(0,166,80,.18);animation:ripOut .5s ease-out forwards;pointer-events:none;transform:translate(-50%,-50%)}

/* Fly-up particle */
.fly-particle{position:fixed;pointer-events:none;z-index:9999;font-size:22px;animation:flyUp .6s cubic-bezier(.2,.8,.3,1) forwards}

/* ══ SHELL ══ */
#app{height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;background:var(--bg);overflow:hidden}

/* ══ HEADER ══ */
#hdr{flex-shrink:0;padding:10px 16px 9px;display:flex;align-items:center;justify-content:space-between;background:var(--hdr-bg);border-bottom:1px solid var(--b1);position:relative;z-index:10;box-shadow:var(--shadow2)}
.logo-w{width:36px;height:36px;border-radius:11px;background:linear-gradient(135deg,var(--pri),var(--pri2));display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 12px var(--glow);flex-shrink:0}
/* PERF FIX: float animation removed — continuous CPU drain tha */
.logo-t{font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;font-size:17px;font-weight:800;color:var(--pri2);letter-spacing:.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
.logo-s{font-size:8px;color:var(--t3);letter-spacing:2px;margin-top:1px}
.hdate{font-size:11px;font-weight:600;color:var(--t2)}
.hbills{display:inline-flex;align-items:center;gap:4px;margin-top:2px;background:rgba(0,166,80,.08);border:1px solid rgba(0,166,80,.2);border-radius:99px;padding:2px 8px;font-size:9px;font-weight:700;color:var(--pri);transition:all .3s}

/* ══ BODY ══ */
#body{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;-webkit-overflow-scrolling:touch}

/* ══ NAV ══ */
#bnav{flex-shrink:0;display:flex;background:var(--nav-bg);border-top:1px solid var(--b1);padding:4px 0 7px;box-shadow:0 -2px 12px rgba(0,0,0,.06);overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
#bnav::-webkit-scrollbar{display:none}
.nb{flex:1;min-width:52px;padding:5px 1px 2px;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--t3);border-top:2px solid transparent;transition:color .2s,border-color .2s;cursor:pointer;position:relative}
.nb.on{color:var(--pri);border-top-color:var(--pri)}
.nb .ni{font-size:16px;line-height:1;transition:transform .22s cubic-bezier(.16,1,.3,1)}
.nb.on .ni{transform:scale(1.18)}
.nb .nl{font-size:6.5px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.nb .nd{position:absolute;top:3px;right:calc(50% - 12px);width:5px;height:5px;border-radius:50%;background:var(--pri);opacity:0;transform:scale(0);transition:all .25s}
.nb.on .nd{opacity:1;transform:scale(1)}

/* ══ PAGE ══ */
.page{height:100%;overflow-y:auto;padding:14px 13px 30px}
.pk{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:4px;text-transform:uppercase;margin-bottom:3px}
.ph{font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;font-size:21px;font-weight:800;margin-bottom:16px;color:var(--t1)}

/* ══ CARDS ══ */
.card{background:var(--card);border-radius:18px;border:1px solid rgba(0,166,80,.12);box-shadow:var(--shadow2);position:relative;overflow:hidden}
.cp{padding:15px}
.c-green{border-color:rgba(0,166,80,.2)}
.c-amber{border-color:rgba(245,158,11,.2)}
.c-red{border-color:rgba(239,68,68,.2)}
.c-blue{border-color:rgba(59,130,246,.2)}
.sl{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-bottom:11px;display:flex;align-items:center;gap:7px}
.sl::after{content:'';flex:1;height:1px;background:rgba(0,166,80,.1)}

/* ══ INPUTS ══ */
.inp{background:var(--card3);border:1.5px solid rgba(0,166,80,.15);border-radius:13px;padding:11px 13px;color:var(--t1);font-size:13px;font-weight:500;outline:none;width:100%;transition:border-color .18s,box-shadow .18s}
.inp:focus{border-color:rgba(0,166,80,.45);box-shadow:0 0 0 3px rgba(0,166,80,.09)}
.inp::placeholder{color:var(--t3)}
.sel{background:var(--card3);border:1.5px solid rgba(0,166,80,.15);border-radius:13px;padding:11px 13px;color:var(--t1);font-size:13px;outline:none;width:100%}
.fg{margin-bottom:11px}.fl{font-size:11px;font-weight:600;color:var(--t2);display:block;margin-bottom:5px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.dr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(0,166,80,.08);font-size:12px}
.dr:last-child{border-bottom:none}
.dl{color:var(--t3)}.dv{font-weight:700;color:var(--t1)}

/* ══ BUTTONS ══ */
.btn{border:none;border-radius:13px;font-size:13px;font-weight:700;cursor:pointer;padding:12px 18px;transition:transform .14s,box-shadow .18s,background .18s;font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;position:relative;overflow:hidden}
.btn:active{transform:scale(.94)}
.b-pri{background:linear-gradient(135deg,#00A650,#007A38);color:#fff;box-shadow:0 5px 18px rgba(0,166,80,.35),inset 0 1px 0 rgba(255,255,255,.25)}
.b-acc{background:linear-gradient(135deg,#F59E0B,#D97706);color:#fff;box-shadow:0 5px 18px rgba(245,158,11,.3)}
.b-err{background:linear-gradient(135deg,#EF4444,#DC2626);color:#fff;box-shadow:0 5px 18px rgba(239,68,68,.3)}
.b-info{background:linear-gradient(135deg,#3B82F6,#2563EB);color:#fff;box-shadow:0 5px 18px rgba(59,130,246,.3)}
.b-sp{background:linear-gradient(135deg,#8B5CF6,#7C3AED);color:#fff;box-shadow:0 5px 18px rgba(139,92,246,.3)}
.b-ghost{background:transparent;border:1.5px solid rgba(0,166,80,.25);color:var(--pri)}
.b-ghost-red{background:transparent;border:1.5px solid rgba(239,68,68,.25);color:var(--err)}
.b-light{background:var(--priL);border:1.5px solid rgba(0,166,80,.2);color:var(--pri2)}
.b-ok{background:linear-gradient(135deg,#00A650,#007A38);color:#fff;box-shadow:0 5px 18px rgba(0,166,80,.35),inset 0 1px 0 rgba(255,255,255,.25)}
.bfl{width:100%}
.bsm{padding:7px 13px;font-size:11px;border-radius:10px}

/* ══ DATE FILTER PILL SYSTEM — v35 ══ */
.df-wrap{display:flex;flex-direction:column;gap:7px;margin-bottom:13px}
.df-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.df-pill{background:var(--card3);border:1.5px solid rgba(0,166,80,.18);border-radius:99px;padding:6px 12px;font-size:11px;font-weight:700;color:var(--t2);cursor:pointer;transition:all .18s;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.df-pill.on{background:linear-gradient(135deg,#00A650,#007A38);color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(0,166,80,.28)}
.df-pill.date-on{background:linear-gradient(135deg,#3B82F6,#2563EB);color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(59,130,246,.28)}
.df-pill.clear-btn{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.2);color:var(--err)}
.df-date-row{display:flex;gap:7px;align-items:center;background:rgba(59,130,246,.05);border:1.5px solid rgba(59,130,246,.2);border-radius:14px;padding:9px 12px;margin-top:2px}
.df-date-inp{background:#fff;border:1.5px solid rgba(59,130,246,.25);border-radius:10px;padding:6px 9px;font-size:12px;font-weight:600;color:var(--t1);outline:none;flex:1;min-width:0;transition:border-color .18s;font-family:'Outfit',sans-serif}
.df-date-inp:focus{border-color:rgba(59,130,246,.6);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.df-date-lbl{font-size:10px;font-weight:700;color:#2563EB;letter-spacing:.5px;white-space:nowrap}
.df-date-apply{background:linear-gradient(135deg,#3B82F6,#2563EB);color:#fff;border:none;border-radius:9px;padding:7px 13px;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap;font-family:'Outfit',sans-serif}
.df-active-badge{background:linear-gradient(135deg,#3B82F6,#2563EB);color:#fff;border-radius:99px;padding:3px 9px;font-size:9.5px;font-weight:800;display:inline-flex;align-items:center;gap:4px}

#sb-overlay{position:fixed;inset:0;z-index:800;background:rgba(0,40,15,.72);opacity:0;pointer-events:none;transition:opacity .28s cubic-bezier(.16,1,.3,1)}
#sb-overlay.open{opacity:1;pointer-events:all}
#sidebar{position:fixed;left:0;top:0;bottom:0;width:270px;z-index:801;background:#fff;box-shadow:6px 0 32px rgba(0,80,30,.18);transform:translateX(-100%);transition:transform .3s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column;overflow:hidden}
#sidebar.open{transform:translateX(0)}
.sb-head{background:linear-gradient(135deg,var(--pri),var(--pri2));padding:44px 18px 18px;flex-shrink:0}
.sb-logo{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sb-logo-ic{width:40px;height:40px;border-radius:13px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:20px}
.sb-logo-t{font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;font-size:15px;font-weight:800;color:#fff}
.sb-logo-s{font-size:9px;color:rgba(255,255,255,.7);letter-spacing:1.5px;margin-top:1px}
.sb-close{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:99px;background:rgba(255,255,255,.18);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.sb-body{flex:1;overflow-y:auto;padding:10px 10px 20px}
.sb-sec-label{font-size:8.5px;font-weight:700;color:var(--t3);letter-spacing:3px;text-transform:uppercase;padding:6px 10px 4px}
.sb-item{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:13px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;font-size:13px;font-weight:600;color:var(--t1);transition:background .18s,color .18s;margin-bottom:2px;position:relative;overflow:hidden}
.sb-item:active{background:var(--priL)}
.sb-item.on{background:var(--priL);color:var(--pri2)}
.sb-item .sb-ic{font-size:18px;flex-shrink:0;width:26px;text-align:center}
.sb-item .sb-arrow{margin-left:auto;font-size:11px;color:var(--t4)}
.sb-item.on .sb-arrow{color:var(--pri)}
.sb-divider{height:1px;background:rgba(0,166,80,.08);margin:6px 12px}

/* ══ PBAR ══ */
.pbw{background:rgba(0,166,80,.1);border-radius:99px;overflow:hidden;position:relative}
.pb{height:100%;border-radius:99px;transition:width 1.1s cubic-bezier(.2,.8,.3,1);position:relative;overflow:hidden}
/* PERF FIX: shimmer animation disable — weak phones mein CPU drain karta tha */
.pb::after{display:none}

/* OVERLAYS — PERF FIX: backdrop-filter:blur removed — Redmi 8 pe hang fix */
.ovlayer{position:fixed;inset:0;z-index:700;background:rgba(0,40,15,.88);display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
.ovf{position:fixed;inset:0;z-index:600;background:rgba(0,40,15,.88)}
.ovs{position:fixed;inset:0;z-index:500;background:rgba(0,40,15,.82);display:flex;align-items:flex-end;justify-content:center}
.ovsc{background:#fff;border-radius:26px 26px 0 0;padding:20px 15px 30px;width:100%;max-width:430px;border:1px solid var(--b1);border-bottom:none;box-shadow:0 -8px 40px rgba(0,80,30,.12)}
.ovsc::before{content:'';display:block;width:38px;height:4px;background:rgba(0,166,80,.2);border-radius:99px;margin:0 auto 16px}
.ovm{position:fixed;inset:0;z-index:600;background:rgba(0,40,15,.88);display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto}

/* ═══════════════════════════════
   BILLING — NEW HORIZONTAL DESIGN
═══════════════════════════════ */
#bsh{display:flex;flex-direction:column;height:100%;overflow:hidden}
#btop{flex-shrink:0;background:#fff;border-bottom:1px solid rgba(0,166,80,.1);box-shadow:0 2px 10px rgba(0,80,30,.06)}

/* Village-Shop bar */
.vs-bar{padding:9px 12px 7px;display:flex;gap:7px}
.vs-btn{flex:1;background:var(--card3);border:1.5px solid rgba(0,166,80,.18);border-radius:13px;padding:8px 11px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .22s cubic-bezier(.16,1,.3,1);min-width:0;position:relative}
.vs-btn.selected{border-color:var(--pri);background:var(--priL);box-shadow:0 2px 10px rgba(0,166,80,.15)}
.vs-btn:active{transform:scale(.96)}
.vs-ic{font-size:15px;flex-shrink:0}
.vs-txt{flex:1;min-width:0}
.vs-label{font-size:8px;font-weight:700;color:var(--t3);letter-spacing:.5px;text-transform:uppercase}
.vs-val{font-size:12px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.vs-val.vs-val-ph{color:var(--t3);font-weight:400;font-size:11px}
.vs-arr{color:var(--pri);font-size:11px;flex-shrink:0;transition:transform .22s}
.vs-btn.selected .vs-arr{transform:rotate(180deg)}

/* Shop info strip */
.shop-strip{margin:0 12px 6px;background:rgba(0,166,80,.06);border:1px solid rgba(0,166,80,.18);border-radius:11px;padding:7px 12px;display:flex;align-items:center;gap:9px;animation:slideInLeft .25s cubic-bezier(.16,1,.3,1)}
.ss-av{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--pri),var(--pri2));display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0}
.ss-name{font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;font-size:12px;font-weight:700;color:var(--t1)}
.ss-info{font-size:9.5px;color:var(--t3);margin-top:1px}

/* Alert strips */
.astrip{border-radius:10px;padding:6px 11px;font-size:10px;font-weight:600;display:flex;justify-content:space-between;align-items:center;margin:0 12px 5px}
.as-green{background:rgba(0,166,80,.07);border:1px solid rgba(0,166,80,.2);color:var(--pri);animation:slideInLeft .25s both}
.as-amber{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);color:#92400E;animation:slideInLeft .25s both}

/* Search */
.sbar{padding:0 12px 8px;display:flex;gap:7px}
.sbar input{flex:1;background:var(--card3);border:1.5px solid rgba(0,166,80,.15);border-radius:12px;padding:8px 12px;color:var(--t1);font-size:12px;outline:none;transition:border-color .18s}
.sbar input:focus{border-color:rgba(0,166,80,.4)}
.sbar input::placeholder{color:var(--t3)}

/* ═══════════ EZO-STYLE GRID PRODUCTS ═══════════ */
#psc{flex:1;overflow-y:auto}

/* 3-column product GRID */
.prod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 11px 130px}

/* EZO-style product card */
.pgc{background:#fff;border-radius:14px;border:1.5px solid rgba(0,166,80,.1);box-shadow:0 2px 8px rgba(0,80,30,.07);overflow:hidden;cursor:pointer;transition:border-color .2s,box-shadow .2s,transform .15s;position:relative;display:flex;flex-direction:column}
.pgc:active{transform:scale(.93)}
.pgc.in-cart{border-color:var(--pri);box-shadow:0 3px 14px rgba(0,166,80,.22)}

/* Emoji / image area */
.pgc-img{height:72px;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#F0FAF3,#E6F5EB);position:relative;font-size:38px;transition:background .2s}
.pgc.in-cart .pgc-img{background:linear-gradient(160deg,rgba(0,166,80,.12),rgba(0,166,80,.06))}

/* Qty badge on image */
.pgc-badge{position:absolute;top:5px;right:5px;background:var(--pri);color:#fff;border-radius:99px;min-width:20px;height:20px;padding:0 5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;box-shadow:0 2px 7px rgba(0,166,80,.45);animation:popIn .22s cubic-bezier(.16,1,.3,1) both}

/* Info section */
.pgc-body{padding:7px 7px 8px;flex:1;display:flex;flex-direction:column}
.pgc-name{font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;font-size:11px;font-weight:800;color:var(--t1);line-height:1.25;margin-bottom:3px;transition:color .2s}
.pgc.in-cart .pgc-name{color:var(--pri2)}

.pgc-piece{font-size:8.5px;color:var(--t3);margin-bottom:6px}
.pgc-stock-warn{font-size:8px;color:var(--acc);font-weight:700;margin-bottom:4px}

/* ══ FAST-STYLE QTY + RATE ROW ══ */
.pgc-qr-row{display:flex;justify-content:space-between;align-items:flex-end;gap:3px;margin-top:auto;padding-top:3px}
.pgc-qr-box{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:5px;padding:2px 4px;
  cursor:pointer;border:1px solid rgba(0,166,80,.18);
  background:var(--card3);
  transition:transform .1s,border-color .15s,background .15s;
  min-height:18px;min-width:38px;position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
.pgc-qr-box:active{transform:scale(.88)}
.pgc-qty-box{border-color:rgba(0,166,80,.2);background:rgba(0,166,80,.05)}
.pgc-rate-box{border-style:dashed;border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.04);width:100%}
.pgc-qr-active.pgc-qty-box{
  background:var(--priL);border-color:var(--pri);border-style:solid;
  box-shadow:0 1px 4px rgba(0,166,80,.15);
}
.pgc-qr-lbl{
  font-size:5px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;
  color:var(--t3);line-height:1;margin-bottom:0px;
}
.pgc-qty-box .pgc-qr-lbl{color:var(--pri2)}
.pgc-rate-box .pgc-qr-lbl{color:#92400E}
.pgc-qr-active .pgc-qr-lbl{color:var(--pri);font-weight:900}
.pgc-qr-val{
  font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;
  font-size:9px;font-weight:800;line-height:1;
  color:var(--t1);
}
.pgc-qty-box .pgc-qr-val{color:var(--pri2)}
.pgc-qr-active .pgc-qr-val{color:var(--pri);font-size:10px}
.pgc-rate-val{color:#D97706!important}
.pgc-qr-box:active .pgc-qr-val{transform:scale(.9)}

/* Keep old classes for renderCartOnly compat */
.pgc-add{display:none}
.pgc-qty{display:none}

/* ══ INLINE STEPPER (on product card) ══ */
.pgc-stepper{display:flex;align-items:center;justify-content:space-between;gap:1px;margin-top:5px;width:100%}
.pgc-step-btn{
  width:24px;height:26px;border-radius:8px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:900;line-height:1;
  transition:transform .12s,filter .12s;
  -webkit-tap-highlight-color:transparent;flex-shrink:0;
}
.pgc-step-btn:active{transform:scale(.82)}
.pgc-step-minus{background:rgba(239,68,68,.12);color:#DC2626}
.pgc-step-plus{background:var(--pri);color:#fff;box-shadow:0 2px 6px rgba(0,166,80,.35)}
.pgc-step-val{
  flex:1;text-align:center;
  font-family:'Roboto Condensed','Roboto',system-ui,sans-serif;
  font-size:12px;font-weight:700;color:var(--pri2);
  background:rgba(0,166,80,.07);border-radius:6px;padding:3px 0;
  min-width:0;width:100%;cursor:pointer;
  border:1.5px dashed rgba(0,166,80,.4);
  outline:none;overflow:hidden;
  transition:background .12s,transform .12s,border-color .15s;
  -moz-appearance:textfield;
}
.pgc-step-val::-webkit-outer-spin-button,
.pgc-step-val::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.pgc-step-val:focus{
  background:rgba(0,166,80,.13);
  border-color:var(--pri);
  border-style:solid;
  transform:scale(1.04);
}
.pgc-step-val:active{background:rgba(0,166,80,.18);transform:scale(.92)}
.pgc-add-btn{
  width:100%;height:28px;border-radius:8px;border:none;cursor:pointer;
  background:var(--pri);color:#fff;
  font-size:11px;font-weight:800;letter-spacing:.3px;
  display:flex;align-items:center;justify-content:center;gap:3px;
  box-shadow:0 2px 6px rgba(0,166,80,.35);
  transition:transform .12s,filter .12s;
  -webkit-tap-highlight-color:transparent;
  margin-top:5px;
}
.pgc-add-btn:active{transform:scale(.94);filter:brightness(.9)}
.pgc-oos-btn{
  width:100%;height:28px;border-radius:8px;border:1.5px solid rgba(239,68,68,.3);
  background:rgba(239,68,68,.06);color:var(--err);
  font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  margin-top:5px;cursor:not-allowed;
}
.qv3{font-size:14px;font-weight:800;color:var(--pri);min-width:22px;text-align:center;font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;cursor:pointer;transition:transform .15s;border-bottom:1.5px dashed rgba(0,166,80,.4);padding-bottom:1px}
.qv3.bounce{animation:countUp .18s cubic-bezier(.16,1,.3,1)}
.pgc-price{font-size:11px;font-weight:700;color:var(--pri);margin-bottom:1px;cursor:pointer;border-bottom:1.5px dashed transparent;transition:border-color .18s}
.pgc-price:hover,.pgc-price:active{border-bottom-color:rgba(0,166,80,.4)}

/* ══ INLINE EDIT POPUP — Premium Design ══ */
@keyframes ieSlideUp{
  from{opacity:0;transform:translateY(100%)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes ieBgIn{
  from{opacity:0}
  to{opacity:1}
}
@keyframes iePulse{
  0%,100%{box-shadow:0 0 0 0 rgba(0,166,80,.35)}
  50%{box-shadow:0 0 0 8px rgba(0,166,80,0)}
}
.iepop-bg{
  position:fixed;inset:0;z-index:750;
  background:rgba(0,18,8,.75);
  display:flex;align-items:flex-end;justify-content:center;
  animation:ieBgIn .2s ease both;
  -webkit-backdrop-filter:blur(4px);
  backdrop-filter:blur(4px);
}
.iepop{
  background:linear-gradient(175deg,#ffffff 0%,#f5fbf7 100%);
  border-radius:28px 28px 0 0;
  padding:0 0 env(safe-area-inset-bottom,0px);
  width:100%;max-width:430px;
  box-shadow:
    0 -2px 0 rgba(0,166,80,.15),
    0 -20px 60px rgba(0,50,20,.22),
    0 -4px 20px rgba(0,0,0,.08);
  animation:ieSlideUp .32s cubic-bezier(.16,1,.3,1) both;
  overflow:hidden;
}
/* Drag pill */
.iepop-pill{width:44px;height:5px;border-radius:99px;background:rgba(0,166,80,.18);margin:14px auto 0}
/* Gradient header band */
.iepop-hdr{
  background:linear-gradient(135deg,#00A650 0%,#007A38 100%);
  padding:18px 20px 20px;
  margin-bottom:0;
  position:relative;
  overflow:hidden;
}
.iepop-hdr::before{
  content:'';position:absolute;right:-20px;top:-20px;
  width:100px;height:100px;border-radius:50%;
  background:rgba(255,255,255,.08);
}
.iepop-hdr::after{
  content:'';position:absolute;right:20px;bottom:-30px;
  width:70px;height:70px;border-radius:50%;
  background:rgba(255,255,255,.06);
}
.iepop-emoji{
  font-size:30px;display:block;margin-bottom:6px;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,.15));
}
.iepop-title{
  font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;
  font-size:17px;font-weight:800;color:#fff;
  letter-spacing:.2px;margin-bottom:2px;
}
.iepop-sub{font-size:10.5px;color:rgba(255,255,255,.72);font-weight:500;letter-spacing:.3px}
/* Body padding */
.iepop-body{padding:20px 20px 16px}
/* Input area */
.iepop-inp-wrap{
  position:relative;
  background:#fff;
  border:2px solid rgba(0,166,80,.22);
  border-radius:18px;
  display:flex;align-items:center;
  margin-bottom:14px;
  box-shadow:0 2px 12px rgba(0,80,30,.07),inset 0 1px 0 rgba(255,255,255,.9);
  transition:border-color .2s,box-shadow .2s;
  overflow:hidden;
}
.iepop-inp-wrap:focus-within{
  border-color:rgba(0,166,80,.55);
  box-shadow:0 0 0 4px rgba(0,166,80,.1),0 2px 12px rgba(0,80,30,.07);
}
.iepop-prefix{
  font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;
  font-size:24px;font-weight:800;color:rgba(0,166,80,.4);
  padding:0 4px 0 16px;flex-shrink:0;line-height:1;
}
.iepop-inp{
  flex:1;border:none;outline:none;background:transparent;
  font-size:36px;font-weight:800;
  font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;
  color:#003A1A;text-align:center;
  padding:14px 16px 14px 4px;
  -webkit-tap-highlight-color:transparent;
  width:0;min-width:0;
  caret-color:var(--pri);
}
.iepop-inp::placeholder{color:rgba(0,80,30,.2)}
/* +/- row */
.iepop-qrow{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.iepop-qbtn{
  flex:1;height:50px;border-radius:14px;border:none;
  font-size:24px;font-weight:900;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .12s,filter .12s;
  -webkit-tap-highlight-color:transparent;
  line-height:1;letter-spacing:0;
}
.iepop-qbtn:active{transform:scale(.86);filter:brightness(.92)}
.iepop-qmn{
  background:linear-gradient(135deg,#FFF1F1,#FFE4E4);
  color:#DC2626;
  border:1.5px solid rgba(239,68,68,.18);
  box-shadow:0 2px 8px rgba(239,68,68,.1);
}
.iepop-qpl{
  background:linear-gradient(135deg,#E6F5EB,#D1EDD9);
  color:#00A650;
  border:1.5px solid rgba(0,166,80,.2);
  box-shadow:0 2px 8px rgba(0,166,80,.12);
}
/* Info chip */
.iepop-chip{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(0,166,80,.07);
  border:1px solid rgba(0,166,80,.16);
  border-radius:99px;
  padding:5px 11px;
  font-size:10.5px;font-weight:700;color:var(--pri2);
  margin-bottom:18px;
}
/* Save button */
.iepop-save{
  width:100%;padding:16px;
  background:linear-gradient(135deg,#00C060 0%,#00A650 50%,#007A38 100%);
  color:#fff;border:none;border-radius:16px;
  font-size:15px;font-weight:800;cursor:pointer;
  font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;
  letter-spacing:.3px;
  box-shadow:0 6px 22px rgba(0,166,80,.4),inset 0 1px 0 rgba(255,255,255,.25);
  transition:transform .12s,box-shadow .15s;
  margin-bottom:10px;
  position:relative;overflow:hidden;
}
.iepop-save::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15),transparent 60%);
  border-radius:inherit;
}
.iepop-save:active{transform:scale(.96);box-shadow:0 3px 12px rgba(0,166,80,.35)}
/* Cancel */
.iepop-cancel{
  width:100%;padding:13px;
  background:transparent;border:1.5px solid rgba(0,80,30,.1);
  border-radius:14px;font-size:13px;font-weight:700;cursor:pointer;
  font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;
  color:rgba(0,80,30,.45);
  transition:background .15s,color .15s;
}
.iepop-cancel:active{background:rgba(0,80,30,.05);color:var(--t2)}

/* Cart bar */
#cbar{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:2px solid rgba(0,166,80,.15);padding:10px 13px;display:flex;align-items:center;gap:10px;box-shadow:0 -6px 24px rgba(0,80,30,.1);animation:slideUpFade .32s cubic-bezier(.16,1,.3,1)}
.ctot{font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;font-size:24px;font-weight:800;color:var(--pri);transition:all .2s}
.ctot.pop{animation:cartBounce .3s cubic-bezier(.16,1,.3,1)}
.bbtn{padding:12px 20px;border-radius:14px;background:linear-gradient(135deg,#00A650,#007A38);border:none;color:#fff;font-size:13px;font-weight:800;cursor:pointer;box-shadow:0 6px 20px rgba(0,166,80,.4),inset 0 1px 0 rgba(255,255,255,.25);white-space:nowrap;font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;transition:transform .13s,box-shadow .18s;/* PERF FIX: pulse animation removed */}
.bbtn:active{transform:scale(.92)}

/* Cart mini items in bar */
.cart-items-preview{flex:1;min-width:0}
.cip-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:3px}
.cip-row::-webkit-scrollbar{display:none}
.cip-chip{background:rgba(0,166,80,.1);border:1px solid rgba(0,166,80,.2);border-radius:99px;padding:3px 9px;font-size:10px;font-weight:700;color:var(--pri);white-space:nowrap;flex-shrink:0;transition:all .2s}



/* Empty state */
.bill-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:30px;text-align:center}
.bill-empty .eic{font-size:52px;margin-bottom:14px;display:block;animation:float 3s ease-in-out infinite}

/* ══ VILLAGE/SHOP PICKER ══ */
.vlist-item{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--card3);border-radius:13px;margin-bottom:8px;cursor:pointer;border:1.5px solid transparent;transition:all .2s}
.vlist-item:active{transform:scale(.97)}
.vlist-item.sel{background:var(--priL);border-color:rgba(0,166,80,.3)}
.vi-name{font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;font-size:13px;font-weight:700;color:var(--t1)}
.vi-sub{font-size:10px;color:var(--t3);margin-top:2px}
.vi-badge{background:rgba(0,166,80,.1);border:1px solid rgba(0,166,80,.2);border-radius:99px;padding:2px 8px;font-size:10px;font-weight:700;color:var(--pri);white-space:nowrap}

.slist-item{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--card3);border-radius:13px;margin-bottom:8px;cursor:pointer;border:1.5px solid transparent;transition:all .2s}
.slist-item:active{transform:scale(.97)}
.slist-item.sel{background:var(--priL);border-color:rgba(0,166,80,.3)}
.si-av{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--pri),var(--pri2));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;color:#fff}
.si-name{font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;font-size:12.5px;font-weight:700;color:var(--t1)}
.si-info{font-size:10px;color:var(--t3);margin-top:2px}

/* Search in picker */
.picker-search{background:var(--card3);border:1.5px solid rgba(0,166,80,.2);border-radius:12px;padding:10px 13px;color:var(--t1);font-size:13px;outline:none;width:100%;margin-bottom:13px;transition:border-color .18s}
.picker-search:focus{border-color:rgba(0,166,80,.4)}
.picker-search::placeholder{color:var(--t3)}

/* ══ VILLAGES TAB ══ */
.vcard{background:#fff;border-radius:17px;border:1.5px solid rgba(0,166,80,.12);padding:14px;margin-bottom:10px;box-shadow:var(--shadow2)}
.vc-head{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.vc-ic{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--pri),var(--pri2));display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;flex-shrink:0}
.vc-name{font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;font-size:14px;font-weight:800;color:var(--t1)}
.vc-meta{font-size:10px;color:var(--t3);margin-top:2px}
.shop-row{display:flex;align-items:center;gap:8px;padding:9px 10px;background:var(--card3);border-radius:11px;margin-bottom:7px}
.shop-row:last-child{margin-bottom:0}
.sr-av{width:32px;height:32px;border-radius:9px;background:var(--priL);border:1.5px solid rgba(0,166,80,.2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.sr-name{font-size:12px;font-weight:700;color:var(--t1)}
.sr-info{font-size:9.5px;color:var(--t3);margin-top:1px}
.sr-actions{display:flex;gap:5px;margin-left:auto}

/* ══ DASHBOARD ══ */
.sgr{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px}
.sc2{background:#fff;border-radius:16px;padding:14px;border:1.5px solid rgba(0,166,80,.1);box-shadow:var(--shadow2)}
.si2{font-size:21px;margin-bottom:8px;display:block}
.slb{font-size:9px;color:var(--t3);letter-spacing:.5px;margin-bottom:3px;text-transform:uppercase;font-weight:600}
.sv{font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;font-size:15px;font-weight:800;line-height:1.2;margin-bottom:2px}
.ss2{font-size:10px;color:var(--t3)}
.tcard{background:#fff;border:1.5px solid rgba(0,166,80,.12);border-radius:18px;padding:15px;margin-bottom:12px;box-shadow:var(--shadow2)}
.bm2{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(0,166,80,.08)}
.bm2:last-child{border-bottom:none}
.bmn{font-size:12px;font-weight:700;color:var(--pri)}.bmi{font-size:9.5px;color:var(--t3);margin-top:1px}

/* Gaon-wise sale table */
.gvr-row{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid rgba(0,166,80,.07)}
.gvr-row:last-child{border-bottom:none;padding-bottom:0}
.gvr-rank{width:26px;height:26px;border-radius:99px;background:var(--card3);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;font-weight:800}
.gvr-info{flex:1;min-width:0}
.gvr-name{font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;font-size:12.5px;font-weight:800;color:var(--t1)}
.gvr-meta{font-size:9.5px;color:var(--t3);margin-top:2px}
.gvr-right{text-align:right}
.gvr-amt{font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;font-size:14px;font-weight:800;color:var(--pri)}
.gvr-pct{font-size:9.5px;color:var(--t3);margin-top:2px}
.gvr-bar-wrap{margin-top:5px;height:3px;background:rgba(0,166,80,.1);border-radius:99px;overflow:hidden}
.gvr-bar{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--pri),var(--pri3));transition:width 1s cubic-bezier(.2,.8,.3,1)}

/* Grand total card */
.grand-total{background:linear-gradient(135deg,var(--pri),var(--pri2));border-radius:16px;padding:15px 17px;display:flex;justify-content:space-between;align-items:center;margin-top:12px;box-shadow:0 6px 20px rgba(0,166,80,.3)}
.gt-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.75);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.gt-val{font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;font-size:24px;font-weight:800;color:#fff}
.gt-right{text-align:right}
.gt-bills{font-size:12px;color:rgba(255,255,255,.8)}
.gt-shops{font-size:10px;color:rgba(255,255,255,.6);margin-top:2px}

/* ══ UDHARI ══ */
.ucard{background:#fff;border-radius:17px;border:1.5px solid rgba(0,166,80,.12);padding:14px;margin-bottom:9px;cursor:pointer;transition:transform .13s,border-color .18s,box-shadow .18s;box-shadow:var(--shadow2)}

/* ══ NUM KB ══ */

/* ══ RECEIPT — Thermal Paper Style (Exact Match) ══ */
.rcpt{background:#fff;color:#000;border-radius:2px;padding:14px 13px 13px;font-family:'Courier New','Courier',monospace;max-width:290px;margin:0 auto;box-shadow:0 6px 28px rgba(0,0,0,.18);font-size:12.5px;line-height:1.55;border:1px solid #ccc;overflow:hidden;letter-spacing:.2px}
.rcpt::before,.rcpt::after{content:'';display:block;height:8px;background:repeating-linear-gradient(90deg,#fff 0,#fff 8px,#ececea 8px,#ececea 16px);margin:0 -13px}
.rcpt::before{margin-bottom:12px;margin-top:-14px}
.rcpt::after{margin-top:12px;margin-bottom:-13px}
.rch{text-align:center;margin-bottom:6px}
.rch1{font-size:22px;font-weight:900;letter-spacing:3px;text-transform:uppercase;line-height:1.3} /* v85: photo match — bada */
.rch2{font-size:12px;letter-spacing:.5px;color:#000;margin-top:3px;font-weight:400}
.rdv{border:none;border-bottom:1px dashed #666;margin:5px 0}
.rcr{font-size:12px;margin-bottom:1px;letter-spacing:.2px}
.rctbl{width:100%;border-collapse:collapse;font-size:12px}
.rctbl thead tr{border-bottom:1px dashed #666}
.rctbl th{padding:4px 2px 4px 0;font-weight:700;text-align:left;font-size:12px;letter-spacing:.3px}
.rctbl th:not(:first-child){text-align:right;padding-right:0}
.rctbl td{padding:3px 2px 3px 0;vertical-align:top;font-size:12px}
.rctbl td:not(:first-child){text-align:right;padding-right:0}
.rct{text-align:center;font-size:24px;font-weight:900;padding:8px 0 6px;letter-spacing:2px;font-family:'Courier New','Courier',monospace} /* v85: photo match */
.rcfree{font-size:12px;margin:4px 0}
.rcsch{text-align:center;font-size:12px;font-weight:700;margin:4px 0;letter-spacing:.5px}
.rcpr{margin-top:7px}
.rcprt{font-size:12px;font-weight:900;text-align:center;letter-spacing:1px;margin-bottom:3px;border-bottom:1px dashed #666;padding-bottom:3px}
.rcprr{display:flex;justify-content:space-between;font-size:12px;padding:2px 0}
.rcft{text-align:center;font-size:12px;color:#000;margin-top:8px;padding-top:6px;border-top:1px dashed #666;line-height:1.9;letter-spacing:.3px}
.rc-shop{margin:5px 0;font-size:12px}
.rc-shop-title{font-weight:900;font-size:15px;margin-bottom:3px;letter-spacing:.5px} /* v85: photo match */
.rc-shop-row{font-size:12px;padding:1px 0}

.ptog{display:flex;align-items:center;gap:11px;background:var(--card3);border:1.5px solid rgba(0,166,80,.15);border-radius:13px;padding:11px 14px;cursor:pointer;margin-bottom:12px;transition:all .18s}

<script>
/* ══════════════════════════════════════════════════════════════
   FIREBASE REALTIME DATABASE — Mobile+PIN Auth v109
   
   Architecture:
   Firebase DB path: /accounts/{mobile}/
     ├── ownerPin (hashed)
     ├── ownerSecQ, ownerSecA
     ├── ownerBizName
     ├── data (saara app data)
     ├── ts, device
   
   Owner login  → mobile+PIN → Firebase se data load → real-time sync
   Staff login  → owner mobile se staffList fetch → staff mobile+PIN match
   Zero delay   → .on('value') real-time listener
   ══════════════════════════════════════════════════════════════ */

const _FB_CONFIG={
  apiKey:"AIzaSyA3Pg2DcqlRm6nlDQyDqjvDjgnIPpVwWKg",
  authDomain:"soneybilling.firebaseapp.com",
  databaseURL:"https://soneybilling-default-rtdb.firebaseio.com",
  projectId:"soneybilling",
  storageBucket:"soneybilling.firebasestorage.app",
  messagingSenderId:"882474777348",
  appId:"1:882474777348:web:84790087eb4424dae7ee51"
};

let _fbApp=null, _fbDB=null, _fbRef=null;
let _fbSyncEnabled=false, _fbListening=false;
let _fbMyLastTs=0, _fbLastUpload=0;
let _ownerMobileSession=''; /* Current session ka owner mobile */

/* SHA-256 */
async function _sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function _fbDeviceId(){
  let id=localStorage.getItem('soney_device_id');
  if(!id){id='dev_'+Math.random().toString(36).slice(2,10);localStorage.setItem('soney_device_id',id);}
  return id;
}

function _fbInit(){
  try{
    if(typeof firebase==='undefined')return false;
    if(!firebase.apps.length)_fbApp=firebase.initializeApp(_FB_CONFIG);
    else _fbApp=firebase.apps[0];
    _fbDB=firebase.database(_fbApp);
    return true;
  }catch(e){console.error('Firebase init fail:',e);return false;}
}

/* Owner ka Firebase path */
function _ownerPath(mobile){
  return 'accounts/'+mobile.replace(/\D/g,'');
}

/* ── PIN Hash ── */
/* ── PIN Hash v2 ──
   OLD BUG: _hashPin() used ONE global static salt for every single user
   ('soney_'+pin+'_secure'). Result: every owner who picks PIN "1234"
   gets the EXACT SAME hash. If the database is ever read by someone
   it shouldn't be, a single precomputed table (just 10,000 SHA-256
   hashes, since PINs are numeric) cracks every account's PIN instantly.
   FIX: salt with the user's own mobile number too, so two different
   users with the same PIN never produce the same hash — a precomputed
   table no longer works, attacker would need to brute-force per-account.
   Old _hashPin() kept as-is so already-registered owners can still log
   in; on a successful login we silently upgrade their stored hash to
   v2 (see login flow). */
/* ── PIN brute-force lockout ──
   OLD GAP: login screens allowed unlimited PIN attempts with no delay —
   anyone could sit and try PIN 0000-9999 (only 10,000 combos) until one
   worked. FIX: after 5 wrong attempts for a given mobile number, force
   a cooldown that grows each time, tracked in localStorage so it
   survives a page reload. This is a client-side speed-bump (a hostile
   actor scripting Firebase directly could bypass it) — real protection
   still needs locked-down Firebase rules — but it stops casual brute
   forcing via the app itself and slows down anyone trying manually. */
function _lockKey(mob){ return 'soney_lock_'+mob; }
function _checkLockout(mob){
  try{
    const raw=localStorage.getItem(_lockKey(mob));
    if(!raw) return {locked:false};
    const st=JSON.parse(raw);
    if(st.until && Date.now()<st.until){
      return {locked:true, secsLeft:Math.ceil((st.until-Date.now())/1000)};
    }
    return {locked:false, fails:st.fails||0};
  }catch(e){ return {locked:false}; }
}
function _recordFailedAttempt(mob){
  try{
    const raw=localStorage.getItem(_lockKey(mob));
    const st=raw?JSON.parse(raw):{fails:0};
    st.fails=(st.fails||0)+1;
    if(st.fails>=5){
      const cooldownSec=Math.min(300, 30*(st.fails-4)); /* 30s,60s,90s... capped at 5 min */
      st.until=Date.now()+cooldownSec*1000;
    }
    localStorage.setItem(_lockKey(mob), JSON.stringify(st));
    return st;
  }catch(e){ return {}; }
}
function _clearLockout(mob){ try{ localStorage.removeItem(_lockKey(mob)); }catch(e){} }

async function _hashPin(pin){ return await _sha256('soney_'+pin+'_secure'); }
async function _hashPinV2(mobile, pin){ return await _sha256('soney_v2_'+String(mobile)+'_'+pin+'_secure2'); }

/* Verify a staff PIN against a staff record. Supports legacy records that
   still have a plaintext `pin` field (pre-v110) — on a successful legacy
   match it silently upgrades the record to a hashed `pinHash` and removes
   the plaintext field, then persists via dbSave(). */
async function _staffPinVerify(staff, mobile, pin){
  if(!staff) return false;
  if(staff.pinHash){ return (await _hashPinV2(mobile,pin))===staff.pinHash; }
  if(staff.pin!=null){
    const ok = staff.pin===pin;
    if(ok){
      try{
        const idx=(ST.staffList||[]).findIndex(s=>s.id===staff.id);
        if(idx>-1){
          const upd={...ST.staffList[idx]};
          delete upd.pin;
          upd.pinHash=await _hashPinV2(mobile,pin);
          ST.staffList[idx]=upd;
          staff.pinHash=upd.pinHash; delete staff.pin;
          dbSave();
        }
      }catch(e){}
    }
    return ok;
  }
  return false;
}

/* ── Upload to Firebase ── */
function _fbUpload(){
  if(!_fbSyncEnabled||!_fbRef)return;
  const now=Date.now();
  if(now-_fbLastUpload<600){clearTimeout(window._fbUpRT);window._fbUpRT=setTimeout(_fbUpload,700);return;}
  _fbLastUpload=now;
  _fbMyLastTs=now;
  let payload;
  try{payload=_buildPayload();}catch(e){payload=_sqlGet('soney_data');}
  if(!payload)return;
  _fbRef.update({data:payload,ts:now,device:_fbDeviceId()})
    .then(()=>_fbStatusBadge('✅ Synced','#00A650'))
    .catch(e=>{ console.warn('FB upload:',e); _fbStatusBadge('❌ Sync fail','#EF4444'); });
}

/* ── Real-time listener ── */
function _fbStartListen(){
  if(_fbListening||!_fbRef)return;
  _fbListening=true;
  _fbRef.child('data').on('value',snap=>{
    const data=snap.val();
    if(!data)return;
    /* Skip our own upload */
    _fbRef.child('ts').once('value',tsSnap=>{
      const ts=tsSnap.val();
      if(ts&&ts===_fbMyLastTs)return;
      if(window._saveRT){setTimeout(()=>{ if(!window._saveRT)_fbApplyRemote(data); },2000);return;}
      _fbApplyRemote(data);
    });
  });
}

function _fbStopListen(){
  if(_fbRef)try{_fbRef.off();}catch(e){}
  _fbListening=false;
}

/* ══════════════════════════════════════════════════════════════
   SYNC MERGE ENGINE — v110
   PROBLEM (found in v109): _fbApplyRemote used to blindly REPLACE
   local data with whatever arrived from Firebase. If device A made
   an offline bill/payment that hadn't synced yet, and device B's
   snapshot landed first, A's local replace would WIPE A's own
   unsynced records with B's older data.
   FIX: merge local + remote by record id instead of overwriting.
   Append-only logs (bills, expenses, payments, stock logs) are
   UNION'd — nothing is ever dropped. Udhari is rebuilt by replaying
   the union of both sides' history entries, so running balances stay
   correct even if both devices billed/paid the same shop offline.
   ══════════════════════════════════════════════════════════════ */

/* Generic id-based array merge.
   keepNewer=false → append-only log: if id exists on both sides, keep
                      local copy as-is (data is identical/immutable anyway).
   keepNewer=true  → mutable record: on conflict, keep whichever copy has
                      the larger updatedAt (falls back to date/id). */
function _mergeArrById(localArr, remoteArr, keepNewer){
  localArr=Array.isArray(localArr)?localArr:[];
  remoteArr=Array.isArray(remoteArr)?remoteArr:[];
  const map=new Map();
  localArr.forEach(it=>{ if(it&&it.id!=null) map.set(it.id,it); });
  remoteArr.forEach(it=>{
    if(!it||it.id==null) return;
    const ex=map.get(it.id);
    if(!ex){ map.set(it.id,it); return; }
    if(!keepNewer) return; /* local already has this id — keep local copy */
    const exT=ex.updatedAt||ex.date||ex.id||0, itT=it.updatedAt||it.date||it.id||0;
    map.set(it.id, itT>exT?it:ex);
  });
  return Array.from(map.values());
}

/* Udhari is a running account per shop with an append-only `history` log.
   Merging by "newer wins" would lose one side's bill/payment entries.
   Instead: union ALL history entries (dedup by signature), replay them
   in date order to recompute amount/paid/balAfter from scratch — this is
   always correct regardless of which side synced first. */
function _mergeUdhari(localArr, remoteArr){
  localArr=Array.isArray(localArr)?localArr:[];
  remoteArr=Array.isArray(remoteArr)?remoteArr:[];
  const shopKey=u=>u.shopId!=null?('S'+u.shopId+'_'+u.villageId):('N'+(u.shopName||'').toLowerCase().trim());
  const groups=new Map();
  [...localArr,...remoteArr].forEach(u=>{
    const k=shopKey(u);
    if(!groups.has(k)) groups.set(k,{meta:u,entries:[],sigs:new Set()});
    const g=groups.get(k);
    if((u.shopOwner||u.shopMobile)&&!(g.meta.shopOwner||g.meta.shopMobile)) g.meta=u;
    (u.history||[]).forEach(h=>{
      const sig=h.type+'|'+h.billNo+'|'+h.date+'|'+h.amount;
      if(!g.sigs.has(sig)){ g.sigs.add(sig); g.entries.push(h); }
    });
  });
  const result=[];
  groups.forEach(g=>{
    if(!g.entries.length) return;
    const hist=g.entries.slice().sort((a,b)=>(a.date||0)-(b.date||0));
    let amount=0,paid=0;
    const replayed=hist.map(h=>{
      let balAfter;
      if(h.type==='bill'){ amount+=(h.amount||0); balAfter=Math.max(0,amount-paid); }
      else { paid=Math.min(amount,paid+(h.amount||0)); balAfter=Math.max(0,amount-paid); }
      return {...h, balAfter};
    });
    const cleared = amount>0 && paid>=amount;
    result.push({...g.meta, amount, paid, cleared,
      clearedDate: cleared?(g.meta.clearedDate||replayed[replayed.length-1]?.date):null,
      history:replayed});
  });
  return result;
}

/* Top-level merge: combines a local data-object and a remote data-object
   into one converged object that contains everything from both sides. */
function _mergeData(local, remote){
  if(!remote) return local||{};
  if(!local) return remote||{};
  const out={...remote, ...local};
  /* Append-only logs — union, never drop either side */
  out.bills            = _mergeArrById(local.bills, remote.bills, false);
  out.expenses         = _mergeArrById(local.expenses, remote.expenses, false);
  out.customerPayments = _mergeArrById(local.customerPayments, remote.customerPayments, false);
  out.stockHistory     = _mergeArrById(local.stockHistory, remote.stockHistory, false);
  out.stockInHistory   = _mergeArrById(local.stockInHistory, remote.stockInHistory, false);
  out.deletedBills     = _mergeArrById(local.deletedBills, remote.deletedBills, false);
  out.walkingCustomers = _mergeArrById(local.walkingCustomers, remote.walkingCustomers, true);
  /* Mutable masters — union by id, newer edit wins on real conflict */
  out.products  = _mergeArrById(local.products, remote.products, true);
  out.staffList = _mergeArrById(local.staffList, remote.staffList, true);
  /* Villages — merge village list by id, AND merge each village's shops array */
  const vMap=new Map();
  (local.villages||[]).forEach(v=>vMap.set(v.id,{...v}));
  (remote.villages||[]).forEach(v=>{
    const ex=vMap.get(v.id);
    if(!ex){ vMap.set(v.id,{...v}); return; }
    const shops=_mergeArrById(ex.shops,v.shops,true);
    const base=(v.updatedAt||0)>(ex.updatedAt||0) ? v : ex;
    vMap.set(v.id,{...base, shops});
  });
  out.villages = Array.from(vMap.values());
  /* Udhari — replay-merge for guaranteed-correct balances */
  out.udhari = _mergeUdhari(local.udhari, remote.udhari);
  /* lastBackupAt: always keep whichever device's backup is more recent */
  out.lastBackupAt = Math.max(local.lastBackupAt||0, remote.lastBackupAt||0);
  /* Disambiguate any duplicate bill numbers created by two offline
     devices billing the same shop at the same time. Record `id` (used
     everywhere else internally) is untouched — only the printed/display
     billNo of the later-created duplicate gets a -A/-B suffix. */
  const seen=new Map();
  out.bills=(out.bills||[]).slice().sort((a,b)=>(a.id||0)-(b.id||0)).map(b=>{
    if(!b.billNo) return b;
    const n=seen.get(b.billNo)||0; seen.set(b.billNo,n+1);
    return n===0 ? b : {...b, billNo:b.billNo+'-'+String.fromCharCode(64+n)};
  });
  return out;
}

function _fbApplyRemote(data){
  try{
    let remoteObj=null;
    try{ remoteObj = typeof data==='string' ? JSON.parse(data) : data; }catch(e){ remoteObj=null; }
    let localObj={};
    try{ localObj = JSON.parse(_sqlGet('soney_data')||'{}'); }catch(e){ localObj={}; }
    const merged = remoteObj ? _mergeData(localObj, remoteObj) : localObj;
    const mergedPayload = JSON.stringify(merged);
    _sqlSet('soney_data',mergedPayload);
    _persistSQLite().catch(()=>{});
    const prevStaff=_currentStaff;
    dbLoad();
    _currentStaff=prevStaff;
    if(ST.currentStaffId&&!_currentStaff){
      _currentStaff=(ST.staffList||[]).find(s=>s.id===ST.currentStaffId)||null;
    }
    const body=document.getElementById('body');
    const scrollY=body?body.scrollTop:0;
    const cartActive=ST.tab==='billing'&&Object.keys(ST.cart||{}).length>0;
    if(!cartActive){ render(); setTimeout(()=>{if(body)body.scrollTop=scrollY;},10); }
    _fbStatusBadge('🔄 Synced','#2563EB');
    /* Push the converged result back to Firebase so the OTHER device
       also receives anything that only local had — otherwise that
       device could later overwrite us again with its stale snapshot.
       Skipped when merge added nothing new (merged === remote already). */
    if(_fbRef && mergedPayload!==JSON.stringify(remoteObj)){
      const now=Date.now();
      _fbMyLastTs=now;
      _fbRef.update({data:mergedPayload, ts:now, device:_fbDeviceId()}).catch(()=>{});
    }
  }catch(e){console.warn('FB apply:',e);}
}

function _fbStatusBadge(txt,col){
  const el=document.getElementById('fb_status_badge');
  if(el){el.textContent=txt;el.style.color=col;}
}

function _fbShowBadge(msg){
  /* Small floating toast for sync status */
  let b=document.getElementById('_fb_sync_badge');
  if(!b){b=document.createElement('div');b.id='_fb_sync_badge';b.style.cssText='position:fixed;top:12px;right:12px;z-index:99998;background:rgba(0,0,0,.75);color:#fff;font-size:11px;font-weight:700;padding:5px 10px;border-radius:99px;pointer-events:none;transition:opacity .3s';document.body.appendChild(b);}
  b.textContent=msg;b.style.opacity='1';
  clearTimeout(b._t);b._t=setTimeout(()=>b.style.opacity='0',2000);
}

/* ── Bind Owner Login ── */
function _bindOwnerLogin(root){
  const mobEl=root.querySelector('#ol-mob');
  const pinEl=root.querySelector('#ol-pin');
  const errEl=root.querySelector('#ol-err');
  const btn  =root.querySelector('#ol-btn');

  if(!mobEl.value) mobEl.focus(); else pinEl.focus();
  pinEl.addEventListener('keydown',e=>{ if(e.key==='Enter')btn.click(); });
  mobEl.addEventListener('keydown',e=>{ if(e.key==='Enter')pinEl.focus(); });

  root.querySelector('#ol-switch-reg')?.addEventListener('click',()=>{
    root.querySelector('#login-content').innerHTML=_ownerRegisterHTML();
    _bindOwnerRegister(root);
  });

  root.querySelector('#ol-forgot')?.addEventListener('click',()=>_showOwnerForgotPin(root));

  let _busy=false;
  btn.addEventListener('click',async()=>{
    if(_busy)return;
    const mob=(mobEl.value||'').trim();
    const pin=(pinEl.value||'').trim();
    errEl.textContent='';

    if(!/^\d{10}$/.test(mob)){errEl.textContent='❌ 10 digit mobile dalo';mobEl.focus();return;}
    if(!pin){errEl.textContent='❌ PIN dalo';pinEl.focus();return;}

    const _lk=_checkLockout(mob);
    if(_lk.locked){
      errEl.textContent=`⏳ Bahut attempts galat ho gaye — ${_lk.secsLeft}s baad try karo`;
      pinEl.value=''; pinEl.focus(); return;
    }

    _busy=true; btn.textContent='Checking...'; btn.style.opacity='.7';

    try{
      /* Firebase se owner data fetch karo */
      const snap=await _fbDB.ref(_ownerPath(mob)).once('value');
      const ownerData=snap.val();

      if(!ownerData||!ownerData.ownerPin){
        errEl.textContent='❌ Yeh mobile registered nahi hai';
        _busy=false; btn.textContent='Login Karo 🚀'; btn.style.opacity='1';
        mobEl.focus(); return;
      }

      const pinHashV2=await _hashPinV2(mob,pin);
      let _pinOk=(pinHashV2===ownerData.ownerPin);
      let _needsUpgrade=false;
      if(!_pinOk){
        const pinHashOld=await _hashPin(pin);
        if(pinHashOld===ownerData.ownerPin){ _pinOk=true; _needsUpgrade=true; }
      }
      if(!_pinOk){
        const _afterFail=_recordFailedAttempt(mob);
        errEl.textContent = _afterFail.until
          ? `⏳ Bahut attempts galat — ${Math.ceil((_afterFail.until-Date.now())/1000)}s baad try karo`
          : '❌ PIN galat hai!';
        _shake(root.querySelector('div[style*="background:#fff"]'));
        pinEl.value=''; pinEl.focus();
        _busy=false; btn.textContent='Login Karo 🚀'; btn.style.opacity='1';
        return;
      }
      _clearLockout(mob);
      /* Account was using the old weaker globally-salted hash — silently
         upgrade it to v2 now that we've verified the PIN is correct. */
      if(_needsUpgrade){
        try{ await _fbDB.ref(_ownerPath(mob)+'/ownerPin').set(pinHashV2); ownerData.ownerPin=pinHashV2; }catch(e){}
      }

      /* ✅ Login success */
      _ownerMobileSession=mob;
      localStorage.setItem('soney_owner_mobile',mob);

      /* Load data from Firebase */
      if(ownerData.data){
        _sqlSet('soney_data',ownerData.data);
        await _persistSQLite().catch(()=>{});
        dbLoad();
      }

      /* Set Firebase ref for this owner */
      _fbRef=_fbDB.ref(_ownerPath(mob));
      _fbSyncEnabled=true;

      /* Start real-time listener */
      _fbStartListen();

      /* Remove login screen */
      root.style.transition='opacity .3s'; root.style.opacity='0';
      setTimeout(()=>{ root.remove(); _currentStaff=null; ST.currentStaffId=null; render(); },300);
      _showToast('✅ Welcome back!','#00A650');

    }catch(e){
      errEl.textContent='❌ Network error — internet check karo';
      _busy=false; btn.textContent='Login Karo 🚀'; btn.style.opacity='1';
    }
  });
}

/* ── Bind Owner Register ── */
function _bindOwnerRegister(root){
  const bizEl =root.querySelector('#rg-biz');
  const mobEl =root.querySelector('#rg-mob');
  const pinEl =root.querySelector('#rg-pin');
  const secqEl=root.querySelector('#rg-secq');
  const secaEl=root.querySelector('#rg-seca');
  const errEl =root.querySelector('#rg-err');
  const btn   =root.querySelector('#rg-btn');

  bizEl.focus();

  root.querySelector('#rg-switch-login')?.addEventListener('click',()=>{
    root.querySelector('#login-content').innerHTML=_ownerLoginHTML();
    _bindOwnerLogin(root);
  });

  let _busy=false;
  btn.addEventListener('click',async()=>{
    if(_busy)return;
    const biz =(bizEl.value||'').trim();
    const mob =(mobEl.value||'').trim();
    const pin =(pinEl.value||'').trim();
    const secq=(secqEl.value||'').trim();
    const seca=(secaEl.value||'').trim().toLowerCase();
    errEl.textContent='';

    if(!biz){errEl.textContent='❌ Business name dalo';bizEl.focus();return;}
    if(!/^\d{10}$/.test(mob)){errEl.textContent='❌ 10 digit mobile dalo';mobEl.focus();return;}
    if(!pin||pin.length<4){errEl.textContent='❌ PIN kam se kam 4 digit';pinEl.focus();return;}
    if(!secq){errEl.textContent='❌ Security question choose karo';secqEl.focus();return;}
    if(!seca||seca.length<2){errEl.textContent='❌ Security answer dalo';secaEl.focus();return;}

    _busy=true; btn.textContent='Register ho raha hai...'; btn.style.opacity='.7';

    try{
      /* Check if mobile already registered */
      const existing=await _fbDB.ref(_ownerPath(mob)+'/ownerPin').once('value');
      if(existing.val()){
        errEl.textContent='❌ Yeh mobile already registered hai — Login karo';
        _busy=false; btn.textContent='Register Karo ✨'; btn.style.opacity='1';
        return;
      }

      const pinHash=await _hashPinV2(mob,pin);

      /* Save to Firebase */
      await _fbDB.ref(_ownerPath(mob)).update({
        ownerPin:pinHash,
        ownerSecQ:secq,
        ownerSecA:seca,
        ownerBizName:biz,
        createdAt:Date.now(),
      });

      /* Update ST */
      ST.ownerMobile=mob; ST.ownerPin=pinHash;
      ST.ownerSecQ=secq; ST.ownerSecA=seca;
      ST.ownerBizName=biz; ST.isRegistered=true;
      ST.businessName=biz;
      if(!ST.profile)ST.profile={};
      ST.profile.bizName=biz;

      _ownerMobileSession=mob;
      localStorage.setItem('soney_owner_mobile',mob);
      _fbRef=_fbDB.ref(_ownerPath(mob));
      _fbSyncEnabled=true;

      /* Push initial data */
      dbSave();
      _fbStartListen();

      root.style.transition='opacity .3s'; root.style.opacity='0';
      setTimeout(()=>{ root.remove(); _currentStaff=null; ST.currentStaffId=null; render(); },300);
      _showToast('🎉 Account ban gaya! Welcome, '+biz,'#00A650');

    }catch(e){
      errEl.textContent='❌ Network error — internet check karo';
      _busy=false; btn.textContent='Register Karo ✨'; btn.style.opacity='1';
    }
  });
}

      if(!ownerMobile){
        errEl.textContent='❌ Yeh mobile kisi bhi account mein registered nahi';
        _busy=false; btn.textContent='Login Karo 🚀'; btn.style.opacity='1';
        mobEl.focus(); return;
      }

      /* Owner ka data fetch karo */
      const ownerSnap=await _fbDB.ref(_ownerPath(ownerMobile)).once('value');
      const ownerData=ownerSnap.val();
      if(!ownerData){
        errEl.textContent='❌ Owner account nahi mila';
        _busy=false; btn.textContent='Login Karo 🚀'; btn.style.opacity='1';
        return;
      }

      /* Load owner data pehle */
      if(ownerData.data){
        _sqlSet('soney_data',ownerData.data);
        await _persistSQLite().catch(()=>{});
        dbLoad();
      }

      /* Staff match karo */
      const candidate=(ST.staffList||[]).find(s=>s.mobile===mob&&s.active!==false);
      const staff=(candidate&&await _staffPinVerify(candidate,mob,pin))?candidate:null;
      if(!staff){
        const _af1=_recordFailedAttempt(mob);
        errEl.textContent = _af1.until
          ? `⏳ Bahut attempts galat — ${Math.ceil((_af1.until-Date.now())/1000)}s baad try karo`
          : '❌ PIN galat hai ya account inactive hai!';
        _shake(root.querySelector('div[style*="background:#fff"]'));
        pinEl.value=''; pinEl.focus();
        _busy=false; btn.textContent='Login Karo 🚀'; btn.style.opacity='1';
        return;
      }
      _clearLockout(mob);

      /* ✅ Staff login success */
      _currentStaff=staff;
      ST.currentStaffId=staff.id;
      _ownerMobileSession=ownerMobile;
      localStorage.setItem('soney_staff_owner_mobile_'+mob, ownerMobile);

      /* Owner ke data ka real-time listener */
      _fbRef=_fbDB.ref(_ownerPath(ownerMobile));
      _fbSyncEnabled=true;
      _fbStartListen();

      root.style.transition='opacity .3s'; root.style.opacity='0';
      setTimeout(()=>{ root.remove(); render(); },300);
      _showToast('✅ Welcome, '+staff.name+'!','#6366f1');

    }catch(e){
      errEl.textContent='❌ Network error — internet check karo';
      _busy=false; btn.textContent='Login Karo 🚀'; btn.style.opacity='1';
    }
  });
}

/* ══════ DB — SQLite via IndexedDB (sql.js) ══════
   • sql.js: SQLite compiled to WebAssembly — fully offline
   • IndexedDB: persistent storage (no 5MB limit)
   • dbLoad() / dbSave() API stays identical — all 50+ callers unchanged
   • Auto-backup: every save also stores a rolling backup
════════════════════════════════════════════════════ */

/* ── SQLite engine global ── */
let _sqlDB = null;          // sql.js Database instance
let _SQL   = null;          // sql.js module
let _dbReady = false;       // flag: DB initialized?
const IDB_NAME  = "SoneyBillingDB";
const IDB_STORE = "sqlite";
const IDB_KEY   = "soney_main";
const IDB_BK_KEY= "soney_backup";   // rolling backup key

/* ── IndexedDB helpers ── */
/* FIX: Singleton cached connection — prevents "object store not found" error.
   Root cause: each new open() call returned a connection where the store might
   not exist yet (race condition + no upgrade callback on cached versions).
   Solution: open once, cache the connection, reuse for all operations.
   Version bumped to 2 → forces onupgradeneeded to run and create store if missing. */
let _idbConn = null;  // singleton IDB connection

function _idbOpen(){
  if(_idbConn) return Promise.resolve(_idbConn);
  return new Promise((res,rej)=>{
    /* Version 2: forces upgrade check — creates store if it was never made */
    const req = indexedDB.open(IDB_NAME, 2);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      /* Create store only if it doesn't exist yet (handles v1→v2 upgrade too) */
      if(!db.objectStoreNames.contains(IDB_STORE)){
        db.createObjectStore(IDB_STORE);
      }
    };
    req.onsuccess = e => {
      _idbConn = e.target.result;
      /* If connection is unexpectedly closed (browser GC), reset singleton */
      _idbConn.onclose = () => { _idbConn = null; };
      _idbConn.onerror = () => { _idbConn = null; };
      res(_idbConn);
    };
    req.onerror = e => rej(e.target.error);
    req.onblocked = () => {
      /* Another tab has an old version open — wait */
      console.warn("[Soney IDB] Upgrade blocked by another tab. Please close other tabs.");
    };
  });
}

async function _idbGet(key){
  const db = await _idbOpen();
  return new Promise((res,rej)=>{
    try{
      const tx  = db.transaction(IDB_STORE,"readonly");
      const req = tx.objectStore(IDB_STORE).get(key);
      req.onsuccess = e => res(e.target.result ?? null);
      req.onerror   = e => rej(e.target.error);
      tx.onerror    = e => rej(e.target.error);
    }catch(e){
      /* If transaction fails (store missing etc), reset connection and reject */
      _idbConn = null;
      rej(e);
    }
  });
}

async function _idbSet(key,val){
  const db = await _idbOpen();
  return new Promise((res,rej)=>{
    try{
      const tx  = db.transaction(IDB_STORE,"readwrite");
      const req = tx.objectStore(IDB_STORE).put(val, key);
      req.onsuccess = () => res();
      req.onerror   = e => rej(e.target.error);
      tx.onerror    = e => rej(e.target.error);
    }catch(e){
      _idbConn = null;
      rej(e);
    }
  });
}

async function _idbDel(key){
  const db = await _idbOpen();
  return new Promise((res,rej)=>{
    try{
      const tx  = db.transaction(IDB_STORE,"readwrite");
      const req = tx.objectStore(IDB_STORE).delete(key);
      req.onsuccess = () => res();
      req.onerror   = e => rej(e.target.error);
      tx.onerror    = e => rej(e.target.error);
    }catch(e){
      _idbConn = null;
      rej(e);
    }
  });
}

/* ── SQLite DB init/persist ── */
async function _initSQLite(){
  /* Load sql.js from CDN (cached by browser after first load) */
  if(!_SQL){
    _SQL = await initSqlJs({
      locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.11.0/${f}`
    });
  }

  /* Try to load existing DB from IndexedDB — with safe fallback */
  let saved = null;
  try{
    saved = await _idbGet(IDB_KEY);
  }catch(e){
    console.warn("[Soney] IDB read failed, starting fresh:",e.message);
    /* Reset singleton so next call re-opens cleanly */
    _idbConn = null;
  }

  /* Build SQLite instance */
  if(saved && saved instanceof Uint8Array && saved.length > 0){
    try{
      _sqlDB = new _SQL.Database(saved);
      /* Verify the DB is valid and readable */
      _sqlDB.exec("SELECT 1");
    }catch(e){
      console.warn("[Soney] Saved DB corrupt, creating fresh:",e.message);
      _sqlDB = new _SQL.Database();
    }
  } else {
    _sqlDB = new _SQL.Database();
  }

  /* Ensure kv table exists (idempotent) */
  _sqlDB.run(`CREATE TABLE IF NOT EXISTS kv(k TEXT PRIMARY KEY, v TEXT NOT NULL)`);
  _dbReady = true;
}

/* Export current DB as Uint8Array → save to IndexedDB */
async function _persistSQLite(){
  if(!_sqlDB)return;
  const data = _sqlDB.export();
  /* Retry once on failure (handles stale connection edge cases) */
  const _trySet = async (key,val,retry=true)=>{
    try{
      await _idbSet(key,val);
    }catch(e){
      if(retry){
        _idbConn=null; // force fresh connection
        try{ await _idbSet(key,val); }
        catch(e2){ console.warn("[Soney] IDB persist failed:",e2.message); }
      }
    }
  };
  await _trySet(IDB_KEY, data);
  await _trySet(IDB_BK_KEY, data);
}

/* ── SQLite KV helpers ── */
function _sqlGet(key){
  if(!_sqlDB)return null;
  try{
    const res=_sqlDB.exec(`SELECT v FROM kv WHERE k=?`,[key]);
    return res.length&&res[0].values.length?res[0].values[0][0]:null;
  }catch{return null;}
}
function _sqlSet(key,val){
  if(!_sqlDB)return;
  _sqlDB.run(`INSERT INTO kv(k,v) VALUES(?,?) ON CONFLICT(k) DO UPDATE SET v=excluded.v`,[key,val]);
}

/* ── Migrate old localStorage data to SQLite (one time) ── */
function _migrateFromLocalStorage(){
  try{
    const old=localStorage.getItem("soney_v8");

    /* Only migrate if SQLite has no data yet */
    const existing=_sqlGet("soney_data");
    if(existing)return;

    console.log("[Soney] Migrated localStorage → SQLite ✅");

}

    const _psDefaults={dotsPerLine:384,feedLines:2,profileClass:"ESC/POS General",charsPerLine:32,charsCol2:4,charsCol3:6,charsCol4:6,printFooter:"Thank You! Visit Again!",bizNameHeader:"",bizNameSize:"Medium",bizNameBold:true,bizNameAlign:"Center",addrShow:true,addrBold:false,addrSize:"Small",mob1Show:true,mob1Bold:false,mob2Show:true,mob2Bold:false,mobOrder:"mob1first",footerBold:false,footerSize:"Small",footerAlign:"Center",billNoSize:"Small",dateSize:"Small",shopDetailsSize:"Medium",shopDetailsAlign:"Left",totalAmtSize:"Medium",savingAmtSize:"Small",showNetTotal:true,netTotalLabel:"Net Total",netTotalSize:"Small",customFooter:""};
    ST.printerSettings=Object.assign({},_psDefaults,d.printerSettings||{});

    try{const _lsPS=localStorage.getItem("soney_ps_bk");if(_lsPS&&!d.printerSettings){const _parsed=JSON.parse(_lsPS);ST.printerSettings=Object.assign({},_psDefaults,_parsed);console.log("[Soney] PrintSettings: localStorage backup se load kiya");}}catch(e){}

    ST.stockHistory=d.stockHistory||[];
    ST.stockInHistory=d.stockInHistory||[];
    // Migrate old udhari entries
    ST.udhari=ST.udhari.map(u=>{
    /* Migration: clearedDate + correct balAfter for old entries */
    const paid=u.paid||0;
    /* Reconstruct running balance from scratch — forward pass */
    let running=0;
    const history=(u.history||[]).map((h,i,arr)=>{
      if(i===0){
        /* First entry: determine opening balance */
        running = h.type==="bill" ? h.amount : 0;
      } else {
        if(h.type==="bill") running+=h.amount;
        else if(h.type==="pay") running=Math.max(0,running-h.amount);
      }
      if(h.balAfter!=null&&h.balAfter>=0)return h; /* already correct */
      return{...h,balAfter:Math.max(0,running)};
    });
    const clearedDate=u.clearedDate||(u.cleared?u.date:null);
    return{...u,paid,history,clearedDate};
  });
  }catch{
    ST.products=JSON.parse(JSON.stringify(DEF_PRODUCTS));
    ST.villages=JSON.parse(JSON.stringify(DEF_VILLAGES));
  }
}

/* Restore from JSON backup file */
function dvRestore(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const d=JSON.parse(e.target.result);
      /* Strip meta wrapper if present */
      const{_meta,...data}=d;
      /* Validate — must have at least products or bills */
      if(!data.products&&!data.bills&&!data.villages){
        _showToast("❌ Invalid backup file!","#EF4444");return;
      }
      _sqlSet("soney_data",JSON.stringify(data));
      await _persistSQLite();
      dbLoad();
      render();
      _showToast("✅ Data restore ho gaya! App reload ho raha hai...","#2563EB");
      setTimeout(()=>location.reload(),1800);
    }catch(err){
      _showToast("❌ Restore fail: "+err.message,"#EF4444");
    }
  };
  reader.readAsText(file);
}

/* Restore from SQLite .db file */
function dvRestoreSQLite(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const data=new Uint8Array(e.target.result);
      /* Test the DB is valid */
      const testDB=new _SQL.Database(data);
      const res=testDB.exec("SELECT v FROM kv WHERE k='soney_data'");
      if(!res.length||!res[0].values.length){
        _showToast("❌ Invalid SQLite backup — soney_data nahi mila!","#EF4444");
        testDB.close();return;
      }
      testDB.close();
      /* Replace current DB */
      await _idbSet(IDB_KEY,data);
      await _idbSet(IDB_BK_KEY,data);
      _sqlDB=new _SQL.Database(data);
      dbLoad();render();
      _showToast("✅ SQLite DB restore ho gaya!","#2563EB");
      setTimeout(()=>location.reload(),1800);
    }catch(err){
      _showToast("❌ SQLite restore fail: "+err.message,"#EF4444");
    }
  };
  reader.readAsArrayBuffer(file);
}

/* SHA-256 using Web Crypto API */
async function _sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

        ${Object.entries(STAFF_PERMS_DEF).map(([key,def])=>`
          <label style="display:flex;align-items:center;gap:8px;background:${defPerms[key]?'rgba(0,166,80,.08)':'rgba(0,0,0,.03)'};border:1.5px solid ${defPerms[key]?'rgba(0,166,80,.25)':'rgba(0,0,0,.08)'};border-radius:10px;padding:8px 10px;cursor:pointer" id="perm-lbl-${key}">
            <input type="checkbox" id="perm-${key}" ${defPerms[key]?'checked':''} style="width:16px;height:16px;accent-color:#00A650;cursor:pointer;flex-shrink:0">
            <span style="font-size:11px;font-weight:700;color:#374151;line-height:1.3">${def.label}</span>
          </label>
        `).join('')}
      </div>
      ${isEdit?`<div style="display:flex;align-items:center;justify-content:space-between;background:rgba(239,68,68,.05);border:1.5px solid rgba(239,68,68,.15);border-radius:12px;padding:10px 14px;margin-bottom:14px">
        <div><div style="font-size:12px;font-weight:700;color:#1a1a1a">Staff Status</div><div style="font-size:10px;color:#6b7280">${existingStaff.active===false?'Inactive':'Active'}</div></div>
        <button id="sf-toggle-active" style="background:${existingStaff.active===false?'#00A650':'#EF4444'};color:#fff;border:none;padding:8px 14px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer">${existingStaff.active===false?'Activate':'Deactivate'}</button>
      </div>`:''}
      <div id="sf-err" style="font-size:11px;font-weight:700;color:#EF4444;min-height:16px;margin-bottom:10px;text-align:center"></div>
      <div style="display:flex;gap:8px">
        <button id="sf-cancel" style="flex:1;padding:12px;border-radius:12px;border:1.5px solid rgba(0,0,0,.09);background:#f3f4f6;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;color:#6b7280;cursor:pointer">Cancel</button>
        <button id="sf-save" style="flex:2;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#6366f1,#4F46E5);font-family:'Outfit',sans-serif;font-size:13px;font-weight:800;color:#fff;cursor:pointer">${isEdit?'Update ✅':'Add Karo ✅'}</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
  Object.keys(STAFF_PERMS_DEF).forEach(key=>{
    const cb=ov.querySelector('#perm-'+key),lbl=ov.querySelector('#perm-lbl-'+key);
    cb?.addEventListener('change',()=>{
      if(lbl){lbl.style.background=cb.checked?'rgba(0,166,80,.08)':'rgba(0,0,0,.03)';lbl.style.border=cb.checked?'1.5px solid rgba(0,166,80,.25)':'1.5px solid rgba(0,0,0,.08)';}
    });
  });
  const nameEl=ov.querySelector('#sf-name'),mobEl=ov.querySelector('#sf-mob'),pinEl=ov.querySelector('#sf-pin'),errEl=ov.querySelector('#sf-err');
  nameEl.focus();
  ov.querySelector('#sf-toggle-active')?.addEventListener('click',()=>{
    const idx=ST.staffList.findIndex(s=>s.id===existingStaff.id);
    if(idx>-1){ST.staffList[idx].active=ST.staffList[idx].active===false?true:false;dbSave();ov.remove();render();_showToast(ST.staffList[idx].active?'✅ Staff active ho gaya':'⛔ Staff deactivate ho gaya','#6366f1');}
  });
  ov.querySelector('#sf-cancel').addEventListener('click',()=>ov.remove());
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
  ov.querySelector('#sf-save').addEventListener('click',async()=>{
    const name=(nameEl.value||'').trim(),mob=(mobEl.value||'').trim(),pin=(pinEl.value||'').trim();
    errEl.textContent='';
    if(!name){errEl.textContent='❌ Naam zaroori hai';nameEl.focus();return;}
    if(!/^\d{10}$/.test(mob)){errEl.textContent='❌ Valid 10 digit mobile dalo';mobEl.focus();return;}
    if(!isEdit&&!pin){errEl.textContent='❌ PIN set karo';pinEl.focus();return;}
    const dupMob=(ST.staffList||[]).find(s=>s.mobile===mob&&(!isEdit||s.id!==existingStaff.id));
    if(dupMob){errEl.textContent='❌ Yeh mobile already registered hai';mobEl.focus();return;}
    const perms={};
    Object.keys(STAFF_PERMS_DEF).forEach(key=>{perms[key]=!!ov.querySelector('#perm-'+key)?.checked;});
    /* SECURITY FIX: staff PIN ab plaintext mein store nahi hota — hashed
       (per-mobile salted) form mein save hota hai, jaisa owner PIN ke
       liye hota hai. `pin` field ab kabhi save nahi hota. */
    const pinHash = pin ? await _hashPinV2(mob,pin) : null;
    if(isEdit){
      const idx=ST.staffList.findIndex(s=>s.id===existingStaff.id);
      if(idx>-1){
        const upd={...ST.staffList[idx],name,mobile:mob,permissions:perms,updatedAt:Date.now()};
        delete upd.pin; /* purge any legacy plaintext PIN */
        if(pinHash) upd.pinHash=pinHash;
        ST.staffList[idx]=upd;
      }
    } else {
      ST.staffList.push({id:'staff_'+Date.now(),name,mobile:mob,pinHash,permissions:perms,active:true,createdAt:Date.now()});
      /* Firebase staff index update — staff mobile → owner mobile mapping */
      if(_ownerMobileSession) _updateStaffIndex(mob, _ownerMobileSession);
    }
    dbSave();ov.remove();render();
    _showToast(isEdit?`✅ ${name} update ho gaya!`:`✅ ${name} add ho gaya!`,'#00A650');
  });
}

function _showStaffReport(staffId){

    wrap.innerHTML=`
      <div style="background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:440px;max-height:94vh;overflow-y:auto;padding:20px 18px 34px;box-sizing:border-box;animation:slideUpFade .3s cubic-bezier(.16,1,.3,1)">
