/* ══ GENERATE BILL IMAGE — Bill review mein jo dikhta hai bilkul waisa ══
   html2canvas se .rcpt DOM element ka direct screenshot leta hai          */
async function _generateBillImage(b,pay){
  /* --- Method 1: html2canvas se live .rcpt element ka screenshot --- */
  if(typeof html2canvas !== "undefined"){
    const rcptEl = document.querySelector(".rcpt");
    if(rcptEl){
      try{
        // Temporarily make it render at full HD quality
        const origStyle=rcptEl.getAttribute("style")||"";
        rcptEl.style.maxWidth="600px";
        rcptEl.style.width="600px";
        rcptEl.style.boxShadow="none";
        rcptEl.style.overflow="visible";
        const canvas = await html2canvas(rcptEl, {
          scale: 6,            /* 6× = ~1800px wide — HD quality */
          useCORS: true,
          backgroundColor: "#ffffff",
          logging: false,
          allowTaint: true,
          removeContainer: true,
          imageTimeout: 0,
          windowWidth: 700,
          windowHeight: rcptEl.scrollHeight + 100
        });
        rcptEl.setAttribute("style", origStyle);
        return canvas.toDataURL("image/png", 1.0);
      }catch(e){
        console.warn("html2canvas failed, using canvas fallback:", e);
      }
    }
  }

  /* --- Method 2: Fallback — canvas drawing (original code) --- */
  return new Promise(resolve=>{
    const SCALE=5; /* 5× for HD sharp text */
    const W=600;
    const PAD=28;
    const MONO="'Courier New','Courier',monospace";
    const fp=b.freeProduct;
    const cash=pay?.cash||0,upi=pay?.upi||0,ud=pay?.udhari||0;
    const prevUd=pay?.prevUdhari||0;
    const grandTot=pay?.grandTotal||(prevUd+(pay?.discountedBill||b.purchaseTotal));
    const totalPaid=cash+upi;
    const _discPct=pay?.discountPct||b.payment?.discountPct||0;
    const _discAmt=pay?.discountAmt||b.payment?.discountAmt||0;
    const _discBill=pay?.discountedBill||b.payment?.discountedBill||b.purchaseTotal;
    const prof=ST.profile||{};
    const bizName=(prof.bizName||ST.businessName||"SONEY EXCELLENT").toUpperCase();

    /* ── measure height ── */
    let H=PAD;
    H+=34;  /* biz name */
    if(prof.mobile||prof.mobile2) H+=22;
    if(prof.address) H+=22;
    if(prof.tagline) H+=22;
    H+=22;  /* ICE CREAM BILLING */
    H+=16;  /* divider gap */
    H+=22;  /* SHOP DETAILS */
    if(b.shopName)   H+=22;
    if(b.villageName)H+=22;
    if(b.shopOwner)  H+=22;
    if(b.shopMobile) H+=22;
    H+=16;  /* divider */
    H+=22;  /* bill no */
    H+=22;  /* date */
    H+=16;  /* divider */
    H+=24;  /* table header */
    H+=12;  /* header underline gap */
    H+=b.items.length*24;
    H+=16;  /* divider */
    H+=22;  /* total boxes */
    H+=16;  /* divider */
    if(b.schemeApplied&&fp){H+=22*2;H+=16;}
    /* TOTAL height: chota(22) jab discount ya udhari ho, bada(46) warna */
    const _hDisc=(_discPct>0&&_discAmt>0);const _hUd=(prevUd>0);
    H+=(_hDisc||_hUd)?22:46;  /* TOTAL */
    if(_hDisc){
      H+=22;  /* Discount line */
      H+=_hUd?22:46;  /* Net Total: chota jab udhari bhi ho, bada sirf discount pe */
      H+=16;  /* dashed */
    }
    H+=16;  /* divider */
    H+=22;  /* PAYMENT SUMMARY label */
    if(_hUd){H+=22*2;H+=16;H+=46;H+=16;}  /* Purani Udhari + Aaj Ka Bill + Grand Total(bada) */
    if(cash>0)H+=22;
    if(upi>0)H+=22;
    if(totalPaid>0)H+=22;
    if(ud>0)H+=22;
    H+=16;  /* divider */
    H+=22;  /* footer line 1 */
    H+=22;  /* footer line 2 */
    H+=PAD;

    const canvas=document.createElement("canvas");
    canvas.width=W*SCALE;
    canvas.height=H*SCALE;
    const ctx=canvas.getContext("2d");
    ctx.scale(SCALE,SCALE);

    /* White background */
    ctx.fillStyle="#FFFFFF";
    ctx.fillRect(0,0,W,H);

    /* Serrated top edge */
    ctx.fillStyle="#F5F5F3";
    for(let x=0;x<W;x+=14){ctx.fillRect(x,0,7,8);}

    let y=PAD+8;

    const dashed=()=>{
      ctx.save();
      ctx.setLineDash([3,3]);
      ctx.strokeStyle="#888";ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(PAD,y);ctx.lineTo(W-PAD,y);ctx.stroke();
      ctx.restore();
      y+=14;
    };

    /* ── HEADER ── */
    ctx.font=`bold 22px ${MONO}`;
    ctx.fillStyle="#000";
    ctx.textAlign="center";
    ctx.fillText(bizName,W/2,y);y+=28;

    const p1=prof.mobile||"",p2=prof.mobile2||"";
    const ph=[p1,p2].filter(x=>x).join(" / ");
    if(ph){
      ctx.font=`13px ${MONO}`;ctx.fillStyle="#000";
      ctx.fillText("Ph: "+ph,W/2,y);y+=22;
    }
    if(prof.address){
      ctx.font=`13px ${MONO}`;ctx.fillStyle="#000";
      ctx.fillText(prof.address,W/2,y);y+=22;
    }
    if(prof.tagline){
      ctx.font=`13px ${MONO}`;ctx.fillStyle="#000";
      ctx.fillText(prof.tagline,W/2,y);y+=22;
    }
    ctx.font=`bold 14px ${MONO}`;ctx.fillStyle="#000";
    ctx.fillText("ICE CREAM BILLING",W/2,y);y+=22;

    dashed();

    /* ── SHOP DETAILS ── */
    ctx.textAlign="left";
    ctx.font=`bold 14px ${MONO}`;ctx.fillStyle="#000";
    ctx.fillText("SHOP DETAILS",PAD,y);y+=22;

    ctx.font=`13px ${MONO}`;ctx.fillStyle="#000";
    if(b.shopName)  {ctx.fillText("Shop  : "+b.shopName,PAD,y);y+=22;}
    if(b.villageName){ctx.fillText("Gaon  : "+b.villageName,PAD,y);y+=22;}
    if(b.shopOwner) {ctx.fillText("Owner : "+b.shopOwner,PAD,y);y+=22;}
    if(b.shopMobile){ctx.fillText("Mobile: "+b.shopMobile,PAD,y);y+=22;}

    dashed();

    ctx.font=`13px ${MONO}`;ctx.fillStyle="#000";
    ctx.fillText("Bill No: "+b.billNo,PAD,y);y+=22;
    ctx.fillText("Date   : "+fmtD(b.date)+" "+fmtT(b.date),PAD,y);y+=22;

    dashed();

    /* ── ITEMS TABLE ── */
    const C1=PAD, C2=W-220, C3=W-140, C4=W-PAD;
    ctx.font=`bold 13px ${MONO}`;ctx.fillStyle="#000";
    ctx.textAlign="left"; ctx.fillText("Item",C1,y);
    ctx.textAlign="right";ctx.fillText("Qty",C2,y);
    ctx.textAlign="right";ctx.fillText("Rate",C3,y);
    ctx.textAlign="right";ctx.fillText("Amount",C4,y);
    y+=10;
    dashed();

    ctx.font=`13px ${MONO}`;
    b.items.forEach(it=>{
      const nm=it.name.length>20?it.name.substring(0,19)+"…":it.name;
      ctx.textAlign="left"; ctx.fillStyle="#000";ctx.fillText(nm,C1,y);
      ctx.textAlign="right";ctx.fillStyle="#000";ctx.fillText(String(it.boxQty),C2,y);
      ctx.textAlign="right";ctx.fillStyle="#000";ctx.fillText(String(it.boxPrice),C3,y);
      ctx.textAlign="right";ctx.fillStyle="#000";ctx.fillText(String(it.amount),C4,y);
      y+=24;
    });

    dashed();

    ctx.textAlign="left";ctx.font=`13px ${MONO}`;ctx.fillStyle="#000";
    ctx.fillText("Total Boxes: "+b.items.reduce((s,i)=>s+(i.boxQty||0),0),PAD,y);y+=22;

    dashed();

    if(b.schemeApplied&&fp){
      ctx.textAlign="center";ctx.font=`bold 13px ${MONO}`;ctx.fillStyle="#000";
      ctx.fillText("** SCHEME LAGA! **",W/2,y);y+=22;
      ctx.font=`13px ${MONO}`;
      ctx.fillText("MUFT: "+fp.name+" x"+fp.boxQty+" Box",W/2,y);y+=22;
      dashed();
    }

    /* ── TOTAL ── */
    /* SIZE RULES (same as ESC/POS):
       - Sirf discount (no udhari): TOTAL chota, Net Total BADA
       - Sirf udhari (no discount): TOTAL BADA, Grand Total BADA
       - Dono (discount+udhari):    TOTAL chota, Net Total chota, Grand Total BADA
       - Kuch nahi:                 TOTAL BADA */
    const _hasDisc2=_discPct>0&&_discAmt>0;
    const _hasUd2=prevUd>0;
    ctx.textAlign="center";ctx.fillStyle="#000";
    if(_hasDisc2&&!_hasUd2){
      /* Sirf discount: TOTAL chota */
      ctx.font=`bold 14px ${MONO}`;
      ctx.fillText("TOTAL: Rs "+b.purchaseTotal,W/2,y);y+=22;
    } else if(_hasUd2){
      /* Udhari hai (discount ho ya na ho): TOTAL chota */
      ctx.font=`bold 14px ${MONO}`;
      ctx.fillText("TOTAL: Rs "+b.purchaseTotal,W/2,y);y+=22;
    } else {
      /* Normal: TOTAL bada */
      ctx.font=`bold 26px ${MONO}`;
      ctx.fillText("TOTAL: Rs "+b.purchaseTotal,W/2,y);y+=46;
    }

    if(_hasDisc2){
      /* Discount line — left label, right amount, ek hi line */
      const _discAmtStr2="-Rs "+_discAmt;
      ctx.font=`13px ${MONO}`;ctx.fillStyle="#000";
      ctx.textAlign="left"; ctx.fillText("Discount("+_discPct+"%)",PAD,y);
      ctx.textAlign="right";ctx.fillText(_discAmtStr2,W-PAD,y);
      y+=22;
      /* Net Total line */
      if(_hasUd2){
        /* Dono hain: Net Total chota */
        ctx.font=`bold 14px ${MONO}`;ctx.fillStyle="#000";
        ctx.textAlign="left"; ctx.fillText("Net Total",PAD,y);
        ctx.textAlign="right";ctx.fillText("Rs "+_discBill,W-PAD,y);
        y+=22;
      } else {
        /* Sirf discount: Net Total BADA (26px) */
        ctx.font=`bold 26px ${MONO}`;ctx.fillStyle="#000";
        ctx.textAlign="left"; ctx.fillText("Net Total",PAD,y);
        ctx.textAlign="right";ctx.fillText("Rs "+_discBill,W-PAD,y);
        y+=46;
      }
      dashed();
    }

    dashed();

    /* ── PAYMENT SUMMARY ── */
    ctx.textAlign="center";ctx.font=`bold 14px ${MONO}`;ctx.fillStyle="#000";
    ctx.fillText("PAYMENT SUMMARY",W/2,y);y+=22;

    const prow=(lbl,val,bold,big)=>{
      ctx.textAlign="left";
      ctx.font=`${bold?"bold ":""}${big?26:13}px ${MONO}`;ctx.fillStyle="#000";
      ctx.fillText(lbl,PAD,y);
      ctx.textAlign="right";
      ctx.font=`${bold?"bold ":""}${big?26:13}px ${MONO}`;ctx.fillStyle="#000";
      ctx.fillText(val,W-PAD,y);
      y+=big?46:22;
    };

    if(_hasUd2){
      prow("Purani Udhari","Rs  "+prevUd,false,false);
      prow("Aaj Ka Bill",  "Rs  "+_discBill,false,false);
      y+=4;dashed();
      prow("Grand Total",  "Rs  "+grandTot,true,true); /* Grand Total HAMESHA bada */
      dashed();
    }
    if(cash>0)      prow("Cash",     "Rs  "+cash,false);
    if(upi>0)       prow("UPI",      "Rs  "+upi,false);
    if(totalPaid>0){y+=2;dashed();prow("Total Paid","Rs  "+totalPaid,true);}
    if(ud>0)       {dashed();prow("Baaki Udhari","Rs  "+ud,false);}

    dashed();

    /* ── FOOTER ── */
    ctx.textAlign="center";ctx.font=`13px ${MONO}`;ctx.fillStyle="#000";
    ctx.fillText("Shukriya! Dobara Padharo!",W/2,y);y+=22;
    ctx.fillText(bizName,W/2,y);y+=22;

    /* Serrated bottom edge */
    ctx.fillStyle="#F5F5F3";
    for(let x=0;x<W;x+=14){ctx.fillRect(x,H-8,7,8);}

    resolve(canvas.toDataURL("image/png",1.0));
  });
}
async function _shareOnWhatsApp(b,pay,phoneNumber,preGeneratedImg){
  try{
    // ── Loading overlay
    const overlay=document.createElement("div");
    overlay.style.cssText="position:fixed;inset:0;z-index:9999;background:rgba(0,40,15,.9);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px";
    overlay.innerHTML=`<div style="font-size:44px">⏳</div><div style="color:#fff;font-family:'Outfit',system-ui,sans-serif;font-size:15px;font-weight:800">Bill ready ho raha hai...</div>`;
    document.body.appendChild(overlay);

    // ── Generate bill image
    let imgData;
    try{
      imgData=preGeneratedImg||await _generateBillImage(b,pay);
    }finally{
      overlay.remove();
    }

    // ── Number: 10 digit → 91XXXXXXXXXX
    const rawNum=(phoneNumber||"").replace(/\D/g,"");
    const waNum=rawNum.length===10?"91"+rawNum:rawNum.length>=11?rawNum:"";

    // ── Image → blob
    const res=await fetch(imgData);
    const blob=await res.blob();

    // ── Step 1: Image clipboard mein copy karo
    let clipOk=false;
    try{
      await navigator.clipboard.write([new ClipboardItem({"image/png":blob})]);
      clipOk=true;
    }catch(e){/* clipboard not supported — fallback to download */}

    if(!clipOk){
      // Clipboard nahi chala — image download karo gallery mein
      const a=document.createElement("a");
      a.href=imgData;a.download="SoneyBill_"+b.billNo+".png";a.click();
    }

    // ── Step 2: Directly customer ki WhatsApp chat open karo
    // whatsapp://send?phone=91XXXXXXXXXX — no text, no share sheet
    // Seedha us number ki chat open hogi
    if(waNum){
      window.location.href="whatsapp://send?phone="+waNum;
    } else {
      // Number nahi diya — WhatsApp new chat screen open karo
      window.location.href="whatsapp://";
    }

    // ── Step 3: Toast instruction dikhao
    setTimeout(()=>{
      const toast=document.createElement("div");
      toast.style.cssText="position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#075E54;color:#fff;padding:13px 20px;border-radius:16px;font-size:13px;font-weight:700;z-index:9999;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.35);width:85%;max-width:300px;font-family:'Outfit',system-ui,sans-serif;line-height:1.5";
      toast.innerHTML=clipOk
        ?"📋 Bill image copy ho gayi!<br><span style='font-weight:500;font-size:12px'>Chat mein <b>long press → Paste</b> karke Send karo</span>"
        :"📷 Bill image gallery mein save ho gayi!<br><span style='font-weight:500;font-size:12px'>Chat mein attachment se send karo</span>";
      document.body.appendChild(toast);
      setTimeout(()=>toast.remove(),4000);
    },1500);

  }catch(e){
    alert("Share error: "+e.message);
  }
}

// Pad helpers
function pad(s,n){s=String(s||"");while(s.length<n)s+=" ";return s.substring(0,n);}
function padL(s,n){s=String(s||"");while(s.length<n)s=" "+s;return s.substring(s.length-n);}

/* Send bill as formatted text on WhatsApp */
function _sendWATextBill(bill,phoneNumber){
  const pay=bill.payment||{};
  const amt=pay.discountedBill||bill.purchaseTotal;
  const cash=pay.cash||0,upi=pay.upi||0,ud=pay.udhari||0;
  const biz=(ST.profile?.bizName||ST.businessName||"SONEY EXCELLENT").toUpperCase();
  let msg=`🍦 *${biz}*\n`;
  msg+=`━━━━━━━━━━━━━━━\n`;
  msg+=`📋 *Bill: ${bill.billNo}*\n`;
  msg+=`📅 ${fmtD(bill.date)}\n`;
  msg+=`🏪 ${bill.shopName} · ${bill.villageName}\n\n`;
  msg+=`*ITEMS:*\n`;
  (bill.items||[]).forEach(it=>{
    msg+=`▸ ${it.name}: ${it.boxQty} box × ₹${it.boxPrice} = *₹${it.amount}*\n`;
  });
  msg+=`━━━━━━━━━━━━━━━\n`;
  msg+=`💰 *TOTAL: ₹${amt.toLocaleString("en-IN")}*\n`;
  if(cash>0) msg+=`✅ Cash: ₹${cash.toLocaleString("en-IN")}\n`;
  if(upi>0)  msg+=`📱 UPI: ₹${upi.toLocaleString("en-IN")}\n`;
  if(ud>0)   msg+=`📋 Baaki: *₹${ud.toLocaleString("en-IN")}*\n`;
  msg+=`\nShukriya! 🙏`;
  const rawNum=(phoneNumber||"").replace(/\D/g,"");
  const waNum=rawNum.length===10?"91"+rawNum:rawNum.length>=11?rawNum:"";
  const url=waNum?`https://wa.me/${waNum}?text=${encodeURIComponent(msg)}`:`https://wa.me/?text=${encodeURIComponent(msg)}`;
  window.open(url,"_blank");
}

/* ══════════════════════════════════════════════════════
   FEATURE 2: Screenshot Share — Web Share API + fallback
   Image generate karo aur native share sheet open karo
══════════════════════════════════════════════════════ */
async function _shareScreenshotOnly(bill){
  const overlay=document.createElement("div");
  overlay.style.cssText="position:fixed;inset:0;z-index:9999;background:rgba(0,40,15,.9);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px";
  overlay.innerHTML=`
    <div style="font-size:44px">📸</div>
    <div style="color:#fff;font-family:'Outfit',sans-serif;font-size:16px;font-weight:800">Bill image bana raha hai...</div>
    <div style="color:rgba(255,255,255,.65);font-size:12px">Thoda wait karo</div>`;
  document.body.appendChild(overlay);
  try{
    const fakePay=bill.payment||{cash:0,upi:0,udhari:bill.purchaseTotal,prevUdhari:0,grandTotal:bill.purchaseTotal,discountPct:0,discountAmt:0,discountedBill:bill.purchaseTotal};
    const imgData=await _generateBillImage(bill,fakePay);
    overlay.remove();
    /* Try Web Share API (works on Android Chrome) */
    const res=await fetch(imgData);
    const blob=await res.blob();
    const file=new File([blob],`SoneyBill_${bill.billNo}.png`,{type:"image/png"});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      /* Native share sheet — WhatsApp, Instagram, Gmail, sab */
      await navigator.share({
        title:`Bill ${bill.billNo} — ${bill.shopName}`,
        text:`${bill.shopName} ka bill — ₹${(bill.payment?.discountedBill||bill.purchaseTotal).toLocaleString("en-IN")}`,
        files:[file]
      });
      _showToast("✅ Share ho gaya!","#00A650");
    } else {
      /* Fallback: clipboard copy + download */
      let clipOk=false;
      try{
        await navigator.clipboard.write([new ClipboardItem({"image/png":blob})]);
        clipOk=true;
      }catch(e){}
      if(!clipOk){
        const a=document.createElement("a");
        a.href=imgData;a.download=`SoneyBill_${bill.billNo}.png`;a.click();
      }
      /* Show action sheet */
      _showShareActionSheet(bill,imgData,clipOk);
    }
  }catch(e){
    overlay.remove();
    if(e.name==="AbortError")return;/* User ne cancel kiya */
    _showToast("❌ Share nahi ho saka: "+e.message,"#EF4444");
  }
}

function _confirmBill(b,pay,printed){
  /* BUG FIX: Always ensure bill has a unique id before any operations */
  if(!b.id)b.id=Date.now();
  /* FIX Bug#11: Prevent duplicate saves if confirmBill called twice for same bill id */
  if(ST.bills.find(x=>x.id===b.id)){
    ST.cart={};ST.sessionPrices={};ST.showBill=null;ST._pay=undefined;ST._editingOrigBillNo=null; /* BUG FIX v91: clear stale edit reference */
    /* BUG FIX v68: Re-load custom rates on duplicate-bill guard path too */
    if(!ST.walkMode&&ST.selShopId&&ST.selVillageId){
      const _dv=ST.villages.find(v=>v.id===ST.selVillageId);
      const _ds=_dv&&_dv.shops.find(s=>s.id===ST.selShopId);
      if(_ds&&_ds.customRates)Object.entries(_ds.customRates).forEach(([pid,rate])=>{const prod=ST.products.find(p=>p.id===+pid);if(prod&&rate!==prod.boxPrice)ST.sessionPrices[+pid]=+rate;});
    }
    render();return;
  }
  // Payment store — include prevUdhari info
  b.payment={cash:pay?.cash||0,upi:pay?.upi||0,udhari:pay?.udhari||0,prevUdhari:pay?.prevUdhari||0,grandTotal:pay?.grandTotal||b.purchaseTotal,discountPct:pay?.discountPct||0,discountAmt:pay?.discountAmt||0,discountedBill:pay?.discountedBill||b.purchaseTotal};
  /* v18: remember which vehicle this bill came from (for clean reverse on edit/delete) */
  b.vehicleKey=ST.activeVehicle||"v1";
  const hasUdhari=(pay?.udhari||0)>0;
  const prevUd=pay?.prevUdhari||0;
  const totalPaid=(pay?.cash||0)+(pay?.upi||0);

  // Guard: agar cart empty ho gaya tab tak toh kuch nahi karo
  if(!b.items||b.items.length===0){ST.showBill=null;render();return;}

  ST.products=ST.products.map(p=>{const it=b.items.find(i=>i.id===p.id);return it?{...p,stock:Math.max(0,p.stock-it.boxQty)}:p;});
  // Update global stock sold
  b.items.forEach(it=>{ST.stock.sold[it.id]=(ST.stock.sold[it.id]||0)+it.boxQty;});
  // Update active vehicle sold stock
  const vk=ST.activeVehicle||"v1";
  if(ST.vehicles[vk]?.stock){
    b.items.forEach(it=>{
      if(!ST.vehicles[vk].stock.sold)ST.vehicles[vk].stock.sold={};
      ST.vehicles[vk].stock.sold[it.id]=(ST.vehicles[vk].stock.sold[it.id]||0)+it.boxQty;
    });
  }
  /* FIX: Scheme free product — deduct from stock too */
  if(b.schemeApplied&&b.freeProduct){
    const fp=b.freeProduct;
    ST.products=ST.products.map(p=>p.id===fp.id?{...p,stock:Math.max(0,(p.stock||0)-fp.boxQty)}:p);
    ST.stock.sold[fp.id]=(ST.stock.sold[fp.id]||0)+fp.boxQty;
    if(ST.vehicles[vk]?.stock){
      if(!ST.vehicles[vk].stock.sold)ST.vehicles[vk].stock.sold={};
      ST.vehicles[vk].stock.sold[fp.id]=(ST.vehicles[vk].stock.sold[fp.id]||0)+fp.boxQty;
    }
  }
  ST.bills.push({...b, staffId: ST.currentStaffId||null});

  /* ── UDHARI LEDGER UPDATE (immutable, race-condition safe) ── */
  const _billDate=b.date||Date.now();
  /* BUG FIX v101: Smart allocation — cash pehle current bill mein, online purani udhari mein */
  const _cash=pay.cash||0, _upi=pay.upi||0;
  const _discBill=pay.discountedBill||b.purchaseTotal;
  const _cashForCur=Math.min(_cash, _discBill);
  const _cashOverflow=Math.max(0, _cash-_discBill);
  const _payForPrev = prevUd>0 ? Math.min(_upi+_cashOverflow, prevUd) : 0;
  const _payForCur  = Math.min(_discBill, _cashForCur+Math.max(0,(_upi+_cashOverflow)-prevUd));
  const _newUd      = pay.udhari||0; /* remaining udhari on today's bill */

  /* Step 1: apply payment to existing prev udhari entry (immutable map) */
  if(_payForPrev>0){
    let _prevEntryCleared=false;
    ST.udhari=ST.udhari.map(x=>{
      const _match=b.shopId
        ? x.shopId===b.shopId&&x.villageId===b.villageId&&!x.cleared
        : x.shopName.toLowerCase().trim()===b.shopName.toLowerCase().trim()&&!x.cleared;
      if(!_match)return x;
      const newPaid=Math.min((x.paid||0)+_payForPrev, x.amount);
      const balAfter=Math.max(0,x.amount-newPaid);
      const cleared=newPaid>=x.amount;
      if(cleared)_prevEntryCleared=true;
      return{...x,paid:newPaid,cleared,
        clearedDate:cleared?(x.clearedDate||_billDate):x.clearedDate,
        history:[...(x.history||[]),{type:"pay",amount:_payForPrev,date:_billDate,billNo:b.billNo,note:"Bill ke saath",balAfter}]};
    });
  }

  /* Step 2: add new udhari for today's bill — re-query AFTER step 1 (cleared entries excluded)
     _newUd = sirf aaj ka baaki (prevUd already handled in step 1) */
  if(_newUd>0){
    const exIdx=b.shopId
      ? ST.udhari.findIndex(u=>u.shopId===b.shopId&&u.villageId===b.villageId&&!u.cleared)
      : ST.udhari.findIndex(u=>u.shopName.toLowerCase().trim()===b.shopName.toLowerCase().trim()&&!u.cleared);
    if(exIdx>=0){
      /* Immutable update — same as step 1 */
      const ex=ST.udhari[exIdx];
      const prevBal=Math.max(0,(ex.amount||0)-(ex.paid||0));
      const balAfter=prevBal+_newUd;
      ST.udhari=ST.udhari.map((u,i)=>i!==exIdx?u:{
        ...u, amount:(u.amount||0)+_newUd,
        history:[...(u.history||[]),{type:"bill",amount:_newUd,date:_billDate,billNo:b.billNo,balAfter}]
      });
    } else {
      ST.udhari.push({
        id:Date.now(),shopId:b.shopId||null,shopName:b.shopName,
        shopOwner:b.shopOwner||"",shopMobile:b.shopMobile||"",
        villageId:b.villageId||null,villageName:b.villageName||"Walk-In",
        amount:_newUd,paid:0,date:_billDate,cleared:false,
        history:[{type:"bill",amount:_newUd,date:_billDate,billNo:b.billNo,balAfter:_newUd}]
      });
    }
  }

  /* ── v23 FIX: Ledger (customerPayments) mein bhi bill payment sync karo ── */
  /* BUG FIX v91-WK: Walk-in bills mein shopId/villageId null hota hai — isliye pehle sirf
     b.shopId&&b.villageId check tha aur walk-in ke liye yeh block skip ho jaata tha.
     Fix: Walk-in bills ke liye bhi payment record karo (shopName se identify karo). */
  if(totalPaid>0){
    if(!ST.customerPayments)ST.customerPayments=[];
    const nowMs=Date.now();
    /* BUG FIX v101: Smart allocation — cash pehle current bill mein, online purani udhari mein */
    const payForPrevUd2=_payForPrev;
    if(payForPrevUd2>0){
      const dupCheckPrev=b.shopId
        ? ST.customerPayments.find(p=>p.villageId===b.villageId&&p.shopId===b.shopId&&p.amount===payForPrevUd2&&p.billId===b.id&&Math.abs(p.date-b.date)<2000)
        : ST.customerPayments.find(p=>p._walkIn&&(p.shopName||"").toLowerCase().trim()===(b.shopName||"").toLowerCase().trim()&&p.amount===payForPrevUd2&&p.billId===b.id&&Math.abs(p.date-b.date)<2000);
      if(!dupCheckPrev){
        /* Online pehle prevUd mein jaata hai */
        const _pOnline=Math.min(_upi, payForPrevUd2);
        const _pCash=payForPrevUd2-_pOnline;
        if(_pOnline>0) ST.customerPayments.push({id:nowMs+21,villageId:b.villageId||null,shopId:b.shopId||null,villageName:b.villageName||"Walk-In",shopName:b.shopName,amount:_pOnline,mode:"online",date:b.date,note:"Purani udhari payment — Bill ke saath",billId:b.id,_walkIn:!!b.walkIn});
        if(_pCash>0) ST.customerPayments.push({id:nowMs+2,villageId:b.villageId||null,shopId:b.shopId||null,villageName:b.villageName||"Walk-In",shopName:b.shopName,amount:_pCash,mode:"cash",date:b.date,note:"Purani udhari payment — Bill ke saath",billId:b.id,_walkIn:!!b.walkIn});
      }
    }
    /* Aaj ke bill ke liye direct cash/UPI payment */
    const _curBillAmt=pay.discountedBill||b.purchaseTotal;
    const directPayForCurBill=_payForCur;
    if(directPayForCurBill>0){
      const dupCheckCur=b.shopId
        ? ST.customerPayments.find(p=>p.villageId===b.villageId&&p.shopId===b.shopId&&p.amount===directPayForCurBill&&p.billId===b.id&&Math.abs(p.date-b.date)<2000)
        : ST.customerPayments.find(p=>p._walkIn&&(p.shopName||"").toLowerCase().trim()===(b.shopName||"").toLowerCase().trim()&&p.amount===directPayForCurBill&&p.billId===b.id&&Math.abs(p.date-b.date)<2000);
      if(!dupCheckCur){
        /* Cash pehle current bill mein jaata hai */
        const _cCash=Math.min(_cash, directPayForCurBill);
        const _cOnline=directPayForCurBill-_cCash;
        if(_cCash>0) ST.customerPayments.push({id:nowMs+3,villageId:b.villageId||null,shopId:b.shopId||null,villageName:b.villageName||"Walk-In",shopName:b.shopName,amount:_cCash,mode:"cash",date:b.date,note:"Payment saath mein mili — Bill "+b.billNo,billId:b.id,_walkIn:!!b.walkIn});
        if(_cOnline>0) ST.customerPayments.push({id:nowMs+31,villageId:b.villageId||null,shopId:b.shopId||null,villageName:b.villageName||"Walk-In",shopName:b.shopName,amount:_cOnline,mode:"online",date:b.date,note:"Payment saath mein mili — Bill "+b.billNo,billId:b.id,_walkIn:!!b.walkIn});
      }
    }
    /* Excess payment (advance/change) */
    const grandTotalAll=(prevUd||0)+(pay.discountedBill||b.purchaseTotal);
    const excessAmt=totalPaid>grandTotalAll?totalPaid-grandTotalAll:0;
    if(excessAmt>0){
      ST.customerPayments.push({id:nowMs+4,villageId:b.villageId||null,shopId:b.shopId||null,villageName:b.villageName||"Walk-In",shopName:b.shopName,amount:excessAmt,mode:pay.cash>0?"cash":"online",date:b.date,note:"Zyada payment (advance) — Bill "+b.billNo,billId:b.id,_walkIn:!!b.walkIn});
    }
  }

  /* v19: Walking customer record update */
  if(b.walkIn){
    if(!ST.walkingCustomers)ST.walkingCustomers=[];
    const key=b.shopName.toLowerCase().trim();
    const existing=ST.walkingCustomers.find(c=>c.shopName.toLowerCase().trim()===key);
    if(existing){
      existing.lastDate=b.date;
      existing.billCount=(existing.billCount||0)+1;
      if(b.shopMobile&&!existing.mobile)existing.mobile=b.shopMobile;
    } else {
      ST.walkingCustomers.push({id:Date.now(),shopName:b.shopName,mobile:b.shopMobile||"",firstDate:b.date,lastDate:b.date,billCount:1});
    }
    /* Reset walk fields after bill save */
    ST.walkShopName="";ST.walkMobile="";
  }

  if(b.schemeApplied)ST.showScheme=b;
  ST.cart={};ST.sessionPrices={};ST.showBill=null;ST._pay=undefined; /* FIX: naye bill pe purani payment values na aayein */
  /* BUG FIX v68: Re-load custom rates for selected shop after bill save.
     selShopId is preserved — sessionPrices was cleared above, so we restore
     shop's customRates so next bill for same shop gets correct rates. */
  if(!ST.walkMode&&ST.selShopId&&ST.selVillageId){
    const _selV=ST.villages.find(v=>v.id===ST.selVillageId);
    const _selS=_selV&&_selV.shops.find(s=>s.id===ST.selShopId);
    if(_selS&&_selS.customRates&&Object.keys(_selS.customRates).length>0){
      Object.entries(_selS.customRates).forEach(([pid,rate])=>{
        if(!isNaN(+rate)&&+rate>0) ST.sessionPrices[+pid]=+rate;
      });
    }
  }
  dbSave();
  if(ST.showScheme)_ovs();else render();
}

function bProducts(){
  document.getElementById("padd")?.addEventListener("click",()=>{ST.pTab="form";ST.editProdId=null;ST.pForm={emoji:"🍦"};render();});
  document.getElementById("pbk")?.addEventListener("click",()=>{ST.pTab="list";ST.pForm={};render();});
  document.querySelectorAll("[data-pedit]").forEach(b=>b.addEventListener("click",()=>{
    ST.pTab="form";ST.editProdId=+b.dataset.pedit;ST.pForm={};render();
  }));
  document.querySelectorAll("[data-pemoji]").forEach(b=>b.addEventListener("click",()=>{
    ST.pForm={...ST.pForm,emoji:b.dataset.pemoji};render();
  }));
  // Live piece rate + profit preview
  const updatePreview=()=>{
    const bp=parseFloat(document.getElementById("pbox")?.value)||0;
    const pc=parseFloat(document.getElementById("ppcs")?.value)||0;
    const pr=parseFloat(document.getElementById("pprate")?.value)||0;
    const prev=document.getElementById("pprev");
    if(bp>0&&pc>0&&prev){
      prev.style.display="block";
      document.getElementById("pprev_val").textContent=`₹${(bp/pc).toFixed(2)}`;
      document.getElementById("pprev_calc").textContent=`${rup(bp)} ÷ ${pc} pieces`;
    } else if(prev) prev.style.display="none";
    // Profit preview
    const profPrev=document.getElementById("pprofit_prev");
    if(bp>0&&pr>0&&profPrev){
      profPrev.style.display="block";
      const profit=bp-pr;
      document.getElementById("pp_sell").textContent=rup(bp);
      document.getElementById("pp_buy").textContent=rup(pr);
      const el=document.getElementById("pp_profit");
      el.textContent=rup(profit);
      el.style.color=profit>0?"var(--ok)":"var(--err)";
    } else if(profPrev) profPrev.style.display="none";
  };
  document.getElementById("pbox")?.addEventListener("input",updatePreview);
  document.getElementById("ppcs")?.addEventListener("input",updatePreview);
  document.getElementById("pprate")?.addEventListener("input",updatePreview);
  updatePreview();
  // Auto-select all on focus — zero ya koi bhi value ho, tap karte hi select ho jaaye
  ["pbox","ppcs","pstk","pprate"].forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    el.addEventListener("focus",()=>{ requestAnimationFrame(()=>el.select()); });
  });
  document.getElementById("psave")?.addEventListener("click",()=>{
    const name=document.getElementById("pname")?.value?.trim();
    const boxPrice=parseFloat(document.getElementById("pbox")?.value)||0;
    const piecesPerBox=parseInt(document.getElementById("ppcs")?.value)||1;
    const stock=parseInt(document.getElementById("pstk")?.value)||0;
    const purchaseRate=parseFloat(document.getElementById("pprate")?.value)||0;
    const emoji=ST.pForm?.emoji||(ST.editProdId?ST.products.find(p=>p.id===ST.editProdId)?.emoji:"🍦")||"🍦";
    if(!name){alert("Product naam daalo!");return;}
    if(!boxPrice){alert("Box price daalo!");return;}
    if(piecesPerBox<1){alert("Pieces per box kam se kam 1 hona chahiye!");return;}
    if(ST.editProdId){
      ST.products=ST.products.map(p=>p.id===ST.editProdId?{...p,name,boxPrice,piecesPerBox,stock,emoji,purchaseRate,updatedAt:Date.now()}:p);
    } else {
      ST.products.push({id:_genId(),name,boxPrice,piecesPerBox,stock,emoji,purchaseRate,updatedAt:Date.now()});
    }
    dbSave();ST.pTab="list";ST.pForm={};render();
  });
  document.getElementById("pdel")?.addEventListener("click",()=>{
    if(!confirm("Product delete karo?"))return;
    ST.products=ST.products.filter(p=>p.id!==ST.editProdId);
    dbSave();ST.pTab="list";ST.pForm={};render();
  });
}

function bVillages(){
  document.getElementById("vadd")?.addEventListener("click",()=>{ST.vTab="addVillage";ST.editVillageId=null;ST.vForm={};render();});
  document.getElementById("vbk")?.addEventListener("click",()=>{ST.vTab="list";ST.vForm={};render();});
  document.getElementById("sbk")?.addEventListener("click",()=>{ST.vTab="list";ST.vForm={};render();});

  /* ── Accordion Toggle — no re-render, pure DOM ── */
  document.querySelectorAll("[data-vtoggle]").forEach(head=>{
    head.addEventListener("click",()=>{
      const vid=+head.dataset.vtoggle;
      const shopsDiv=document.querySelector(`[data-vshops="${vid}"]`);
      const arrow=document.querySelector(`[data-varrow="${vid}"]`);
      if(!shopsDiv)return;
      const opening=shopsDiv.style.display==="none";
      shopsDiv.style.display=opening?"block":"none";
      if(arrow)arrow.style.transform=opening?"rotate(180deg)":"rotate(0deg)";
      if(opening)ST.vExpanded.add(vid);else ST.vExpanded.delete(vid);
    });
  });

  document.querySelectorAll("[data-vadd-shop]").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();ST.vTab="addShop";ST.editShopVillageId=+b.dataset.vaddShop;ST.editShopId=null;ST.vForm={};render();}));
  document.querySelectorAll("[data-vedit]").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();const v=getVillage(+b.dataset.vedit);if(!v)return;ST.vTab="addVillage";ST.editVillageId=v.id;ST.vForm={name:v.name};render();}));
  document.querySelectorAll("[data-vdel]").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();
    const vid=+b.dataset.vdel;
    const v=getVillage(vid);
    const relatedBills=(ST.bills||[]).filter(x=>x.villageId===vid).length;
    const warnMsg=relatedBills>0?`\n\n⚠️ Is gaon ke ${relatedBills} bills bhi hain — woh history mein rahenge lekin gaon/shop info hat jayegi.`:"";
    if(!confirm("Gaon aur sab shops delete karo?"+warnMsg))return;
    ST.villages=ST.villages.filter(v=>v.id!==vid);
    ST.vExpanded.delete(vid); /* accordion state cleanup */
    /* BUG FIX: Also remove udhari entries for this village's shops */
    const shopIds=new Set((v?.shops||[]).map(s=>s.id));
    ST.udhari=ST.udhari.filter(u=>!(u.villageId===vid||shopIds.has(u.shopId)));
    dbSave();render();
  }));
  document.querySelectorAll("[data-sedit]").forEach(b=>b.addEventListener("click",()=>{const s=getShop(+b.dataset.svillage,+b.dataset.sedit);if(!s)return;ST.vTab="addShop";ST.editShopVillageId=+b.dataset.svillage;ST.editShopId=+b.dataset.sedit;ST.vForm={name:s.name,ownerName:s.ownerName,mobile:s.mobile,customRates:{...(s.customRates||{})}};render();}));
  document.querySelectorAll("[data-sdel]").forEach(b=>b.addEventListener("click",()=>{if(!confirm("Shop delete karo?"))return;const vid=+b.dataset.svillage;ST.villages=ST.villages.map(v=>v.id===vid?{...v,shops:v.shops.filter(s=>s.id!==+b.dataset.sdel)}:v);dbSave();render();}));
  document.getElementById("vsave")?.addEventListener("click",()=>{
    const name=document.getElementById("vname")?.value?.trim();if(!name){alert("Gaon naam daalo!");return;}
    if(ST.editVillageId)ST.villages=ST.villages.map(v=>v.id===ST.editVillageId?{...v,name,updatedAt:Date.now()}:v);
    else{ST.villages.push({id:_genId(),name,shops:[],updatedAt:Date.now()});}
    dbSave();ST.vTab="list";ST.vForm={};render();
  });
  document.getElementById("ssave")?.addEventListener("click",()=>{
    const name=document.getElementById("sname")?.value?.trim();
    const ownerName=document.getElementById("sowner")?.value?.trim();
    const mobile=document.getElementById("smobile")?.value?.trim();
    if(!name){alert("Shop naam daalo!");return;}if(!ownerName){alert("Owner naam daalo!");return;}
    const vid=ST.editShopVillageId;
    // Custom rates collect karo — sirf non-empty, valid values
    const customRates={};
    document.querySelectorAll("[data-cr-pid]").forEach(inp=>{
      const pid=+inp.dataset.crPid;
      const val=parseFloat(inp.value);
      if(!isNaN(val)&&val>0){customRates[pid]=val;}
    });
    const shopObj={id:ST.editShopId||_genId(),name,ownerName,mobile:mobile||"",customRates,updatedAt:Date.now()};
    if(ST.editShopId)ST.villages=ST.villages.map(v=>v.id===vid?{...v,shops:v.shops.map(s=>s.id===ST.editShopId?shopObj:s)}:v);
    else ST.villages=ST.villages.map(v=>v.id===vid?{...v,shops:[...v.shops,shopObj]}:v);
    /* BUG FIX v68: If the edited shop is currently selected in billing,
       refresh sessionPrices with new customRates so stale rates aren't used */
    if(ST.editShopId&&ST.selShopId===ST.editShopId&&ST.selVillageId===vid&&!ST.walkMode){
      ST.sessionPrices={};
      Object.entries(customRates).forEach(([pid,rate])=>{
        if(!isNaN(+rate)&&+rate>0) ST.sessionPrices[+pid]=+rate;
      });
      if(Object.keys(ST.sessionPrices).length>0)_showToast(`\u{1F4B0} Custom rates updated!`,"#D97706");
    }
    dbSave();ST.vTab="list";ST.vForm={};render();
  });

  /* ══ CONTACT PICKER — Phone book se number ══ */
  document.getElementById("contact_pick_btn")?.addEventListener("click", async ()=>{
    const btn=document.getElementById("contact_pick_btn");

    /* Check if Contact Picker API supported */
    if(!("contacts" in navigator && "ContactsManager" in window)){
      /* Fallback — manual input highlight karo */
      _showToast("⚠️ Is browser mein Contact Picker support nahi — number manually type karo","#F59E0B");
      document.getElementById("smobile")?.focus();
      return;
    }

    try{
      btn.textContent="⏳ Loading...";
      btn.disabled=true;

      const contacts = await navigator.contacts.select(
        ["name","tel"],
        {multiple:false}
      );

      if(contacts && contacts.length > 0){
        const contact = contacts[0];
        /* Get first phone number */
        const rawNum = (contact.tel||[])[0] || "";
        /* Clean — sirf digits rakho, last 10 lo */
        const cleaned = rawNum.replace(/\D/g,"").slice(-10);

        if(cleaned.length >= 10){
          const inp = document.getElementById("smobile");
          if(inp){
            inp.value = cleaned;
            inp.style.border="2px solid var(--pri)";
            setTimeout(()=>inp.style.border="",2000);
          }
          /* Name bhi fill karo agar khali hai */
          const nameInp = document.getElementById("sowner");
          if(nameInp && !nameInp.value.trim() && contact.name?.[0]){
            nameInp.value = contact.name[0];
          }
          _showToast("✅ Contact se number add ho gaya!","#00A650");
        } else {
          _showToast("⚠️ Valid number nahi mila — manually type karo","#F59E0B");
          document.getElementById("smobile")?.focus();
        }
      }
    } catch(err){
      if(err.name !== "AbortError"){
        _showToast("❌ Contact access nahi ho saka","#EF4444");
      }
    } finally {
      if(btn){btn.textContent="📒 Contact";btn.disabled=false;}
    }
  });
}

/* ══════════════ DASHBOARD BIND ══════════════ */
/* Chart bar tap → show detail popup */
function _bindChartInteractions(){
  const mode = ST.dashChartMode || "monthly";
  const active = ST.bills.filter(b=>!b.returned);
  const now = new Date();

  document.querySelectorAll(".smart-bar").forEach(bar=>{
    bar.addEventListener("click",()=>{
      const idx = +bar.dataset.bidx;
      const detail = document.getElementById("chart_detail");
      const cdLabel = document.getElementById("cd_label");
      const cdAmt   = document.getElementById("cd_amt");
      const cdSub   = document.getElementById("cd_sub");
      if(!detail||!cdLabel||!cdAmt||!cdSub) return;

      /* Rebuild same data array as render */
      let entry;
      if(mode==="monthly"){
        const d = new Date(now.getFullYear(), now.getMonth()-(5-idx), 1);
        const bills = active.filter(b=>{
          const bd=new Date(b.date);
          return bd.getMonth()===d.getMonth()&&bd.getFullYear()===d.getFullYear();
        });
        const total = bills.reduce((s,b)=>s+(b.payment?.discountedBill||b.purchaseTotal),0);
        const topShop = bills.length ? [...bills].sort((a,b2)=>(b2.payment?.discountedBill||b2.purchaseTotal)-(a.payment?.discountedBill||a.purchaseTotal))[0] : null;
        entry={
          label: d.toLocaleString("en-IN",{month:"long",year:"numeric"}),
          total, count:bills.length,
          extra: topShop ? `Top: ${esc(topShop.shopName)} · ${rup(topShop.payment?.discountedBill||topShop.purchaseTotal)}` : "Koi bill nahi"
        };
      } else if(mode==="weekly"){
        const wStart = new Date(now);
        wStart.setDate(now.getDate() - (now.getDay()||7) + 1 - (7-idx)*7);
        const wEnd = new Date(wStart); wEnd.setDate(wStart.getDate()+6);
        const bills = active.filter(b=>{
          const bd=new Date(b.date); bd.setHours(0,0,0,0);
          return bd>=wStart&&bd<=wEnd;
        });
        const total = bills.reduce((s,b)=>s+(b.payment?.discountedBill||b.purchaseTotal),0);
        entry={
          label: wStart.toLocaleDateString("en-IN",{day:"2-digit",month:"short"})+" – "+wEnd.toLocaleDateString("en-IN",{day:"2-digit",month:"short"}),
          total, count:bills.length,
          extra: bills.length ? `${bills.length} bills · Average ${rup(Math.round(total/(bills.length||1)))} per bill` : "Is hafte koi bill nahi"
        };
      } else {
        const d = new Date(now); d.setDate(now.getDate()-(13-idx)); d.setHours(0,0,0,0);
        const dStr = d.toDateString();
        const bills = active.filter(b=>new Date(b.date).toDateString()===dStr);
        const total = bills.reduce((s,b)=>s+(b.payment?.discountedBill||b.purchaseTotal),0);
        const uniqueGaon = [...new Set(bills.map(b=>b.villageId))].length;
        entry={
          label: d.toLocaleDateString("en-IN",{weekday:"long",day:"2-digit",month:"short"}),
          total, count:bills.length,
          extra: bills.length ? `${bills.length} bills · ${uniqueGaon} gaon` : "Is din koi bill nahi"
        };
      }

      /* Toggle — tap same bar again hides detail */
      if(detail.style.display!=="none" && detail.getAttribute("data-open-idx")===String(idx)){
        detail.style.display="none"; return;
      }
      detail.setAttribute("data-open-idx", String(idx));
      cdLabel.textContent = entry.label;
      cdAmt.textContent   = rup(entry.total);
      cdSub.textContent   = entry.extra;
      detail.style.display="block";
      detail.style.animation="none"; detail.offsetHeight; detail.style.animation="fadeUp .2s both";

      /* Highlight selected bar */
      document.querySelectorAll(".smart-bar").forEach((b,i)=>{
        b.style.opacity = i===idx ? "1" : "0.45";
      });
    });
  });

  /* Chart mode buttons (after DOM replace) */
  document.querySelectorAll(".chart-mode-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      ST.dashChartMode = btn.dataset.cmode;
      const card = document.getElementById("smart_chart_card");
      if(card){
        const tmp=document.createElement("div");
        tmp.innerHTML=_saleChartHTML();
        const newCard=tmp.firstElementChild;
        if(newCard){ card.replaceWith(newCard); _bindChartInteractions(); }
      }
    });
  });
}

function bDash(){
  document.getElementById("dash_go_profit")?.addEventListener("click",()=>{ST.tab="profit";render();});
  /* Backup reminder banner — one tap to take backup right away */
  document.getElementById("backup_remind_banner")?.addEventListener("click",()=>{
    _styledConfirm({
      icon:"💾",title:"Backup Lo?",
      msg:"Aapke business ka pura data (bills, udhari, products) ek file mein download ho jayega. Yeh file aap WhatsApp/Drive mein safe rakh sakte ho.",

      onYes:()=>{ dvBackup(); }
    });
  });
  /* v35: bind dashboard date filter */
  bindDateFilter("dash");

  /* ══ SMART CHART — mode toggle buttons ══ */
  document.querySelectorAll(".chart-mode-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      ST.dashChartMode = btn.dataset.cmode;
      /* Re-render only the chart card (no full page re-render — no scroll jump) */
      const card = document.getElementById("smart_chart_card");
      if(card){
        const tmp = document.createElement("div");

  document.querySelectorAll("[data-returnbill]").forEach(btn=>{
    btn.addEventListener("click",e=>{
      e.stopPropagation();
      const bid=+btn.dataset.returnbill;
      const b=ST.bills.find(x=>x.id===bid);
      if(!b)return;

        okText:"Haan, Wapas",okClass:"danger",
        onYes:()=>_doReturnBill(b)
      });
    });
  });
  // Day summary button
  document.getElementById("day_summary_btn")?.addEventListener("click",()=>_showDaySummary());

}

/* ══ RETURN BILL ══ */
function _doReturnBill(b){
  // Mark bill as returned
  ST.bills=ST.bills.map(x=>x.id===b.id?{...x,returned:true,returnDate:Date.now(),returnedAt:new Date().toISOString()}:x);
  // Restore product stock
  ST.products=ST.products.map(p=>{
    const it=b.items.find(i=>i.id===p.id);
    return it?{...p,stock:(p.stock||0)+it.boxQty}:p;
  });
  // Restore global + vehicle sold counters
  b.items.forEach(it=>{
    if(ST.stock.sold){ST.stock.sold[it.id]=Math.max(0,(ST.stock.sold[it.id]||0)-it.boxQty);}
    if(ST.stock.returned){ST.stock.returned[it.id]=(ST.stock.returned[it.id]||0)+it.boxQty;}
    const vk=b.vehicleKey||ST.activeVehicle||"v1";
    if(ST.vehicles[vk]?.stock?.sold){
      ST.vehicles[vk].stock.sold[it.id]=Math.max(0,(ST.vehicles[vk].stock.sold[it.id]||0)-it.boxQty);
    }
  });
  /* FIX: Also restore free product stock on return */
  if(b.schemeApplied&&b.freeProduct){
    const fp=b.freeProduct;
    const vkR=b.vehicleKey||ST.activeVehicle||"v1";
    ST.products=ST.products.map(p=>p.id===fp.id?{...p,stock:(p.stock||0)+fp.boxQty}:p);
    if(ST.stock.sold)ST.stock.sold[fp.id]=Math.max(0,(ST.stock.sold[fp.id]||0)-fp.boxQty);
    if(ST.vehicles[vkR]?.stock?.sold)
      ST.vehicles[vkR].stock.sold[fp.id]=Math.max(0,(ST.vehicles[vkR].stock.sold[fp.id]||0)-fp.boxQty);
  }
  // Reverse udhari if any — find by shopId/villageId (billId does NOT exist on udhari entries)
  // FIX Bug#7: Also search cleared entries so returned bills with paid-off udhari are correctly reversed
  const ud=b.payment?.udhari||0;
  if(ud>0){
    const uEntry=b.shopId
      ? (ST.udhari.find(u=>u.shopId===b.shopId&&u.villageId===b.villageId&&!u.cleared) ||
         ST.udhari.find(u=>u.shopId===b.shopId&&u.villageId===b.villageId))
      : (ST.udhari.find(u=>u.shopName.toLowerCase().trim()===b.shopName.toLowerCase().trim()&&!u.cleared) ||
         ST.udhari.find(u=>u.shopName.toLowerCase().trim()===b.shopName.toLowerCase().trim()));
    if(uEntry){
      /* BUG FIX: Only reverse the UNPAID portion of udhari.
         If some udhari was already collected via payments, do NOT reverse that paid portion —
         only subtract the portion that was never paid. */
      /* BUG FIX v91: Sirf direct bill payments count karo, "Purani udhari" payments nahi.
         Purani udhari payments ek alag udhari entry ka hissa hain — is bill ki udhari se minus nahi hone chahiye. */
      const linkedPaid=(ST.customerPayments||[]).filter(p=>String(p.billId)===String(b.id)&&!(p.note&&p.note.startsWith("Purani udhari"))).reduce((s,p)=>s+p.amount,0);
      const unpaidUd=Math.max(0,ud-linkedPaid);
      uEntry.amount=Math.max(0,uEntry.amount-unpaidUd);
      if(uEntry.history)uEntry.history=uEntry.history.filter(h=>!(h.type==="bill"&&h.billNo===b.billNo));
      /* FIX Bug#7: Re-evaluate cleared status after reversal */
      if(uEntry.amount<=0){uEntry.cleared=true;uEntry.amount=0;uEntry.paid=0;}
      else if(uEntry.paid<uEntry.amount)uEntry.cleared=false;
    }
  }
  // Remove customerPayments linked to this bill
  if(ST.customerPayments){
    ST.customerPayments=ST.customerPayments.filter(p=>String(p.billId)!==String(b.id));
  }
  // Add a credit entry in ledger for the returned bill amount (so balance stays correct)
  if(b.shopId&&b.villageId){
    if(!ST.customerPayments)ST.customerPayments=[];
    ST.customerPayments.push({
      id:Date.now()+5,
      villageId:b.villageId,shopId:b.shopId,
      villageName:b.villageName,shopName:b.shopName,
      /* BUG FIX v57: Use discountedBill to match the debit side in buildLedger.
         Return credit must equal original debit — both now use discountedBill */
      amount:(b.payment?.discountedBill||b.purchaseTotal),mode:"cash",
      date:Date.now(),
      note:"Bill Return — "+b.billNo,
      billId:null
    });
  }
  dbSave();
  _showToast("↩ Bill wapas ho gaya — "+b.billNo,"#EF4444");
  render();
}

function _calcProfitData(period,fromDate,toDate){
  const now=new Date();
  const _todayMid=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();
  const filterBill=b=>{
    if(b.returned) return false;
    const d=new Date(b.date);
    /* v35: custom date range */
    if(fromDate||toDate) return dateInRange(b.date,fromDate||"",toDate||"");
    if(period==="today") return d.toDateString()===now.toDateString();
    /* BUG FIX v57: "kal" (yesterday) handler missing — was falling through to "all" → wrong profit */
    if(period==="kal"){const kal=new Date(now);kal.setDate(kal.getDate()-1);return d.toDateString()===kal.toDateString();}
    if(period==="week"){const bd=new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();return(_todayMid-bd)/(864e5)<7;}
    if(period==="month") return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    return true; // all
  };
  const bills=ST.bills.filter(filterBill);

  // Per-product profit
  // BUG FIX: Use it.boxPrice (price at time of billing), NOT p.boxPrice (current price).
  // p.boxPrice changes when user edits a product — that must not retroactively alter history.
  const prodMap={};
  bills.forEach(b=>{
    /* Discount ratio — apply proportionally across items */
    const _discRatio=b.payment?.discountPct>0?(1-(b.payment.discountPct/100)):1;
    b.items.forEach(it=>{
      const p=ST.products.find(x=>x.id===it.id);
      const pr=p?.purchaseRate||0;
      /* Use billing-time price (it.boxPrice) for revenue and profit — never current price */
      const billedPrice=(it.boxPrice||0)*_discRatio; /* effective price after discount */
      const profitPerBox=billedPrice-pr;
      if(!prodMap[it.id]) prodMap[it.id]={id:it.id,name:it.name,emoji:p?.emoji||"📦",boxPrice:it.boxPrice||0,purchaseRate:pr,boxesSold:0,revenue:0,cost:0,profit:0};
      prodMap[it.id].boxesSold+=it.boxQty;
      prodMap[it.id].revenue+=(it.amount||it.boxPrice*it.boxQty)*_discRatio;
      prodMap[it.id].cost+=pr*it.boxQty;
      prodMap[it.id].profit+=profitPerBox*it.boxQty;
    });
  });

  const products=Object.values(prodMap).sort((a,b)=>b.profit-a.profit);
  const totalRevenue=products.reduce((s,p)=>s+p.revenue,0);
  const totalCost=products.reduce((s,p)=>s+p.cost,0);
  /* FIX: Deduct free product purchase cost from gross profit */
  const freeCost=bills.reduce((s,b)=>{
    if(!b.schemeApplied||!b.freeProduct)return s;
    const fp=ST.products.find(p=>p.id===b.freeProduct.id);
    const pr=fp?.purchaseRate||0;
    return s+(pr*b.freeProduct.boxQty);
  },0);
  const grossProfit=totalRevenue-totalCost-freeCost;

  // Expenses for period
  /* FIX Bug#13: midnight-normalized week filter for expenses too */
  const filterExp=e=>{
    const d=new Date(e.date);
    /* v35: custom date range */
    if(fromDate||toDate) return dateInRange(e.date,fromDate||"",toDate||"");
    if(period==="today") return d.toDateString()===now.toDateString();
    if(period==="week"){const ed=new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();return(_todayMid-ed)/(864e5)<7;}
    if(period==="month") return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    return true;
  };
  const periodExpenses=ST.expenses.filter(filterExp);
  const totalExpenses=periodExpenses.reduce((s,e)=>s+e.amount,0);
  const netProfit=grossProfit-totalExpenses;

  return{products,totalRevenue,totalCost,grossProfit,totalExpenses,netProfit,billCount:bills.length,periodExpenses};
}

function bExpense(){
  document.getElementById("expadd")?.addEventListener("click",()=>{
    ST.expTab="form";ST.expEditId=null;ST.expForm={category:"🎯 Other"};render();
  });
  document.getElementById("expbk")?.addEventListener("click",()=>{
    ST.expTab="list";ST.expEditId=null;ST.expForm={};render();
  });
  /* Real-time: preserve typed values in ST.expForm so category tap doesn't lose them */
  const _expSync=()=>{
    const amt=document.getElementById("exp_amt")?.value;
    const desc=document.getElementById("exp_desc")?.value;
    const date=document.getElementById("exp_date")?.value;
    if(amt!==undefined||desc!==undefined||date!==undefined)
      ST.expForm={...ST.expForm,
        amount:amt??ST.expForm?.amount,
        desc:desc??ST.expForm?.desc,
        dateStr:date??ST.expForm?.dateStr
      };
  };
  ["exp_amt","exp_desc","exp_date"].forEach(id=>{
    document.getElementById(id)?.addEventListener("input",_expSync);
  });
  /* v35: bind expense date filter */
  bindDateFilter("expense");
  document.querySelectorAll("[data-expper]").forEach(b=>b.addEventListener("click",()=>{
    ST.expPeriod=b.dataset.expper;ST.expenseDateFrom="";ST.expenseDateTo="";render();
  }));
  document.querySelectorAll("[data-expcat]").forEach(b=>b.addEventListener("click",()=>{
    /* preserve typed values */
    const _amtEl=document.getElementById("exp_amt"),_descEl=document.getElementById("exp_desc"),_dEl=document.getElementById("exp_date");
    ST.expForm={...ST.expForm,
      category:b.dataset.expcat,
      amount:_amtEl?_amtEl.value:ST.expForm?.amount,
      desc:_descEl?_descEl.value:ST.expForm?.desc,
      dateStr:_dEl?_dEl.value:ST.expForm?.dateStr
    };
    render();
  }));
  document.getElementById("expsave")?.addEventListener("click",()=>{
    const amt=parseFloat(document.getElementById("exp_amt")?.value)||0;
    const desc=document.getElementById("exp_desc")?.value?.trim();
    const category=ST.expForm?.category||(ST.expEditId?ST.expenses.find(e=>e.id===ST.expEditId)?.category:"🎯 Other");
    const dateStr=document.getElementById("exp_date")?.value;
    if(!amt){alert("Amount daalo!");return;}
    if(!desc){alert("Description daalo!");return;}
    /* FIX Bug#22: Parse date as local midnight to avoid off-by-one day in IST */
    const dateMs=dateStr?(()=>{const [y,m,d]=dateStr.split("-").map(Number);return new Date(y,m-1,d).getTime();})():Date.now();
    if(ST.expEditId){
      const i=ST.expenses.findIndex(e=>e.id===ST.expEditId);
      if(i>=0){ST.expenses[i]={...ST.expenses[i],date:dateMs,category,desc,amount:amt};}
      ST.expEditId=null;
      dbSave();ST.expTab="list";ST.expForm={};render();
      _showToast("✅ Expense updated!","#2563EB");
    } else {
      ST.expenses.push({id:Date.now(),date:dateMs,category,desc,amount:amt});
      dbSave();ST.expTab="list";ST.expForm={};render();
      _showToast("✅ Expense saved!","#EF4444");
    }
  });
  document.querySelectorAll("[data-expedit]").forEach(b=>b.addEventListener("click",()=>{
    const id=+b.dataset.expedit;
    const e=ST.expenses.find(x=>x.id===id);if(!e)return;
    ST.expEditId=id;ST.expForm={};ST.expTab="form";render();
  }));
  document.querySelectorAll("[data-expdel]").forEach(b=>b.addEventListener("click",()=>{
    const id=+b.dataset.expdel;
    const e=ST.expenses.find(x=>x.id===id);if(!e)return;
    _styledConfirm({
      icon:"🗑️",
      title:"Expense delete karo?",
      msg:`<b>${esc(e.desc)}</b><br><span style="color:var(--err);font-weight:800">${rup(e.amount)}</span> ka kharch hat jaayega. Yeh undo nahi ho sakta.`,
      okText:"Haan, Delete",okClass:"danger",
      onYes:()=>{ST.expenses=ST.expenses.filter(x=>x.id!==id);dbSave();render();_showToast("🗑️ Expense deleted","#EF4444");}
    });
  }));
}

        ${cols.map(c=>`<div style="background:#fff;border-radius:12px;margin-bottom:8px;padding:14px 16px;display:flex;align-items:center;gap:12px">

      ${clearedCount>0?`<button id="u_cleared_btn2" style="width:100%;background:#fff;border:1.5px dashed #ccc;border-radius:14px;padding:13px;font-size:12px;color:#888;font-weight:700;cursor:pointer;margin-top:4px">✅ Clear ho gayi udhari (${clearedCount})</button>`:""}
    </div>

}

  let _ucPayMode=ST._ucPayMode;
  const _ucSetMode=(m)=>{
    _ucPayMode=m;ST._ucPayMode=m;
    document.querySelectorAll(".uc-mode").forEach(el=>{
      const active=el.dataset.mode===m;
      if(m==="cash"){el.style.borderColor=active?"#2ecc71":"rgba(0,0,0,.1)";el.style.background=active?"#f0fff4":"#fafafa";el.style.color=active?"#27ae60":"#aaa";}
      else if(m==="upi"){el.style.borderColor=active?"#3B82F6":"rgba(0,0,0,.1)";el.style.background=active?"rgba(59,130,246,.1)":"#fafafa";el.style.color=active?"#2563EB":"#aaa";}
      else{el.style.borderColor=active?"#8B5CF6":"rgba(0,0,0,.1)";el.style.background=active?"rgba(139,92,246,.1)":"#fafafa";el.style.color=active?"#7C3AED":"#aaa";}
    });
  };
  document.querySelectorAll(".uc-mode").forEach(el=>{
    el.addEventListener("click",()=>_ucSetMode(el.dataset.mode));
  });
  _ucSetMode("cash"); /* init state */
  /* Search bar */
  document.getElementById("u_search")?.addEventListener("input",function(){
    ST.uSearch=this.value;render();
  });
  /* Delete udhari entry */
  document.getElementById("u_del_entry")?.addEventListener("click",()=>{
    const u=ST.showUdhariDetail;if(!u)return;
    const bal=Math.max(0,(u.amount||0)-(u.paid||0));
    _styledConfirm({
      icon:"🗑️",title:"Udhari Delete Karo?",
      msg:`<b>${esc(u.shopName)}</b> · ${esc(u.villageName)}<br><span style="color:var(--err);font-weight:800">Baaki: ₹${bal.toLocaleString("en-IN")}</span><br><br><span style="color:var(--t3);font-size:11px">Yeh undo nahi ho sakta!</span>`,
      okText:"Haan, Delete",okClass:"danger",
      onYes:()=>{
        ST.udhari=ST.udhari.filter(x=>x.id!==u.id);
        ST.showUdhariDetail=null;
        ST.uTab="list";
        dbSave();render();
        _showToast("🗑️ Udhari delete ho gayi","#e74c3c");
      }
    });
  });
  /* Save payment */
  document.getElementById("ucsave")?.addEventListener("click",()=>{
    const u=ST.showUdhariDetail;
    if(!u||!u.id){_showToast("Error: Shop data nahi mila!","#e74c3c");return;}
    const bal=(u.amount||0)-(u.paid||0);
    const rawAmt=parseFloat(document.getElementById("ucamt")?.value)||0;
    if(rawAmt<=0){_showToast("⚠️ Amount daalo!","#e67e22");return;}
    const amt=Math.min(rawAmt,bal);
    if(rawAmt>bal){_showToast(`⚠️ Max ₹${bal} de sakte ho`,"#e67e22");document.getElementById("ucamt").value=bal;return;}
    const note=document.getElementById("ucnote")?.value.trim()||"Payment Received";
    const dateStr=document.getElementById("ucdate")?.value;
    const nowMs=dateStr?(()=>{const [y,m,d]=dateStr.split("-").map(Number);return new Date(y,m-1,d).getTime();})():Date.now();
    const modeLabel=_ucPayMode==="cash"?"💵 Cash":_ucPayMode==="upi"?"📱 UPI":"📄 Cheque";
    const finalNote=note==="Payment Received"?`${modeLabel} payment mila`:note;
    ST.udhari=ST.udhari.map(x=>{
      if(x.id!==u.id)return x;
      const newPaid=Math.min((x.paid||0)+amt,x.amount);
      const cleared=newPaid>=x.amount;
      const balAfter=Math.max(0,x.amount-newPaid);
      return{...x,paid:newPaid,cleared,clearedDate:cleared?(x.clearedDate||nowMs):x.clearedDate,history:[...(x.history||[]),{type:"pay",amount:amt,date:nowMs,note:finalNote,mode:_ucPayMode,balAfter}]};
    });
    ST.showUdhariDetail=ST.udhari.find(x=>x.id===u.id)||null;
    /* v95 SYNC FIX: customerPayments mein entry dono cases mein save karo —
       normal shop (villageId+shopId) aur walk-in dono ke liye.
       Pehle sirf if(u.villageId&&u.shopId) condition tha — walk-in skip ho jaata tha.
       Ab walk-in bhi _walkIn:true flag ke saath save hoga. */
    if(!ST.customerPayments)ST.customerPayments=[];
    const _dup=ST.customerPayments.find(p=>
      p.amount===amt&&p.billId==null&&Math.abs(p.date-nowMs)<2000&&
      (u.shopId?(p.villageId===u.villageId&&p.shopId===u.shopId):(p._walkIn&&(p.shopName||"").toLowerCase().trim()===(u.shopName||"").toLowerCase().trim()))
    );
    if(!_dup){
      ST.customerPayments.push({
        id:Date.now()+1,
        villageId:u.villageId||null,shopId:u.shopId||null,
        villageName:u.villageName||"Walk-In",shopName:u.shopName,
        amount:amt,mode:_ucPayMode,date:nowMs,note:finalNote,
        billId:null,_walkIn:!u.shopId
      });
    }
    dbSave();ST.uTab="detail";ST._ucPayMode=null;render();
    const nu=ST.udhari.find(x=>x.id===u.id);
    _showToast(nu?.cleared?"🎉 Poora paisa aa gaya!":"✅ Payment save ho gayi!","#27ae60");
  });
}

    <div style="margin-bottom:11px">
      <label style="font-size:11px;font-weight:700;color:var(--t2);display:block;margin-bottom:5px">💰 Udhari Amount *</label>
      <input id="mu_amt" class="inp" type="number" inputmode="numeric" placeholder="₹ kitni udhari?" style="font-size:18px;font-weight:800;color:var(--err)">
    </div>
    <div style="margin-bottom:11px">
      <label style="font-size:11px;font-weight:700;color:var(--t2);display:block;margin-bottom:5px">📅 Taareekh</label>
      <input id="mu_date" class="inp" type="date" value="${todayYMD}" max="${todayYMD}">
    </div>
    <div style="margin-bottom:14px">
      <label style="font-size:11px;font-weight:700;color:var(--t2);display:block;margin-bottom:5px">📝 Note (optional)</label>
      <input id="mu_note" class="inp" placeholder="e.g. Maal diya, Bill no...">
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn b-ghost rip" style="flex:1" id="mu_cancel">Cancel</button>
      <button class="btn b-err rip" style="flex:2;font-size:14px" id="mu_save">📋 Udhari Add Karo</button>
    </div>
  </div>`;
  div.addEventListener("click",e=>{if(e.target===div)div.remove();});
  div.querySelector("#mu_cancel").addEventListener("click",()=>div.remove());
  div.querySelector("#mu_save").addEventListener("click",()=>{
    const amt=parseFloat(div.querySelector("#mu_amt")?.value)||0;
    if(amt<=0){_showToast("⚠️ Amount daalo!","#e74c3c");return;}
    const dateStr=div.querySelector("#mu_date")?.value||todayYMD;
    const dateMs=(()=>{const [y,m,d]=dateStr.split("-").map(Number);return new Date(y,m-1,d).getTime();})();
    const note=div.querySelector("#mu_note")?.value.trim()||"Udhari Di";
    const nowMs=Date.now();
    if(u){
      /* Add to existing entry */
      ST.udhari=ST.udhari.map(x=>{
        if(x.id!==u.id)return x;
        const newAmt=(x.amount||0)+amt;
        const cleared=false; /* reopens cleared udhari */
        return{...x,amount:newAmt,cleared,history:[...(x.history||[]),{type:"udhari",amount:amt,date:dateMs,note}]};
      });
      ST.showUdhariDetail=ST.udhari.find(x=>x.id===u.id)||null;
      /* ── LEDGER SYNC FIX v90: Manual udhari → Khatabook mein bhi dikhao ──
         Village+Shop linked udhari entries ke liye ek synthetic bill entry ST.bills mein push karo
         taaki buildLedger() isko debit side mein count kare. */
      if(u.villageId&&u.shopId){
        if(!ST.bills)ST.bills=[];
        const manualBillEntry={
          id:nowMs+10,billNo:"MU-"+nowMs,
          villageId:u.villageId,shopId:u.shopId,
          villageName:u.villageName,shopName:u.shopName,
          date:dateMs,purchaseTotal:amt,
          payment:{cash:0,upi:0,udhari:amt,prevUdhari:0,grandTotal:amt,discountPct:0,discountAmt:0,discountedBill:amt},
          items:[],returned:false,_manualUdhari:true,note:note
        };
        ST.bills.push(manualBillEntry);
      }
    } else {
      /* New entry */
      const shopName=(div.querySelector("#mu_shop")?.value||"").trim();
      const villageName=(div.querySelector("#mu_village")?.value||"").trim()||"Walk-in";
      const mobile=(div.querySelector("#mu_mobile")?.value||"").trim();
      if(!shopName){_showToast("⚠️ Shop naam daalo!","#e74c3c");return;}
      const newU={
        id:nowMs,shopId:null,villageId:null,
        shopName,villageName,shopMobile:mobile,
        amount:amt,paid:0,cleared:false,
        date:dateMs,
        history:[{type:"udhari",amount:amt,date:dateMs,note}]
      };
      if(!ST.udhari)ST.udhari=[];
      ST.udhari.unshift(newU);
      /* NOTE: Walk-in customers (shopId/villageId = null) Khatabook mein nahi dikhte —
         woh Udhari tab se hi track hote hain. Village se linked shop ho toh wahan dikhega. */
    }
    dbSave();div.remove();render();
    _showToast("📋 Udhari add ho gayi!","#e74c3c");
  });
  document.body.appendChild(div);
}

/* ══════════════ SETTINGS ══════════════ */
/* ══════════════════════════════════════════════════════════════════
   BT — Async-safe Bluetooth wrapper
   ══════════════════════════════════════════════════════════════════
   RULES (freeze prevention):
   ① Never call connectPrinter() on JS thread synchronously
   ② All connect/print ops go through AndroidBT.asyncXxx() bridges
   ③ Java side MUST run those on a background thread and call back
   ④ Timeout guard: if no callback in 5 s → treat as failed
   ══════════════════════════════════════════════════════════════════ */
/* ══════════════════════════════════════════════════════════════════
   🖨️ BT OBJECT — Dual Mode: AndroidBT (APK) + Web Bluetooth (Chrome)
   ══════════════════════════════════════════════════════════════════
   MODE 1: APK mode — window.AndroidBT Java bridge (original)
   MODE 2: Web Bluetooth — works in Chrome on Android without APK!
           Supports ESC/POS thermal printers via BLE (Bluetooth Low Energy)
           Service UUID: 0000ff02-0000-1000-8000-00805f9b34fb (common thermal)
   ══════════════════════════════════════════════════════════════════ */

/* ── Web Bluetooth state ── */
window._wbt = {
  device: null,       // BluetoothDevice
  server: null,       // BluetoothRemoteGATTServer
  char: null,         // BluetoothRemoteGATTCharacteristic (write)
  name: "",           // connected device name
  connected: false,
  _autoReconnecting: false,  // auto-reconnect guard flag
};

/* ESC/POS UUIDs for common 58mm/80mm thermal printers */
const _BT_SERVICES = [
  "0000ff00-0000-1000-8000-00805f9b34fb",  // most common 58mm printers
  "49535343-fe7d-4ae5-8fa9-9fafd205e455",  // Microchip
  "0000ffe0-0000-1000-8000-00805f9b34fb",  // HM-10 / generic
  "000018f0-0000-1000-8000-00805f9b34fb",  // some 80mm
  "e7810a71-73ae-499d-8c15-faa9aef0c3f2",  // Epson/Star
];
const _BT_CHARS = [
  "0000ff02-0000-1000-8000-00805f9b34fb",
  "49535343-8841-43f4-a8d4-ecbe34729bb3",
  "0000ffe1-0000-1000-8000-00805f9b34fb",
  "00002af1-0000-1000-8000-00805f9b34fb",
  "bef8d6c9-9c21-4c9e-b632-bd58c1009f9f",
];

/* ESC/POS byte builder from line objects */
function _escposBytes(lines){
  const ESC=0x1B,GS=0x1D;
  const chunks=[];
  const enc=new TextEncoder();

  const push=(...bytes)=>chunks.push(new Uint8Array(bytes));
  const text=(s)=>{chunks.push(enc.encode(s));chunks.push(new Uint8Array([0x0A]));};

  // Init printer
  push(ESC,0x40);           // ESC @ — init
  push(ESC,0x74,0x00);      // ESC t 0 — CP437 charset

  lines.forEach(ln=>{
    if(!ln)return;
    const {content="",bold=0,align=0,format=0}=ln;

    // Align: 0=left,1=center,2=right
    push(ESC,0x61,align&0x03);
    // Bold
    push(ESC,0x45,bold?1:0);
    // Font size — GS ! command. Valid size bytes: 0x00=normal, 0x11=2x2, 0x22=3x3
    // format=4 is used as "normal" marker in legacy code — treat as 0x00
    const _fmtByte=(format===0||format===4)?0x00:format&0xFF;
    push(GS,0x21,_fmtByte);

    text(content);

    // Reset
    push(GS,0x21,0x00);
    push(ESC,0x45,0);
    push(ESC,0x61,0);
  });

  // Feed + cut
  const _feedN = Math.min(Math.max(parseInt(ST.printerSettings?.feedLines??2),0),20);
  push(ESC,0x64,_feedN);
  push(GS,0x56,0x42,0);  // full cut

  // Merge all chunks
  const total=chunks.reduce((s,c)=>s+c.length,0);
  const buf=new Uint8Array(total);
  let off=0;
  chunks.forEach(c=>{buf.set(c,off);off+=c.length;});
  return buf;
}

/* Send bytes in chunks over BLE — tries writeValueWithoutResponse first,
   falls back to writeValue (with response) for printers that require ACK.
   Chunk size: 512 for modern BLE 5.x phones, 20 as safe fallback. */
async function _wbtSend(bytes){
  const ch=window._wbt&&window._wbt.char;
  if(!ch) throw new Error("Printer characteristic not available");
  const useNoResp=ch.properties&&ch.properties.writeWithoutResponse;
  const CHUNK=512; // BLE 5.x; safe for all Android 8+ devices
  for(let i=0;i<bytes.length;i+=CHUNK){
    const slice=bytes.slice(i,i+CHUNK);
    try{
      if(useNoResp){
        await ch.writeValueWithoutResponse(slice);
      } else {
        await ch.writeValue(slice);
      }
    }catch(e){
      // Fallback: try the other write method
      try{
        if(useNoResp){await ch.writeValue(slice);}
        else{await ch.writeValueWithoutResponse(slice);}
      }catch(e2){throw e2;}
    }
    // Small pacing delay to avoid BLE buffer overflow
    if(bytes.length>512) await new Promise(r=>setTimeout(r,10));
  }
}

/* Try to find the writable characteristic */
async function _wbtFindChar(server){
  for(const svcUuid of _BT_SERVICES){
    try{
      const svc=await server.getPrimaryService(svcUuid);
      for(const charUuid of _BT_CHARS){
        try{
          const ch=await svc.getCharacteristic(charUuid);
          const props=ch.properties;
          if(props.write||props.writeWithoutResponse){
            return ch;
          }
        }catch{}
      }
      // Try all chars in this service
      try{
        const allChars=await svc.getCharacteristics();
        for(const ch of allChars){
          const p=ch.properties;
          if(p.write||p.writeWithoutResponse) return ch;
        }
      }catch{}
    }catch{}
  }
  return null;
}

/* Web Bluetooth: scan & connect */
async function _wbtConnect(){
  if(!navigator.bluetooth) return {ok:false,msg:"Web Bluetooth browser mein support nahi karta. Chrome use karo!"};
  try{
    const device=await navigator.bluetooth.requestDevice({
      acceptAllDevices:true,
      optionalServices:[..._BT_SERVICES,"battery_service"],
    });
    window._wbt.device=device;
    window._wbt.name=device.name||"Unknown Printer";
    device.addEventListener("gattserverdisconnected",async()=>{
      window._wbt.connected=false;window._wbt.char=null;
      window.onPrinterDisconnected&&window.onPrinterDisconnected();
      // Auto-reconnect once after 2 seconds
      if(window._wbt._autoReconnecting) return;
      window._wbt._autoReconnecting=true;
      await new Promise(r=>setTimeout(r,2000));
      try{
        if(!window._wbt.device||!window._wbt.device.gatt) {window._wbt._autoReconnecting=false;return;}
        const srv=await window._wbt.device.gatt.connect();
        window._wbt.server=srv;
        const ch=await _wbtFindChar(srv);
        if(ch){window._wbt.char=ch;window._wbt.connected=true;_showToast("🖨️ Printer reconnected!","#00A650");}
      }catch(e){/* silent — user can reconnect manually */}
      window._wbt._autoReconnecting=false;
    });
    const server=await device.gatt.connect();
    window._wbt.server=server;
    const ch=await _wbtFindChar(server);
    if(!ch) return {ok:false,msg:"Printer characteristic nahi mila. ESC/POS printer use karo."};
    window._wbt.char=ch;
    window._wbt.connected=true;
    // Save name so status() works
    return {ok:true,msg:window._wbt.name};
  }catch(e){
    window._wbt.connected=false;
    if(e.name==="NotFoundError") return {ok:false,msg:"Koi printer select nahi kiya."};
    return {ok:false,msg:"Connect failed: "+e.message};
  }
}

      {content:"Printer working hai!",bold:0,align:1,format:0},
      {content:"Web Bluetooth Connected",bold:0,align:1,format:0},
      {content:"",bold:0,align:0,format:0},
    ];
    const bytes=_escposBytes(lines);
    await _wbtSend(bytes);
    return {ok:true,msg:"ok"};
  }catch(e){return {ok:false,msg:"Print failed: "+e.message};}
}

const BT={
  /* Returns true if EITHER AndroidBT or Web Bluetooth is available */
  ok(){
    if(typeof window.AndroidBT!=="undefined") return true;
    if(typeof navigator!=="undefined"&&navigator.bluetooth) return true;
    return false;
  },

  /* Is this running in APK mode? */
  _apk(){return typeof window.AndroidBT!=="undefined";},

  paired(){
    if(BT._apk()){
      try{return JSON.parse(window.AndroidBT.getPairedDevices()||"[]");}
      catch{return[];}
    }
    // Web BT: no pre-scan of paired devices (browser security model)
    return [];
  },

  /* Synchronous status query */
  status(){
    if(BT._apk()){
      try{return window.AndroidBT.getConnectionStatus()||"disconnected";}
      catch{return"disconnected";}
    }
    // Web BT
    if(window._wbt&&window._wbt.connected&&window._wbt.name){
      return"connected:"+window._wbt.name;
    }
    return"disconnected";
  },

  btOn(){
    if(BT._apk()){
      try{return window.AndroidBT.isBluetoothEnabled();}
      catch{return false;}
    }
    // Web BT: assume on (browser handles permission)
    return typeof navigator!=="undefined"&&!!navigator.bluetooth;
  },

  enable(){
    if(BT._apk()){try{window.AndroidBT.enableBluetooth();}catch{}}
    // Web BT: nothing to do (browser handles it)
  },

  disconnect(){
    if(BT._apk()){try{window.AndroidBT.disconnectPrinter();}catch{}}
    // Web BT
    if(window._wbt&&window._wbt.device&&window._wbt.device.gatt&&window._wbt.device.gatt.connected){
      try{window._wbt.device.gatt.disconnect();}catch{}
    }
    if(window._wbt){window._wbt.connected=false;window._wbt.char=null;window._wbt.name="";}
  },

  /* ── Async connect ── */
  connect(mac){
    /* APK mode: original implementation */
    if(BT._apk()){
      // Validate MAC address format (XX:XX:XX:XX:XX:XX) before connecting
      if(mac&&!/^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$/.test(mac.trim())){
        return Promise.resolve({ok:false,msg:"Invalid MAC address format. Example: AA:BB:CC:DD:EE:FF"});
      }
      return new Promise(resolve=>{
        let done=false;
        const timer=setTimeout(()=>{
          if(done)return;done=true;window.BT._connectCB=null;
          resolve({ok:false,msg:"Timeout — printer ne respond nahi kiya (8s). Bluetooth ON hai? Printer range mein hai?"});
        },8000);
        window.BT._connectCB=function(result){
          if(done)return;done=true;clearTimeout(timer);window.BT._connectCB=null;
          const ok=(result||"").startsWith("ok:");
          resolve({ok,msg:(result||"").replace(/^(ok:|error:)/,"")});
        };
        try{
          if(typeof window.AndroidBT.asyncConnectPrinter==="function"){
            window.AndroidBT.asyncConnectPrinter(mac.trim());
          } else {
            setTimeout(()=>{
              try{const r=window.AndroidBT.connectPrinter(mac.trim());window.BT._connectCB&&window.BT._connectCB(r||"error:no result");}
              catch(e){window.BT._connectCB&&window.BT._connectCB("error:"+e);}
            },0);
          }
        }catch(e){clearTimeout(timer);done=true;resolve({ok:false,msg:""+e});}
      });
    }
    /* Web Bluetooth mode */
    return _wbtConnect();
  },

  /* ── Async print ── */
  printBill(lines){
    /* APK mode */
    if(BT._apk()){
      return new Promise(resolve=>{
        const json=JSON.stringify(lines);
        let done=false;
        const timer=setTimeout(()=>{
          if(done)return;done=true;window.BT._printCB=null;
          resolve({ok:false,msg:"Print timeout (5s)"});
        },5000);
        window.BT._printCB=function(result){
          if(done)return;done=true;clearTimeout(timer);window.BT._printCB=null;
          resolve({ok:(result||"").startsWith("ok"),msg:result||""});
        };
        try{
          if(typeof window.AndroidBT.asyncPrintBill==="function"){
            window.AndroidBT.asyncPrintBill(json);
          } else {
            setTimeout(()=>{
              try{const r=window.AndroidBT.printBill(json);window.BT._printCB&&window.BT._printCB(r||"ok");}
              catch(e){window.BT._printCB&&window.BT._printCB("error:"+e);}
            },0);
          }
        }catch(e){clearTimeout(timer);done=true;resolve({ok:false,msg:""+e});}
      });
    }
    /* Web Bluetooth mode */
    return new Promise(async(resolve)=>{
      if(!window._wbt.connected||!window._wbt.char){
        resolve({ok:false,msg:"Printer connect nahi hai"});return;
      }
      try{
        const bytes=_escposBytes(lines);
        await _wbtSend(bytes);
        resolve({ok:true,msg:"ok"});
      }catch(e){
        resolve({ok:false,msg:"Print error: "+e.message});
      }
    });
  },

  /* ── Async test print ── */
  testPrint(){
    if(BT._apk()){
      return new Promise(resolve=>{
        let done=false;
        const timer=setTimeout(()=>{
          if(done)return;done=true;window.BT._testCB=null;
          resolve({ok:false,msg:"Test print timeout"});
        },5000);
        window.BT._testCB=function(r){
          if(done)return;done=true;clearTimeout(timer);window.BT._testCB=null;
          resolve({ok:(r||"").startsWith("ok"),msg:r||""});
        };
        try{
          if(typeof window.AndroidBT.asyncTestPrint==="function"){
            window.AndroidBT.asyncTestPrint();
          } else {
            setTimeout(()=>{
              try{const r=window.AndroidBT.testPrint();window.BT._testCB&&window.BT._testCB(r||"ok");}
              catch(e){window.BT._testCB&&window.BT._testCB("error:"+e);}
            },0);
          }
        }catch(e){clearTimeout(timer);done=true;resolve({ok:false,msg:""+e});}
      });
    }
    /* Web BT test print */
    return _wbtTestPrint();
  },
};
/* ══════════════════════════════════════

function rPaisaSummary(){
  const period=ST.paisaSummaryPeriod||"today";
  const customFrom=ST.paisaDateFrom||"";
  const customTo=ST.paisaDateTo||"";
  const hasCustomDate=!!(customFrom||customTo);
  const now=new Date();
  const todStr=todS();
  /* Kal ka date string */
  const kal=new Date(now);kal.setDate(kal.getDate()-1);
  const kalStr=kal.toDateString();
  const monthStr=`${now.getFullYear()}-${now.getMonth()}`;

  /* Filter bills by period */
  function inPeriod(b){
    if(b.returned)return false;
    if(hasCustomDate)return dateInRange(b.date,customFrom,customTo);
    const d=new Date(b.date);
    if(period==="today")return d.toDateString()===todStr;
    if(period==="kal")return d.toDateString()===kalStr;
    if(period==="month")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    return true; /* all */
  }
  /* Filter expenses by period */
  function inPeriodExp(e){
    if(hasCustomDate)return dateInRange(e.date,customFrom,customTo);
    const d=new Date(e.date);
    if(period==="today")return d.toDateString()===todStr;
    if(period==="kal")return d.toDateString()===kalStr;
    if(period==="month")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    return true;
  }

  const bills=ST.bills.filter(inPeriod);
  /* BUG FIX v57: discountedBill use karo — actual received amount dikhao */
  const totalSale=bills.reduce((s,b)=>s+(b.payment?.discountedBill||b.purchaseTotal),0);

  /* Cash & UPI from payment field */
  let cashTotal=0,upiTotal=0,udhariTotal=0;
  bills.forEach(b=>{
    const pay=b.payment||{};
    cashTotal+=(pay.cash||0);
    upiTotal+=(pay.upi||0);
    /* Udhari = amount not collected for this bill */
    udhariTotal+=(pay.udhari||0);
  });

  /* ── DOUBLE COUNTING FIX ──
     _confirmBill automatically adds customerPayments entries linked to each bill (billId != null).
     These are ALREADY counted in b.payment.cash / b.payment.upi above.
     So here we only count STANDALONE ledger payments (billId === null) — i.e. payments
     manually added via "Add Payment" in Ledger, NOT auto-generated bill-linked ones.
     Bill-return credits (note starts with "Bill Return") also excluded — not new money. */
  const cpayments=(ST.customerPayments||[]).filter(p=>{
    if(p.billId!=null)return false;
    if(p.note&&p.note.startsWith("Bill Return"))return false;
    if(hasCustomDate)return dateInRange(p.date,customFrom,customTo);
    const d=new Date(p.date);
    if(period==="today")return d.toDateString()===todStr;
    if(period==="kal")return d.toDateString()===kalStr;
    if(period==="month")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    return true;
  });
  const cpCash=cpayments.filter(p=>p.mode==="cash"||!p.mode).reduce((s,p)=>s+(p.amount||0),0);
  const cpUpi=cpayments.filter(p=>p.mode==="upi"||p.mode==="online").reduce((s,p)=>s+(p.amount||0),0);

  /* Total received = bill payments + standalone ledger collections */
  const totalOnline=upiTotal+cpUpi;
  const totalCash=cashTotal+cpCash;
  const totalReceived=totalCash+totalOnline;

  /* Pending udhari (total outstanding, not period-based) */
  const pendingUdhari=ST.udhari.filter(u=>!u.cleared).reduce((s,u)=>s+Math.max(0,(u.amount||0)-(u.paid||0)),0);

  /* Kharcha (expenses) */
  const expenses=(ST.expenses||[]).filter(inPeriodExp);
  const totalKharcha=expenses.reduce((s,e)=>s+(e.amount||0),0);

  /* Net in hand = received - kharcha */
  const netInHand=totalReceived-totalKharcha;
