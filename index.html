/* ══ SMART DASHBOARD CHART ENGINE ══
   Mode toggle: monthly (6m) ↔ weekly (8w) ↔ daily (14d)
   Interactive bars: tap to see drill-down
   State stored in ST.dashChartMode */
function _saleChartHTML(){
  const mode = ST.dashChartMode || "monthly";
  const active = ST.bills.filter(b=>!b.returned);
  const now = new Date();
  let data = [];
  let chartTitle = "";
  let chartSub = "";

  if(mode === "monthly"){
    chartTitle = "📅 Monthly Sale Trend";
    chartSub = "Last 6 mahine";
    for(let i=5;i>=0;i--){
      const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
      const bills = active.filter(b=>{
        const bd=new Date(b.date);
        return bd.getMonth()===d.getMonth() && bd.getFullYear()===d.getFullYear();
      });
      /* BUG FIX v57: discountedBill use karo (discount ke baad actual amount), purchaseTotal nahi */
      const total = bills.reduce((s,b)=>s+(b.payment?.discountedBill||b.purchaseTotal),0);
      const count = bills.length;
      const isCurrent = d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
      data.push({
        label: d.toLocaleString("en-IN",{month:"short"}),
        sublabel: d.getFullYear()!==now.getFullYear()?String(d.getFullYear()).slice(2):"",
        total, count, isCurrent,
        key: `${d.getFullYear()}-${d.getMonth()}`
      });
    }
  } else if(mode === "weekly"){
    chartTitle = "📆 Weekly Sale Trend";
    chartSub = "Last 8 hafte";
    for(let i=7;i>=0;i--){
      const wStart = new Date(now);
      wStart.setDate(now.getDate() - (now.getDay()||7) + 1 - i*7);
      const wEnd = new Date(wStart); wEnd.setDate(wStart.getDate()+6);
      const bills = active.filter(b=>{
        const bd=new Date(b.date); bd.setHours(0,0,0,0);
        return bd >= wStart && bd <= wEnd;
      });
      /* BUG FIX v57: discountedBill use karo (discount ke baad actual amount), purchaseTotal nahi */
      const total = bills.reduce((s,b)=>s+(b.payment?.discountedBill||b.purchaseTotal),0);
      const isCurrent = i===0;
      data.push({
        label: wStart.toLocaleString("en-IN",{day:"2-digit",month:"short"}),
        sublabel:"",
        total, count:bills.length, isCurrent,
        key: `w${i}`
      });
    }
  } else { // daily
    chartTitle = "🗓️ Daily Sale Trend";
    chartSub = "Last 14 din";
    for(let i=13;i>=0;i--){
      const d = new Date(now); d.setDate(now.getDate()-i); d.setHours(0,0,0,0);
      const dStr = d.toDateString();
      const bills = active.filter(b=>new Date(b.date).toDateString()===dStr);
      /* BUG FIX v57: discountedBill use karo (discount ke baad actual amount), purchaseTotal nahi */
      const total = bills.reduce((s,b)=>s+(b.payment?.discountedBill||b.purchaseTotal),0);
      const isCurrent = i===0;
      const isYest = i===1;
      data.push({
        label: i===0?"Aaj":i===1?"Kal":d.toLocaleString("en-IN",{day:"2-digit",month:"short"}),
        sublabel:"",
        total, count:bills.length, isCurrent, isYest,
        key: dStr
      });
    }
  }

  const max = Math.max(1,...data.map(x=>x.total));
  const totalAll = data.reduce((s,d)=>s+d.total,0);
  const avg = data.filter(d=>d.total>0).length ? Math.round(totalAll/data.filter(d=>d.total>0).length) : 0;
  const bestIdx = data.reduce((bi,d,i)=>d.total>data[bi].total?i:bi, 0);

  if(data.every(d=>d.total===0)) return `<div class="card cp" style="margin-bottom:13px;text-align:center;padding:20px">
    <div style="font-size:28px;margin-bottom:6px">📊</div>
    <div style="font-size:12px;color:var(--t3);font-weight:600">Abhi koi sale nahi — bill banao!</div>
  </div>`;

  return`<div class="card cp c-green" style="margin-bottom:13px;overflow:visible" id="smart_chart_card">
    <!-- Header with mode toggle pills -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div>
        <div style="font-size:11px;font-weight:800;color:var(--pri2)">${chartTitle}</div>
        <div style="font-size:9px;color:var(--t3);margin-top:1px">${chartSub}</div>
      </div>
      <div style="display:flex;gap:5px">
        ${["daily","weekly","monthly"].map(m=>`
          <button class="chart-mode-btn rip" data-cmode="${m}" style="padding:4px 9px;border-radius:99px;font-size:9px;font-weight:800;border:1.5px solid ${mode===m?"var(--pri)":"rgba(0,166,80,.2)"};background:${mode===m?"var(--pri)":"transparent"};color:${mode===m?"#fff":"var(--t3)"};cursor:pointer;transition:all .18s">
            ${m==="daily"?"14D":m==="weekly"?"8W":"6M"}
          </button>`).join("")}
      </div>
    </div>

    <!-- Summary strip -->
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <div style="flex:1;background:rgba(0,166,80,.07);border-radius:11px;padding:8px 10px;text-align:center">
        <div style="font-size:8.5px;color:var(--t3);font-weight:700;letter-spacing:.5px;text-transform:uppercase">Total</div>
        <div style="font-family:'Outfit',sans-serif;font-size:13px;font-weight:800;color:var(--pri);margin-top:2px">${rup(totalAll)}</div>
      </div>
      <div style="flex:1;background:rgba(245,158,11,.07);border-radius:11px;padding:8px 10px;text-align:center">
        <div style="font-size:8.5px;color:var(--t3);font-weight:700;letter-spacing:.5px;text-transform:uppercase">Average</div>
        <div style="font-family:'Outfit',sans-serif;font-size:13px;font-weight:800;color:var(--acc);margin-top:2px">${rup(avg)}</div>
      </div>
      <div style="flex:1;background:rgba(59,130,246,.07);border-radius:11px;padding:8px 10px;text-align:center">
        <div style="font-size:8.5px;color:var(--t3);font-weight:700;letter-spacing:.5px;text-transform:uppercase">Best</div>
        <div style="font-family:'Outfit',sans-serif;font-size:13px;font-weight:800;color:#2563EB;margin-top:2px">${data[bestIdx].label}</div>
      </div>
    </div>

    <!-- Interactive bar chart -->
    <div style="position:relative">
      <!-- Average line (dashed) -->
      <div style="position:absolute;left:0;right:0;bottom:calc(${Math.round((avg/max)*100)}% + 18px);border-top:1.5px dashed rgba(245,158,11,.5);z-index:2;pointer-events:none">
        <span style="position:absolute;right:0;top:-9px;font-size:7px;font-weight:700;color:var(--acc);background:#fff;padding:0 3px">avg</span>
      </div>
      <div style="display:flex;align-items:flex-end;gap:${mode==="daily"?"3":"5"}px;height:110px;padding-bottom:0">
        ${data.map((d,i)=>{
          const pct = Math.round((d.total/max)*100);
          const barH = Math.max(pct,0);
          const isAboveAvg = d.total >= avg && d.total>0;
          const barColor = d.isCurrent
            ? "linear-gradient(180deg,#34D399,#00A650)"
            : d.isYest
            ? "linear-gradient(180deg,#FCD34D,#F59E0B)"
            : isAboveAvg
            ? "linear-gradient(180deg,#6EE7A0,#22C55E)"
            : "linear-gradient(180deg,#A7F3D0,#4ADE80)";
          const opacity = d.total===0?0.25:1;
          return`<div class="smart-bar rip" data-bidx="${i}" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;cursor:pointer;min-width:0;opacity:${opacity}" title="${d.label}: ${rup(d.total)}">

        ${data.map((d,i)=>`<div style="flex:1;text-align:center;font-size:${mode==="daily"?"7":"8"}px;font-weight:${d.isCurrent||d.isYest?800:600};color:${d.isCurrent?"var(--pri)":d.isYest?"var(--acc)":"var(--t3)"};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.label}${d.sublabel?`<br><span style="font-size:6px">${d.sublabel}</span>`:""}</div>`).join("")}
      </div>
    </div>

    <!-- Tap detail popup placeholder -->
    <div id="chart_detail" style="display:none;margin-top:11px;background:rgba(0,166,80,.07);border:1.5px solid rgba(0,166,80,.2);border-radius:12px;padding:11px 13px;animation:fadeUp .2s both">

  </div>`;
}

/* ══ BOOT — Login First, Then Data ══ */
(function(){

  /* Step 1: Splash screen */
  const splash=document.createElement("div");
  splash.id="sql_splash";
  splash.style.cssText="position:fixed;inset:0;z-index:99999;background:linear-gradient(160deg,#003A1A 0%,#00A650 60%,#00C060 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;font-family:'Outfit',sans-serif";
  splash.innerHTML=
    '<div style="width:72px;height:72px;background:rgba(255,255,255,.15);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:38px;box-shadow:0 8px 32px rgba(0,0,0,.2)">🍦</div>'+
    '<div style="font-family:Outfit,sans-serif;font-size:22px;font-weight:800;color:#fff;letter-spacing:.5px">SONEY EXCELLENT</div>'+
    '<div id="sql_status" style="font-size:13px;color:rgba(255,255,255,.7);font-weight:600">Shuru ho raha hai...</div>'+
    '<div style="width:200px;height:4px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden"><div id="sql_prog" style="height:100%;background:#fff;border-radius:99px;width:0%;transition:width .4s ease"></div></div>';
  document.body.appendChild(splash);

  const _setProgress=(p,msg)=>{
    const el=document.getElementById("sql_prog");
    const st=document.getElementById("sql_status");
    if(el)el.style.width=p+"%";
    if(st&&msg)st.textContent=msg;
  };

  async function _boot(){
    /* Step 1: SQLite init */
    _setProgress(15,"Database load ho raha hai...");
    await _initSQLiteIfNeeded();
    _migrateFromLocalStorage();
    dbLoad();

    /* Step 2: Firebase ready hone ka wait */
    _setProgress(30,"Firebase connect ho raha hai...");
    const firebaseOk = await new Promise(resolve=>{
      const MAX=6000,TICK=100; let waited=0;
      (function check(){
        if(typeof firebase!=="undefined"&&firebase.database){ resolve(true); return; }
        if(waited>=MAX){ resolve(false); return; }
        waited+=TICK; setTimeout(check,TICK);
      })();
    });

    if(!firebaseOk){
      _showToast("⚠️ Internet nahi — Offline mode mein chal raha hai","#F59E0B");
      _setProgress(100,"");
      await new Promise(r=>setTimeout(r,200));
      splash.remove(); _bootComplete(); render(); return;
    }

    _fbInit();
    _setProgress(50,"Login check ho raha hai...");

    /* Step 3: Check if owner already logged in (mobile cached) */
    const cachedMobile = localStorage.getItem('soney_owner_mobile');

    if(cachedMobile && _fbDB){
      /* Try auto-login with cached mobile */
      try{
        const snap = await _fbDB.ref(_ownerPath(cachedMobile)).once('value');
        const ownerData = snap.val();
        if(ownerData && ownerData.ownerPin){
          /* Owner data load */
          if(ownerData.data){
            _sqlSet('soney_data', ownerData.data);
            await _persistSQLite().catch(()=>{});
            dbLoad();
          }
          _ownerMobileSession = cachedMobile;
          _fbRef = _fbDB.ref(_ownerPath(cachedMobile));
          _fbSyncEnabled = true;
          _setProgress(80,"Data sync ho raha hai...");
          /* Real-time listener start */
          _fbStartListen();
          _setProgress(100,"");
          await new Promise(r=>setTimeout(r,200));
          splash.remove(); _bootComplete();
          /* Show login screen — owner ya staff choose kare */
          _showMainLoginScreen();
          return;
        }
      }catch(e){ console.warn("Auto-login fail:",e); }
    }

    /* Step 4: Koi cache nahi — Login screen dikhao */
    _setProgress(100,"");
    await new Promise(r=>setTimeout(r,200));
    splash.remove(); _bootComplete();
    _showMainLoginScreen();
  }

  /* SQLite init — only if not already done */
  async function _initSQLiteIfNeeded(){
    if(_dbReady)return;
    try{
      await _initSQLite();
    }catch(e){
      /* Fallback in-memory */
      try{
        _idbConn=null;
        if(!_SQL)_SQL=await initSqlJs({locateFile:f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.11.0/${f}`});
        _sqlDB=new _SQL.Database();
        _sqlDB.run(`CREATE TABLE IF NOT EXISTS kv(k TEXT PRIMARY KEY, v TEXT NOT NULL)`);
        const old=localStorage.getItem("soney_v8");
        if(old)_sqlSet("soney_data",old);
        _dbReady=true;
        _showToast("⚠️ Storage error — Offline mode mein hai","#F59E0B");
      }catch(e2){
        ST.products=JSON.parse(JSON.stringify(DEF_PRODUCTS));
        ST.villages=JSON.parse(JSON.stringify(DEF_VILLAGES));
      }
    }
  }

  _boot().catch(err=>{
    console.error("Boot error:",err);
    splash.remove();
    _bootComplete();
    render();
  });

})();

/* All one-time init that runs after DB is ready */
function _bootComplete(){
/* Firebase auto-init */
/* v109: handled by _showMainLoginScreen */

/* ══ DATA LOSS PREVENTION — flush debounced save on page hide/close ══
   dbSave() has 400ms debounce. If user closes app within that window,
   in-memory SQLite is updated but IndexedDB persist never runs → data loss.
   Fix: on visibilitychange (hidden) and pagehide, flush immediately. */
function _flushSave(){
  if(window._saveRT){
    clearTimeout(window._saveRT);
    window._saveRT=null;
    try{
      const payload=JSON.stringify({
        products:ST.products,villages:ST.villages,bills:ST.bills,
        scheme:ST.scheme,udhari:ST.udhari,stock:ST.stock,
        expenses:ST.expenses,vehicles:ST.vehicles,upiId:ST.upiId,
        upiAccounts:ST.upiAccounts,businessName:ST.businessName,
        customerPayments:ST.customerPayments,walkingCustomers:ST.walkingCustomers,
        deletedBills:ST.deletedBills,printerSettings:ST.printerSettings,
        profile:ST.profile||{},resetPin:ST.resetPin||'',resetPinQ:ST.resetPinQ||'',resetPinA:ST.resetPinA||'',ownerMobile:ST.ownerMobile||'',ownerPin:ST.ownerPin||'',ownerSecQ:ST.ownerSecQ||'',ownerSecA:ST.ownerSecA||'',ownerBizName:ST.ownerBizName||'',isRegistered:ST.isRegistered||false,staffList:ST.staffList||[],activeVehicle:ST.activeVehicle||"v1",lastBackupAt:ST.lastBackupAt||0,
        decimalQty:ST.decimalQty||false,
        stockHistory:ST.stockHistory||[],
        stockInHistory:ST.stockInHistory||[]
      });
      _sqlSet("soney_data",payload);
      _persistSQLite().catch(()=>{});
    }catch(e){console.warn("Flush save error:",e);}
  }
}
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="hidden")_flushSave();});
window.addEventListener("pagehide",_flushSave);

/* ══ BACK BUTTON FIX ══
   History API se har tab change ek history entry banata hai.
   Back button press karne pe popstate fire hoga aur sirf tab change hoga,
   poora app band nahi hoga.
   NOTE: URL parameter null rakha hai — srcdoc/iframe mein URL change karna
   SecurityError deta hai, isliye sirf state store karte hain. */
function _safeHistoryPush(state){
  try{history.pushState(state,"",null);}catch(e){/* srcdoc frame — ignore */}
}
function _safeHistoryReplace(state){
  try{history.replaceState(state,"",null);}catch(e){/* srcdoc frame — ignore */}
}
function _pushTabHistory(tab){
  _safeHistoryPush({tab:tab});
}

// Pehli bar app load hone pe current tab ko replace karo (extra history entry na bane)
_safeHistoryReplace({tab:ST.tab});

// Overlay (popup) khulne pe bhi history entry banao taaki back se woh band ho
const _ovObserver=new MutationObserver(function(mutations){
  mutations.forEach(function(m){
    m.addedNodes.forEach(function(node){
      if(node.nodeType===1&&node.classList&&node.classList.contains("ovlayer")){
        // Overlay khula — ek history entry push karo
        _safeHistoryPush({tab:ST.tab,overlay:true});
      }
    });
  });
});
_ovObserver.observe(document.body,{childList:true});

window.addEventListener("popstate",function(e){
  // Agar koi overlay open hai toh pehle usse band karo
  const overlay=document.querySelector(".ovlayer");
  if(overlay){
    overlay.remove();
    // Ek aur history entry push karo taaki app band na ho
    _safeHistoryPush({tab:ST.tab});
    return;
  }
  // State se tab lao
  const tab=(e.state&&e.state.tab)||"billing";
  ST.tab=tab;
  render();
});

document.querySelectorAll(".nb").forEach(b=>b.addEventListener("click",()=>{
  const newTab=b.dataset.tab;
  if(!newTab)return;
  if(ST.tab!==newTab){
    _pushTabHistory(newTab);
  }
  ST.tab=newTab;
  render();
}));

/* ── Stock In History helpers (global so filter works) ── */
function _siHistFilter(list){
  const sf=ST._siHFilter||{period:"all",from:"",to:""};
  if(sf.from||sf.to) return list.filter(h=>dateInRange(h.date,sf.from,sf.to));
  const now=new Date();
  if(sf.period==="today") return list.filter(h=>new Date(h.date).toDateString()===now.toDateString());
  if(sf.period==="week")  return list.filter(h=>h.date>=(Date.now()-6*86400000));
  if(sf.period==="month") return list.filter(h=>{const d=new Date(h.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  return list;
}

    const veh=ST.vehicles[h.vehicleKey]||{name:h.vehicleName||"Gaadi",emoji:"🚛"};
    return`<div style="background:#fff;border:1.5px solid rgba(0,166,80,.12);border-radius:12px;margin-bottom:8px;overflow:hidden">
      <div style="background:rgba(0,166,80,.06);padding:8px 11px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(0,166,80,.08)">

          <div style="font-size:11px;font-weight:800;color:var(--t1)">📥 ${h.dateStr}</div>

function _csvDownload(filename, rows){
  // Excel (.xlsx) export using SheetJS
  try {
    const ws = XLSX.utils.aoa_to_sheet(rows);
    // Auto column width set karo
    const colWidths = rows[0].map((_,ci)=>({
      wch: Math.min(30, Math.max(10, ...rows.map(r=>String(r[ci]==null?"":r[ci]).length)))
    }));
    ws['!cols'] = colWidths;
    // Header row bold style
    const range = XLSX.utils.decode_range(ws['!ref']);
    for(let C = range.s.c; C <= range.e.c; C++){
      const cell = ws[XLSX.utils.encode_cell({r:0, c:C})];
      if(cell) cell.s = {font:{bold:true}, fill:{fgColor:{rgb:"00A650"}}, fontColor:{rgb:"FFFFFF"}};
    }
    const wb = XLSX.utils.book_new();
    const sheetName = filename.replace(/\.xlsx$/i,"").split("_")[0].substring(0,31);
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
    XLSX.writeFile(wb, filename);
  } catch(e){
    // Fallback: agar SheetJS na mile to CSV download karo
    const csv = rows.map(r => r.map(c => {
      const s = String(c == null ? "" : c);
      return s.includes(",") || s.includes('"') || s.includes('\n') ? `"${s.replace(/"/g,'""')}"` : s;
    }).join(",")).join("\n");
    const bom = "\uFEFF";
    const blob = new Blob([bom + csv], {type:"text/csv;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename.replace(/\.xlsx$/i,".csv");
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 3000);
  }
}

function _pdfBills(dateFrom, dateTo){
  let bills = ST.bills.filter(b => !b.returned);
  if(dateFrom || dateTo) bills = bills.filter(b => dateInRange(b.date, dateFrom, dateTo));
  const rows = [["Bill No","Date","Village","Shop","Items","Total ₹","Cash ₹","UPI ₹","Udhari ₹"]];
  bills.forEach(b => {
    const v = getVillage(b.villageId);
    const s = getShop(b.villageId, b.shopId);
    const pay=b.payment||{};
    const itemStr = (b.items||[]).map(i=>`${i.name} x${i.boxQty}`).join("; ");
    rows.push([b.billNo||"", new Date(b.date).toLocaleDateString("en-IN"),
      b.villageName||(v?v.name:"Walk-in"), b.shopName||(s?s.name:""),
      itemStr, pay.discountedBill||b.purchaseTotal||0, pay.cash||0, pay.upi||0, pay.udhari||0]);
  });
  _pdfDownload("Bills Sheet", rows);
  _showToast(`✅ ${bills.length} bills ki PDF khul rahi hai!`,"#00A650");
}

function _pdfItemwise(dateFrom, dateTo){
  let bills = ST.bills.filter(b => !b.returned);
  if(dateFrom||dateTo) bills = bills.filter(b => dateInRange(b.date, dateFrom, dateTo));
  const map = {};
  bills.forEach(b => {
    (b.items||[]).forEach(it => {
      if(!map[it.name]) map[it.name]={name:it.name,boxes:0,pieces:0,amount:0};
      map[it.name].boxes += it.boxQty||0;
      map[it.name].pieces += (it.boxQty||0)*(it.piecesPerBox||0);
      map[it.name].amount += it.amount||0;
    });
  });
  const rows = [["Item Name","Boxes Sold","Pieces Sold","Total Amount (₹)"]];
  Object.values(map).sort((a,b)=>b.amount-a.amount).forEach(r=>{
    rows.push([r.name, r.boxes, r.pieces, r.amount]);
  });
  _pdfDownload("Item Wise Sheet", rows);
  _showToast("✅ Item-wise PDF khul rahi hai!","#00A650");
}

function _pdfPartywise(dateFrom, dateTo){
  let bills = ST.bills.filter(b => !b.returned);
  if(dateFrom||dateTo) bills = bills.filter(b => dateInRange(b.date, dateFrom, dateTo));
  const map = {};
  bills.forEach(b => {
    const key = b.shopId?`${b.villageId}_${b.shopId}`:`walk_${b.shopName}`;
    const pay=b.payment||{};
    if(!map[key]) map[key]={village:b.villageName||"Walk-in",shop:b.shopName||"",bills:0,total:0,cash:0,upi:0,udhari:0};
    map[key].bills++;
    map[key].total+=(pay.discountedBill||b.purchaseTotal||0);
    map[key].cash+=(pay.cash||0);
    map[key].upi+=(pay.upi||0);
    map[key].udhari+=(pay.udhari||0);
  });
  const rows = [["Village","Shop","Bills","Sale ₹","Cash ₹","UPI ₹","Udhari ₹"]];
  Object.values(map).sort((a,b)=>b.total-a.total).forEach(r=>{
    rows.push([r.village, r.shop, r.bills, r.total, r.cash, r.upi, r.udhari]);
  });
  _pdfDownload("Party Wise Sheet", rows);
  _showToast("✅ Party-wise PDF khul rahi hai!","#00A650");
}

function _sheetBills(dateFrom, dateTo){
  let bills = ST.bills.filter(b => !b.returned);
  if(dateFrom || dateTo) bills = bills.filter(b => dateInRange(b.date, dateFrom, dateTo));
  const rows = [["Bill No","Date","Time","Village","Shop","Items","Total (₹)","Cash (₹)","UPI (₹)","Udhari (₹)","Payment Mode"]];
  bills.forEach(b => {
    const v = getVillage(b.villageId);
    const s = getShop(b.villageId, b.shopId);
    const pay=b.payment||{};
    const payMode=pay.cash>0&&pay.upi>0?"Cash+UPI":pay.upi>0?"UPI":pay.udhari>0?"Udhari":"Cash";
    const itemStr = (b.items||[]).map(i=>`${i.name} x${i.boxQty}`).join("; ");
    rows.push([b.billNo||"", new Date(b.date).toLocaleDateString("en-IN"),
      new Date(b.date).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"}),
      b.villageName||(v?v.name:"Walk-in"), b.shopName||(s?s.name:""),
      itemStr, pay.discountedBill||b.purchaseTotal||0, pay.cash||0, pay.upi||0, pay.udhari||0, payMode]);
  });
  _csvDownload(`Bills_${new Date().toISOString().slice(0,10)}.xlsx`, rows);
  _showToast(`✅ ${bills.length} bills ki sheet download hui!`,"#00A650");
}

function _sheetItemwise(dateFrom, dateTo){
  let bills = ST.bills.filter(b => !b.returned);
  if(dateFrom||dateTo) bills = bills.filter(b => dateInRange(b.date, dateFrom, dateTo));
  const map = {};
  bills.forEach(b => {
    (b.items||[]).forEach(it => {
      if(!map[it.name]) map[it.name]={name:it.name,boxes:0,pieces:0,amount:0};
      map[it.name].boxes += it.boxQty||0;
      map[it.name].pieces += (it.boxQty||0)*(it.piecesPerBox||0);
      map[it.name].amount += it.amount||0;

  const rows = [["Item Name","Boxes Sold","Pieces Sold","Total Amount (₹)"]];

}

function bSheets(){
  const getRange = ()=>({from:document.getElementById("sh-from")?.value||"",to:document.getElementById("sh-to")?.value||""});
  const setRange = (f,t)=>{
    const fi=document.getElementById("sh-from"), ti=document.getElementById("sh-to");
    if(fi)fi.value=f; if(ti)ti.value=t;
  };
  const todayYMD=toYMD(Date.now());
  const weekAgoYMD=toYMD(Date.now()-6*86400000);
  const monthAgoYMD=toYMD(Date.now()-29*86400000);

  document.getElementById("sh-today")?.addEventListener("click",()=>setRange(todayYMD,todayYMD));
  document.getElementById("sh-week")?.addEventListener("click",()=>setRange(weekAgoYMD,todayYMD));
  document.getElementById("sh-month")?.addEventListener("click",()=>setRange(monthAgoYMD,todayYMD));
  document.getElementById("sh-all")?.addEventListener("click",()=>setRange("",""));

  document.getElementById("sh-btn-bills")?.addEventListener("click",()=>{const r=getRange();_sheetBills(r.from,r.to);});
  document.getElementById("sh-btn-itemwise")?.addEventListener("click",()=>{const r=getRange();_sheetItemwise(r.from,r.to);});
  document.getElementById("sh-btn-partywise")?.addEventListener("click",()=>{const r=getRange();_sheetPartywise(r.from,r.to);});
  document.getElementById("sh-btn-products")?.addEventListener("click",()=>_sheetProducts());
  document.getElementById("sh-btn-parties")?.addEventListener("click",()=>_sheetParties());
  document.getElementById("sh-btn-udhari")?.addEventListener("click",()=>_sheetUdhari());
  document.getElementById("sh-btn-expenses")?.addEventListener("click",()=>{const r=getRange();_sheetExpenses(r.from,r.to);});
  document.getElementById("sh-btn-stock")?.addEventListener("click",()=>_sheetStock());

  // PDF buttons
  document.getElementById("sh-pdf-bills")?.addEventListener("click",()=>{const r=getRange();_pdfBills(r.from,r.to);});
  document.getElementById("sh-pdf-itemwise")?.addEventListener("click",()=>{const r=getRange();_pdfItemwise(r.from,r.to);});
  document.getElementById("sh-pdf-partywise")?.addEventListener("click",()=>{const r=getRange();_pdfPartywise(r.from,r.to);});
  document.getElementById("sh-pdf-products")?.addEventListener("click",()=>_pdfProducts());
  document.getElementById("sh-pdf-parties")?.addEventListener("click",()=>_pdfParties());
  document.getElementById("sh-pdf-udhari")?.addEventListener("click",()=>_pdfUdhari());
  document.getElementById("sh-pdf-expenses")?.addEventListener("click",()=>{const r=getRange();_pdfExpenses(r.from,r.to);});
  document.getElementById("sh-pdf-stock")?.addEventListener("click",()=>_pdfStock());
}

function rRecycleBin(){
  const deleted=(ST.deletedBills||[]).slice().sort((a,b2)=>(b2.deletedAt||0)-(a.deletedAt||0));
  const totalAmt=deleted.reduce((s,b2)=>s+(b2.purchaseTotal||0),0);
  const bulkMode=!!(ST.rbBulkMode);
  if(!ST.rbSelected)ST.rbSelected=[];
  const selSet=new Set(ST.rbSelected.map(String));
  const isSel=id=>selSet.has(String(id));
  const selCount=selSet.size;

  const renderCard=b=>{
    const delDate=b.deletedAt?fmtD(b.deletedAt):'—';
    const sel=bulkMode&&isSel(b.id);
    const borderCol=sel?'rgba(59,130,246,.55)':'rgba(239,68,68,.15)';
    const shadow=sel?'0 0 0 3px rgba(59,130,246,.18),0 2px 8px rgba(0,80,30,.07)':'0 2px 8px rgba(0,80,30,.07)';
    let chkHtml='';
    if(bulkMode){
      const chkBg=sel?'#2563EB':'#fff';
      const chkBorder=sel?'#2563EB':'rgba(0,0,0,.22)';
      const chkTick=sel?'<span style="color:#fff;font-size:12px;line-height:1;font-weight:900">✓</span>':'';
      chkHtml=`<div class="rb-chk" data-rb-chk="${esc(String(b.id))}" style="width:22px;height:22px;min-width:22px;border-radius:7px;border:2px solid ${chkBorder};background:${chkBg};display:flex;align-items:center;justify-content:center;cursor:pointer;margin-top:2px;transition:background .15s,border-color .15s">${chkTick}</div>`;
    }
    let actHtml='';
    if(!bulkMode){
      actHtml=`<div style="display:flex;gap:7px;margin-top:8px">
        <button class="btn rip" data-rb-restore="${esc(String(b.id))}" data-rb-returned="${b.returned?'1':'0'}" style="flex:1;background:linear-gradient(135deg,#00A650,#007A38);color:#fff;border:none;padding:10px;font-size:12px;font-weight:800;border-radius:11px">♻️ Restore</button>
        <button class="btn rip" data-rb-permdelete="${esc(String(b.id))}" style="background:rgba(239,68,68,.1);color:var(--err);border:1.5px solid rgba(239,68,68,.25);padding:10px 14px;font-size:12px;font-weight:800;border-radius:11px">🗑️ Delete</button>
      </div>`;
    }
    const itemTags=(b.items||[]).map(it=>`<span style="background:rgba(0,166,80,.07);border:1px solid rgba(0,166,80,.15);border-radius:7px;padding:2px 7px;font-size:10px;font-weight:600;color:var(--t2)">${esc(it.name)} ×${it.boxQty}</span>`).join('');
    const retTag=b.returned?`<span style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:7px;padding:2px 8px;font-size:10px;font-weight:700;color:var(--err)">↩ Wapas Hua</span>`:'';
    return`<div data-rb-card="${esc(String(b.id))}" style="background:#fff;border-radius:15px;border:1.5px solid ${borderCol};padding:14px;margin-bottom:9px;box-shadow:${shadow};transition:border-color .15s,box-shadow .15s;${bulkMode?'cursor:pointer':''}">
      <div style="display:flex;align-items:flex-start;gap:10px">
        ${chkHtml}
        <div style="flex:1;min-width:0">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              <div style="font-family:'Outfit',sans-serif;font-size:13px;font-weight:800;color:var(--t1)">${esc(b.billNo)}</div>
              <div style="font-size:12px;font-weight:700;color:var(--t2);margin-top:2px">🏪 ${esc(b.shopName)}</div>
              <div style="font-size:10px;color:var(--t3);margin-top:1px">📍 ${esc(b.villageName||'Walk-In')} · 📅 ${fmtD(b.date)}</div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-family:'Outfit',sans-serif;font-size:16px;font-weight:800;color:var(--pri2)">${rup(b.purchaseTotal)}</div>
              <div style="font-size:9px;color:var(--err);font-weight:700;margin-top:3px;background:rgba(239,68,68,.08);border-radius:99px;padding:1px 7px">🗑️ ${delDate}</div>
            </div>
          </div>
          <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:7px">${retTag}${itemTags}</div>
          ${actHtml}
        </div>
      </div>
    </div>`;
  };

  const bulkBar=bulkMode?`
    <div id="rb-bulk-bar" style="background:rgba(59,130,246,.07);border:1.5px solid rgba(59,130,246,.22);border-radius:13px;padding:10px 13px;margin-bottom:11px">
      <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
        <span id="rb-sel-count" style="font-size:12px;font-weight:800;color:#1d4ed8;flex:1;min-width:80px">${selCount} selected</span>
        <button id="rb-sel-all" style="background:rgba(59,130,246,.12);color:#2563EB;border:1.5px solid rgba(59,130,246,.25);border-radius:9px;padding:5px 11px;font-size:11px;font-weight:800;cursor:pointer;font-family:'Outfit',sans-serif">Sab</button>
        <button id="rb-sel-none" style="background:#f3f4f6;color:#374151;border:1.5px solid rgba(0,0,0,.1);border-radius:9px;padding:5px 11px;font-size:11px;font-weight:800;cursor:pointer;font-family:'Outfit',sans-serif">None</button>
      </div>
      <div style="display:flex;gap:7px;margin-top:9px">
        <button id="rb-bulk-restore" style="flex:1;background:${selCount>0?'linear-gradient(135deg,#00A650,#007A38)':'rgba(0,166,80,.15)'};color:#fff;border:none;border-radius:10px;padding:10px;font-size:12px;font-weight:800;cursor:${selCount>0?'pointer':'not-allowed'};opacity:${selCount>0?1:.5};font-family:'Outfit',sans-serif;transition:opacity .2s,background .2s">♻️ Restore (<span id="rb-rc">${selCount}</span>)</button>
        <button id="rb-bulk-delete" style="flex:1;background:${selCount>0?'linear-gradient(135deg,#EF4444,#DC2626)':'rgba(239,68,68,.15)'};color:#fff;border:none;border-radius:10px;padding:10px;font-size:12px;font-weight:800;cursor:${selCount>0?'pointer':'not-allowed'};opacity:${selCount>0?1:.5};font-family:'Outfit',sans-serif;transition:opacity .2s,background .2s">🗑️ Delete (<span id="rb-dc">${selCount}</span>)</button>
      </div>
    </div>`:'';

  const emptyState=`<div style="text-align:center;padding:60px 20px">
    <div style="font-size:52px;margin-bottom:14px;opacity:.35">🗑️</div>
    <div style="font-family:'Outfit',sans-serif;font-size:16px;font-weight:800;color:var(--t2);margin-bottom:6px">Recycling Bin Khaali Hai</div>
    <div style="font-size:12px;color:var(--t3);line-height:1.6">Delete kiye gaye bills yahan dikhenge.<br>Restore kar sakte ho ya hamesha ke liye hata sakte ho.</div>
  </div>`;

  const summaryStrip=`
    <div style="background:rgba(239,68,68,.06);border:1.5px solid rgba(239,68,68,.2);border-radius:16px;padding:14px;margin-bottom:14px;display:flex;align-items:center;gap:14px">
      <div style="font-size:32px">🗑️</div>
      <div style="flex:1">
        <div style="font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;color:var(--err)">${deleted.length} Bills</div>
        <div style="font-size:11px;color:var(--t3);margin-top:2px">Total value: <b style="color:var(--t1)">${rup(totalAmt)}</b></div>
      </div>
      <div style="font-size:10px;color:var(--t3);text-align:right;line-height:1.5">♻️ Restore karo<br>ya permanently<br>delete karo</div>
    </div>
    <div style="background:rgba(59,130,246,.06);border:1.5px solid rgba(59,130,246,.18);border-radius:12px;padding:10px 14px;margin-bottom:13px;font-size:11px;color:#2563EB;font-weight:600;display:flex;align-items:center;gap:8px">
      <span style="font-size:16px">ℹ️</span>
      <span>Restore karne se bill History mein wapas aayega, stock aur udhari bhi update hoga.</span>
    </div>`;

  return`<div class="page">
    <div class="pk">DATA</div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="ph" style="margin-bottom:0">🗑️ Recycling Bin</div>
      <div style="display:flex;gap:7px;align-items:center">
        ${deleted.length>0?`<button id="rb-bulk-toggle" style="background:${bulkMode?'#2563EB':'rgba(59,130,246,.1)'};color:${bulkMode?'#fff':'#2563EB'};border:1.5px solid ${bulkMode?'#2563EB':'rgba(59,130,246,.28)'};border-radius:10px;padding:6px 12px;font-size:11px;font-weight:800;cursor:pointer;font-family:'Outfit',sans-serif">${bulkMode?'✕ Cancel':'☑ Select'}</button>`:''}
        ${deleted.length>0&&!bulkMode?`<button class="btn bsm rip" id="rb-empty-all" style="background:linear-gradient(135deg,#EF4444,#DC2626);color:#fff;border:none">🗑️ Sab Hatao</button>`:''}
      </div>
    </div>
    ${deleted.length===0?emptyState:`${summaryStrip}${bulkBar}<div id="rb-list" class="stag">${deleted.map(renderCard).join('')}</div>`}
  </div>`;
}

function bRecycleBin(){
  /* Update sidebar badge count */
  const cnt=(ST.deletedBills||[]).length;
  const badge=document.getElementById('sb-recyclebin-count');
  if(badge){badge.textContent=cnt;badge.style.display=cnt>0?'inline-block':'none';}

  /* ── DOM update helper: update card visuals + counter WITHOUT render() ──
     This is the key fix — no scroll jump on checkbox tap */
  function _rbUpdateDOM(){
    if(!ST.rbSelected)ST.rbSelected=[];
    const selSet=new Set(ST.rbSelected.map(String));
    const n=selSet.size;
    const total=(ST.deletedBills||[]).length;
    /* Update counter label */
    const countEl=document.getElementById('rb-sel-count');
    if(countEl)countEl.textContent=n+' selected';
    /* Update span counters inside buttons */
    const rcEl=document.getElementById('rb-rc');
    const dcEl=document.getElementById('rb-dc');
    if(rcEl)rcEl.textContent=n;
    if(dcEl)dcEl.textContent=n;
    /* Update restore/delete button states */
    const restBtn=document.getElementById('rb-bulk-restore');
    const delBtn=document.getElementById('rb-bulk-delete');
    if(restBtn){
      restBtn.style.opacity=n>0?'1':'0.5';
      restBtn.style.cursor=n>0?'pointer':'not-allowed';
      restBtn.style.background=n>0?'linear-gradient(135deg,#00A650,#007A38)':'rgba(0,166,80,.15)';
    }
    if(delBtn){
      delBtn.style.opacity=n>0?'1':'0.5';
      delBtn.style.cursor=n>0?'pointer':'not-allowed';
      delBtn.style.background=n>0?'linear-gradient(135deg,#EF4444,#DC2626)':'rgba(239,68,68,.15)';
    }
    /* Update each card border + checkbox visual */
    document.querySelectorAll('[data-rb-card]').forEach(card=>{
      const id=String(card.dataset.rbCard);
      const sel=selSet.has(id);
      card.style.borderColor=sel?'rgba(59,130,246,.55)':'rgba(239,68,68,.15)';
      card.style.boxShadow=sel?'0 0 0 3px rgba(59,130,246,.18),0 2px 8px rgba(0,80,30,.07)':'0 2px 8px rgba(0,80,30,.07)';
      const chk=card.querySelector('.rb-chk');
      if(chk){
        chk.style.background=sel?'#2563EB':'#fff';
        chk.style.borderColor=sel?'#2563EB':'rgba(0,0,0,.22)';
        chk.innerHTML=sel?'<span style="color:#fff;font-size:12px;line-height:1;font-weight:900">✓</span>':'';
      }
    });
  }

  /* ── Bulk toggle — full render OK here (mode change, not scroll-sensitive) ── */
  document.getElementById('rb-bulk-toggle')?.addEventListener('click',()=>{
    ST.rbBulkMode=!ST.rbBulkMode;
    ST.rbSelected=[];
    render();
  });

  /* ── Select All — DOM update only, no render ── */
  document.getElementById('rb-sel-all')?.addEventListener('click',()=>{
    ST.rbSelected=(ST.deletedBills||[]).map(b=>String(b.id));
    _rbUpdateDOM();
  });

  /* ── Select None — DOM update only, no render ── */
  document.getElementById('rb-sel-none')?.addEventListener('click',()=>{
    ST.rbSelected=[];
    _rbUpdateDOM();
  });

  /* ── Card tap in bulk mode → toggle + DOM update (NO render → no scroll jump) ── */
  document.querySelectorAll('[data-rb-card]').forEach(card=>{
    if(!ST.rbBulkMode)return;
    card.addEventListener('click',e=>{
      if(e.target.closest('[data-rb-restore],[data-rb-permdelete]'))return;
      const id=String(card.dataset.rbCard);
      if(!ST.rbSelected)ST.rbSelected=[];
      const idx=ST.rbSelected.indexOf(id);
      if(idx>=0) ST.rbSelected.splice(idx,1);
      else ST.rbSelected.push(id);
      _rbUpdateDOM();
    });
  });

  /* ── Bulk Restore ── */
  document.getElementById('rb-bulk-restore')?.addEventListener('click',()=>{
    const ids=(ST.rbSelected||[]).map(String);
    if(ids.length===0)return;
    _styledConfirm({
      icon:'♻️',title:`${ids.length} Bills Restore Karo?`,
      msg:`<b>${ids.length} bills</b> History mein wapas aayenge.<br>Stock aur Udhari bhi update honge.`,
      okText:'Haan, Restore Karo',okClass:'',
      onYes:()=>{
        const toRestore=(ST.deletedBills||[]).filter(b=>ids.includes(String(b.id)));
        toRestore.forEach(bill=>_doRestoreBill(bill));
        ST.rbSelected=[];ST.rbBulkMode=false;
        dbSave();render();
        _showToast(`✅ ${toRestore.length} bills restore ho gaye!`,'#00A650');
      }
    });
  });

  /* ── Bulk Permanent Delete ── */
  document.getElementById('rb-bulk-delete')?.addEventListener('click',()=>{
    const ids=(ST.rbSelected||[]).map(String);
    if(ids.length===0)return;
    _styledConfirm({
      icon:'⚠️',title:`${ids.length} Bills Permanently Delete Karo?`,
      msg:`<b>${ids.length} bills</b> hamesha ke liye delete ho jayenge.<br><span style="color:var(--err);font-weight:700;font-size:11px">⚠️ Yeh undo nahi ho sakta!</span>`,
      okText:'Haan, Permanently Delete',okClass:'danger',
      onYes:()=>{
        const before=(ST.deletedBills||[]).length;
        ST.deletedBills=(ST.deletedBills||[]).filter(b=>!ids.includes(String(b.id)));
        const gone=before-ST.deletedBills.length;
        ST.rbSelected=[];ST.rbBulkMode=false;
        dbSave();render();
        _showToast(`🗑️ ${gone} bills permanently deleted`,'#EF4444');
      }
    });
  });

  /* ── Restore single bill ── */
  document.querySelectorAll('[data-rb-restore]').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const id=btn.dataset.rbRestore;
      const isReturned=btn.dataset.rbReturned==='1';
      const bill=(ST.deletedBills||[]).find(b=>String(b.id)===String(id));
      if(!bill)return;
      const restoreMsg=isReturned
        ?`<b>${esc(bill.billNo)}</b> · ${esc(bill.shopName)}<br>${rup(bill.purchaseTotal)} ka bill History mein wapas aayega.<br><span style="color:var(--t3);font-size:11px">⚠️ Yeh bill pehle se return ho chuka tha — stock change nahi hoga.</span>`
        :`<b>${esc(bill.billNo)}</b> · ${esc(bill.shopName)}<br>${rup(bill.purchaseTotal)} ka bill History mein wapas aayega.<br>Stock aur Udhari bhi update honge.`;
      _styledConfirm({
        icon:'♻️',title:'Bill Restore Karo?',
        msg:restoreMsg,
        okText:'Haan, Restore',okClass:'',
        onYes:()=>{
          const fresh=(ST.deletedBills||[]).find(b=>String(b.id)===String(id));
          if(!fresh)return;
          _doRestoreBill(fresh);
          dbSave();render();
          _showToast(`✅ ${fresh.billNo} restore ho gaya!`,'#00A650');
        }
      });
    });
  });

  /* ── Permanently delete single bill ── */
  document.querySelectorAll('[data-rb-permdelete]').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const id=btn.dataset.rbPermdelete;
      const bill=(ST.deletedBills||[]).find(b=>String(b.id)===String(id));
      if(!bill)return;
      _styledConfirm({
        icon:'⚠️',title:'Hamesha Delete Karo?',
        msg:`<b>${esc(bill.billNo)}</b> permanently delete hoga.<br><span style="color:var(--err);font-weight:700;font-size:11px">⚠️ Yeh undo nahi ho sakta!</span>`,
        okText:'Haan, Permanently Delete',okClass:'danger',
        onYes:()=>{
          const fresh=(ST.deletedBills||[]).find(b=>String(b.id)===String(id));
          if(!fresh)return;
          ST.deletedBills=ST.deletedBills.filter(b=>String(b.id)!==String(id));
          dbSave();render();
          _showToast(`🗑️ ${fresh.billNo} permanently deleted`,'#EF4444');
        }
      });
    });
  });

  /* ── Empty all ── */
  document.getElementById('rb-empty-all')?.addEventListener('click',()=>{
    const c=(ST.deletedBills||[]).length;
    if(c===0)return;
    _styledConfirm({
      icon:'⚠️',title:'Recycling Bin Khaali Karo?',
      msg:`Sab <b>${c} bills</b> permanently delete ho jayenge.<br><span style="color:var(--err);font-weight:700;font-size:11px">⚠️ Yeh undo nahi ho sakta!</span>`,
      okText:'Haan, Sab Delete Karo',okClass:'danger',
      onYes:()=>{
        if(!(ST.deletedBills||[]).length)return;
        ST.deletedBills=[];
        ST.rbSelected=[];ST.rbBulkMode=false;
        dbSave();render();
        _showToast('🗑️ Recycling Bin khaali ho gaya','#EF4444');
      }
    });
  });
}

/* ══ SHARED RESTORE FUNCTION — used by both Recycling Bin and Ledger ══
   Reverses _reverseBillEffects: re-deducts stock, re-adds udhari, puts bill back in ST.bills.
   Safe to call multiple times — has duplicate guards everywhere. */
function _doRestoreBill(bill){
  if(!bill)return;
  const {deletedAt,...restored}=bill; // strip deletedAt

  /* Add to bills first — guard against duplicate */
  if(!ST.bills.find(x=>String(x.id)===String(restored.id))){
    ST.bills.push(restored);
  }
  /* Only remove from bin AFTER successful push */
  ST.deletedBills=(ST.deletedBills||[]).filter(b=>String(b.id)!==String(restored.id));

  /* Skip stock/udhari for returned bills — stock was already restored when returned.
     But we must restore the returned counter and re-add the credit entry in customerPayments. */
  if(restored.returned){
    const _vkr=restored.vehicleKey||ST.activeVehicle||"v1";
    const _ritems=restored.items||[];
    /* Restore ST.stock.returned counter */
    if(ST.stock&&ST.stock.returned){
      _ritems.forEach(it=>{
        ST.stock.returned[it.id]=(ST.stock.returned[it.id]||0)+it.boxQty;
      });
    }
    if(restored.schemeApplied&&restored.freeProduct&&ST.stock?.returned){
      ST.stock.returned[restored.freeProduct.id]=(ST.stock.returned[restored.freeProduct.id]||0)+restored.freeProduct.boxQty;
    }
    /* Re-add the credit entry that _doReturnBill created (was removed by _reverseBillEffects on delete) */
    if(restored.shopId&&restored.villageId){
      if(!ST.customerPayments)ST.customerPayments=[];
      const alreadyHasCredit=ST.customerPayments.find(p=>
        p.billId===null&&p.note&&p.note==="Bill Return — "+restored.billNo&&p.villageId===restored.villageId&&p.shopId===restored.shopId
      );
      if(!alreadyHasCredit){
        ST.customerPayments.push({
          id:Date.now()+5,
          villageId:restored.villageId,shopId:restored.shopId,
          villageName:restored.villageName,shopName:restored.shopName,
          amount:(restored.payment?.discountedBill||restored.purchaseTotal),
          mode:"cash",date:restored.returnDate||restored.date,
          note:"Bill Return — "+restored.billNo,
          billId:null
        });
      }
    }
    return;
  }

  /* Re-deduct stock (sold again) */
  const _items=restored.items||[];
  ST.products=ST.products.map(p=>{
    const it=_items.find(i=>i.id===p.id);
    return it?{...p,stock:Math.max(0,(p.stock||0)-it.boxQty)}:p;
  });
  /* Global sold counter */
  if(ST.stock&&ST.stock.sold){
    _items.forEach(it=>{
      ST.stock.sold[it.id]=(ST.stock.sold[it.id]||0)+it.boxQty;
    });
  }
  /* Vehicle sold counter */
  const vk=restored.vehicleKey||ST.activeVehicle||"v1";
  if(ST.vehicles[vk]?.stock?.sold){
    _items.forEach(it=>{
      ST.vehicles[vk].stock.sold[it.id]=(ST.vehicles[vk].stock.sold[it.id]||0)+it.boxQty;
    });
  }
  /* Free product stock (scheme) */
  if(restored.schemeApplied&&restored.freeProduct){
    const fp=restored.freeProduct;
    ST.products=ST.products.map(p=>p.id===fp.id?{...p,stock:Math.max(0,(p.stock||0)-fp.boxQty)}:p);
    if(ST.stock?.sold)ST.stock.sold[fp.id]=(ST.stock.sold[fp.id]||0)+fp.boxQty;
    if(ST.vehicles[vk]?.stock?.sold)
      ST.vehicles[vk].stock.sold[fp.id]=(ST.vehicles[vk].stock.sold[fp.id]||0)+fp.boxQty;
  }
  /* Re-add udhari for THIS bill's new udhari (if any) */
  const ud=restored.payment?.udhari||0;
  const totalPaid=(restored.payment?.cash||0)+(restored.payment?.upi||0);
  const prevUd=restored.payment?.prevUdhari||0;

  /* Snapshot pre-existing udhari entry BEFORE we push a new one — for prevUdhari.paid restore */
  const _preExistingUdEntry=restored.shopId
    ? (ST.udhari.find(u=>u.shopId===restored.shopId&&u.villageId===restored.villageId&&!u.cleared) ||
       ST.udhari.find(u=>u.shopId===restored.shopId&&u.villageId===restored.villageId))
    : (ST.udhari.find(u=>u.shopName===restored.shopName&&!u.cleared) ||
       ST.udhari.find(u=>u.shopName===restored.shopName));

  if(ud>0){
    if(!ST.udhari)ST.udhari=[];
    const ex=_preExistingUdEntry;
    if(ex){
      ex.amount=(ex.amount||0)+ud;
      if(!ex.history)ex.history=[];
      ex.history.push({type:"bill",amount:ud,date:restored.date,billNo:restored.billNo,note:"Restored"});
      if(ex.cleared)ex.cleared=false;
    } else {
      ST.udhari.push({
        id:Date.now(),
        shopId:restored.shopId||null,shopName:restored.shopName,
        shopOwner:restored.shopOwner||"",shopMobile:restored.shopMobile||"",
        villageId:restored.villageId||null,villageName:restored.villageName||"Walk-In",
        amount:ud,paid:0,date:restored.date,cleared:false,
        history:[{type:"bill",amount:ud,date:restored.date,billNo:restored.billNo,note:"Restored"}]
      });
    }
  }
  /* Restore customerPayments that were linked to this bill (removed by _reverseBillEffects on delete).
     BUG FIX v91-WK: Walk-in bills mein shopId/villageId null hota hai — guard hata diya.
     Ab walk-in bills restore pe bhi payments wapas record hoti hain. */
  if(totalPaid>0){
    if(!ST.customerPayments)ST.customerPayments=[];
    const nowMs=Date.now();
    const _wkFlag=!!restored.walkIn;
    /* Prev udhari payment */
    const payForPrevUd=prevUd>0?Math.min(totalPaid,prevUd):0;
    if(payForPrevUd>0){
      const alreadyHas=ST.customerPayments.find(p=>String(p.billId)===String(restored.id)&&p.note&&p.note.includes("Purani udhari"));
      if(!alreadyHas){
        ST.customerPayments.push({id:nowMs+2,villageId:restored.villageId||null,shopId:restored.shopId||null,villageName:restored.villageName||"Walk-In",shopName:restored.shopName,amount:payForPrevUd,mode:(restored.payment?.cash||0)>=payForPrevUd?"cash":"online",date:restored.date,note:"Purani udhari payment — Bill ke saath",billId:restored.id,_walkIn:_wkFlag});
      }
      /* Restore udhari.paid on the PRE-EXISTING entry (snapshotted before new push) */
      if(_preExistingUdEntry){
        _preExistingUdEntry.paid=Math.min(_preExistingUdEntry.amount,(_preExistingUdEntry.paid||0)+payForPrevUd);
        if(_preExistingUdEntry.paid>=_preExistingUdEntry.amount){_preExistingUdEntry.cleared=true;_preExistingUdEntry.paid=_preExistingUdEntry.amount;}
      }
    }
    /* Direct bill payment */
    const curBillAmt=restored.payment?.discountedBill||restored.purchaseTotal;
    const directPay=Math.min(curBillAmt,Math.max(0,totalPaid-prevUd));
    if(directPay>0){
      const alreadyHas=ST.customerPayments.find(p=>String(p.billId)===String(restored.id)&&p.note&&p.note.includes("Payment saath"));
      if(!alreadyHas){
        ST.customerPayments.push({id:nowMs+3,villageId:restored.villageId||null,shopId:restored.shopId||null,villageName:restored.villageName||"Walk-In",shopName:restored.shopName,amount:directPay,mode:(restored.payment?.cash||0)>=directPay?"cash":"online",date:restored.date,note:"Payment saath mein mili — Bill "+restored.billNo,billId:restored.id,_walkIn:_wkFlag});
      }
    }
    /* Excess/advance payment */
    const grandTotalAll=(prevUd||0)+(restored.payment?.discountedBill||restored.purchaseTotal);
    const excessAmt=totalPaid>grandTotalAll?totalPaid-grandTotalAll:0;
    if(excessAmt>0){
      const alreadyHas=ST.customerPayments.find(p=>String(p.billId)===String(restored.id)&&p.note&&p.note.includes("advance"));
      if(!alreadyHas){
        ST.customerPayments.push({id:nowMs+4,villageId:restored.villageId||null,shopId:restored.shopId||null,villageName:restored.villageName||"Walk-In",shopName:restored.shopName,amount:excessAmt,mode:(restored.payment?.cash||0)>0?"cash":"online",date:restored.date,note:"Zyada payment (advance) — Bill "+restored.billNo,billId:restored.id,_walkIn:_wkFlag});
      }
    }
  }
  /* Fix walkingCustomers billCount — restore increments it back */
  if(restored.walkIn&&restored.shopName){
    if(!ST.walkingCustomers)ST.walkingCustomers=[];
    const wc=ST.walkingCustomers.find(c=>c.shopName.toLowerCase().trim()===restored.shopName.toLowerCase().trim());
    if(wc){
      wc.billCount=Math.max(0,(wc.billCount||0)+1);
      if(restored.date>wc.lastDate)wc.lastDate=restored.date;
    }
  }
}

/* ══ PRINTER ERROR HANDLING ══ */

// Java se call hoga jab printer disconnect ho jaaye
window.onPrinterDisconnected = function(){
  if(ST.tab==="settings") render();
  const toast=document.createElement("div");
  toast.style.cssText="position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#EF4444;color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:700;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3);max-width:300px;text-align:center";
  toast.textContent="⚠️ Printer disconnect ho gaya!";
  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(),3000);
};

/* ══ AUTO RECONNECT — ASYNC, ONCE ONLY ══════════════════════════
   ❌ NO infinite loops   ❌ NO blocking   ✅ 5s timeout   ✅ once */
window._btAutoConnectDone=false; // ensure only once per session

window.autoReconnectPrinter = function(){
  if(window._btAutoConnectDone){return;}
  window._btAutoConnectDone=true;
  if(!BT.ok())return;
  /* Web Bluetooth: auto-reconnect not possible — requires user gesture */
  if(!BT._apk()){if(ST.tab==="settings")render();return;}
  const mac=(typeof window.AndroidBT.getLastMac==="function")
    ?window.AndroidBT.getLastMac():null;
  if(!mac||mac.length<5){
    if(ST.tab==="settings")render();
    return;
  }

  // Show connecting toast (lightweight, no blocking overlay)
  const toast=document.createElement("div");
  toast.style.cssText="position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1e40af;color:#fff;padding:11px 18px;border-radius:12px;font-size:13px;font-weight:700;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3)";
  toast.textContent="🖨️ Printer se connect ho raha hai...";
  document.body.appendChild(toast);

  // ✅ Fully async — max 5 seconds, then gives up
  BT.connect(mac).then(res=>{
    toast.remove();
    if(res.ok){
      const ok=document.createElement("div");
      ok.style.cssText="position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#00A650;color:#fff;padding:11px 18px;border-radius:12px;font-size:13px;font-weight:700;z-index:9999;box-shadow:0 4px 20px rgba(0,166,80,.3)";
      ok.textContent="✅ Printer ready!";
      document.body.appendChild(ok);
      setTimeout(()=>ok.remove(),2500);
      if(ST.tab==="settings")render();
    } else {
      // Failed — show "Connect Printer" button, DO NOT retry
      if(ST.tab==="settings")render();
      // Small hint toast
      const fail=document.createElement("div");
      fail.style.cssText="position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#92400e;color:#fff;padding:11px 18px;border-radius:12px;font-size:12px;font-weight:700;z-index:9999;text-align:center;max-width:280px";
      fail.textContent="🖨️ Auto-connect failed — Settings mein manually connect karo";
      document.body.appendChild(fail);
      setTimeout(()=>fail.remove(),4000);
    }
  });
};

window._btWasConnected=false;
/* ── Periodic status poll — SAFE: only reads cached Java value ──
   10 second interval, no socket operations, just flag check      */
setInterval(()=>{
  if(!BT.ok())return;
  const s=BT.status(); // safe — returns cached string, no IO
  if(s==="disconnected"&&window._btWasConnected){
    window._btWasConnected=false;
    window.onPrinterDisconnected();
  }
  if(s.startsWith("connected:"))window._btWasConnected=true;
},10000);

// Permission refresh callback
window.refreshBTPrinters=function(){if(ST.tab==="settings")render();};
</script>
