    {k:"today",label:"Aaj"},
    {k:"kal",label:"Kal"},
    {k:"month",label:"Mahina"},
    {k:"all",label:"Sab"},
  ];

  const periodLabel=hasCustomDate?`📅 ${formatDateRangeLabel(customFrom,customTo)}`:(PERIODS.find(p=>p.k===period)?.label||"Aaj");

  /* Expense category breakdown */
  const expCatMap={};
  expenses.forEach(e=>{
    const cat=e.category||"Other";
    expCatMap[cat]=(expCatMap[cat]||0)+(e.amount||0);
  });
  const expCats=Object.entries(expCatMap).sort((a,b)=>b[1]-a[1]);

  /* Bill-wise breakdown (show for today & kal) */
  const showBillList=(period==="today"||period==="kal")&&bills.length>0;

    <div style="display:flex;gap:7px;margin-bottom:10px">

function bPaisaSummary(){
  /* Period switcher */
  document.querySelectorAll("[data-psperiod]").forEach(b=>{
    b.addEventListener("click",()=>{ST.paisaSummaryPeriod=b.dataset.psperiod;ST.paisaDateFrom="";ST.paisaDateTo="";render();});
  });

  /* Custom date filter */
  bindDateFilter("paisa");

  /* WhatsApp share */
  document.getElementById("ps_wa")?.addEventListener("click",()=>{
    const period=ST.paisaSummaryPeriod||"today";
    const now=new Date();
    const todStr=todS();
    const kal=new Date(now);kal.setDate(kal.getDate()-1);
    const kalStr=kal.toDateString();
    function inPeriod(b){
      if(b.returned)return false;
      const d=new Date(b.date);
      if(period==="today")return d.toDateString()===todStr;
      if(period==="kal")return d.toDateString()===kalStr;
      if(period==="month")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
      return true;
    }
    function inPeriodExp(e){
      const d=new Date(e.date);
      if(period==="today")return d.toDateString()===todStr;
      if(period==="kal")return d.toDateString()===kalStr;
      if(period==="month")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
      return true;
    }
    const bills=ST.bills.filter(inPeriod);
    let cashTotal=0,upiTotal=0,udhariTotal=0;
    bills.forEach(b=>{const pay=b.payment||{};cashTotal+=(pay.cash||0);upiTotal+=(pay.upi||0);udhariTotal+=(pay.udhari||0);});
    const cpayments=(ST.customerPayments||[]).filter(p=>{
      /* DOUBLE COUNTING FIX: only standalone manual payments, skip bill-linked & return credits */
      if(p.billId!=null)return false;
      if(p.note&&p.note.startsWith("Bill Return"))return false;
      const d=new Date(p.date);
      if(period==="today")return d.toDateString()===todStr;
      if(period==="kal")return d.toDateString()===kalStr;
      if(period==="month")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
      return true;
    });
    const cpCash=cpayments.filter(p=>p.mode==="cash"||!p.mode).reduce((s,p)=>s+(p.amount||0),0);
    const cpUpi=cpayments.filter(p=>p.mode==="upi"||p.mode==="online").reduce((s,p)=>s+(p.amount||0),0);
    const totalCash=cashTotal+cpCash,totalOnline=upiTotal+cpUpi;
    const pendingUdhari=ST.udhari.filter(u=>!u.cleared).reduce((s,u)=>s+Math.max(0,(u.amount||0)-(u.paid||0)),0);
    const totalKharcha=(ST.expenses||[]).filter(inPeriodExp).reduce((s,e)=>s+(e.amount||0),0);
    const netInHand=(totalCash+totalOnline)-totalKharcha;
    const kalDate=kal.toLocaleDateString("en-IN");
    const pLabel=period==="today"?"Aaj":period==="kal"?`Kal (${kalDate})`:period==="month"?"Is Mahine":"Sab";
    const txt=`💳 *SONEY EXCELLENT — Paisa Summary*\n📅 ${new Date().toLocaleDateString("en-IN")} (${pLabel})\n\n💵 Cash Aaya: *${rup(totalCash)}*\n📱 Online Aaya: *${rup(totalOnline)}*\n📋 Baaki Udhari: *${rup(pendingUdhari)}*\n💸 Kharcha Hua: *${rup(totalKharcha)}*\n\n🧾 Haath Mein: *${rup(netInHand)}*\n\n📦 Total Bills: ${bills.length}`;
    window.open("https://wa.me/?text="+encodeURIComponent(txt),"_blank");
  });
}

/* ══════════════ PARTY WISE SALES ══════════════ */
function rPartywise(){
  const period=ST.partywisePeriod||"today";
  const pFrom=ST.partywiseDateFrom||"";
  const pTo=ST.partywiseDateTo||"";
  const hasCustom=!!(pFrom||pTo);

  /* Filter bills by period */
  const now=new Date();
  const todStr=now.toDateString();
  const activeBills=(ST.bills||[]).filter(b=>!b.returned);

  function inPeriod(b){
    const bd=new Date(b.date);
    if(hasCustom){
      /* FIX: use local date (YYYY-MM-DD) not UTC ISO string for correct IST comparison */
      const y=bd.getFullYear(),m=String(bd.getMonth()+1).padStart(2,"0"),d=String(bd.getDate()).padStart(2,"0");
      const bYmd=`${y}-${m}-${d}`;
      if(pFrom&&bYmd<pFrom)return false;
      if(pTo&&bYmd>pTo)return false;
      return true;
    }
    if(period==="today")return bd.toDateString()===todStr;
    if(period==="week"){const d7=new Date(now);d7.setDate(d7.getDate()-6);d7.setHours(0,0,0,0);return bd>=d7;}
    if(period==="month"){return bd.getMonth()===now.getMonth()&&bd.getFullYear()===now.getFullYear();}
    return true; /* all */
  }

  const filtered=activeBills.filter(inPeriod);

  /* Group by shop (shopId+villageId key; walk-in by shopName) */
  const partyMap=new Map();
  filtered.forEach(b=>{
    const key=b.shopId?(b.villageId+"_"+b.shopId):("walkin_"+(b.shopName||"Walk-In"));
    if(!partyMap.has(key)){
      partyMap.set(key,{
        shopName:b.shopName||"Walk-In",
        villageName:b.villageName||"Walk-In",
        shopOwner:b.shopOwner||"",
        isWalkin:!b.shopId,
        bills:[],
        total:0,
        boxes:0,
      });
    }
    const p=partyMap.get(key);
    p.bills.push(b);
    p.total+=(b.payment?.discountedBill||b.purchaseTotal)||0;
    p.boxes+=b.items?b.items.reduce((s,it)=>s+(it.boxQty||0),0):0;
  });

  /* Sort by total desc */
  const parties=[...partyMap.values()].sort((a,b)=>b.total-a.total);

  const grandTotal=parties.reduce((s,p)=>s+p.total,0);
  const grandBills=parties.reduce((s,p)=>s+p.bills.length,0);
  const grandBoxes=parties.reduce((s,p)=>s+p.boxes,0);

  const periodLabel=hasCustom?(pFrom&&pTo?`${pFrom} → ${pTo}`:(pFrom||pTo))
    :(period==="today"?"Aaj":period==="week"?"7 Din":period==="month"?"Is Mahine":"Sab");

  /* Selected party detail */
  const selKey=ST.partywiseSel||null;
  const selParty=selKey?partyMap.get(selKey):null;

  if(selParty){
    /* ── Detail View ── */
    return`<div class="page">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <button class="btn b-ghost bsm rip" id="pw_back">← Back</button>
        <div>
          <div style="font-size:15px;font-weight:800;color:var(--t1)">${esc(selParty.shopName)}</div>
          <div style="font-size:10px;color:var(--t3)">${esc(selParty.villageName)}${selParty.shopOwner?" · "+esc(selParty.shopOwner):""}</div>
        </div>
      </div>

      <!-- Party summary card -->
      <div style="background:linear-gradient(135deg,#00A650,#007A38);border-radius:18px;padding:16px;margin-bottom:14px;color:#fff;box-shadow:0 6px 20px rgba(0,166,80,.35)">
        <div style="font-size:10px;opacity:.75;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Total Sale — ${esc(periodLabel)}</div>
        <div style="font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;font-size:30px;font-weight:800">${rup(selParty.total)}</div>
        <div style="display:flex;gap:14px;margin-top:12px">
          <div style="background:rgba(255,255,255,.15);border-radius:10px;padding:8px 14px;text-align:center;flex:1">
            <div style="font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;font-size:16px;font-weight:800">${selParty.bills.length}</div>
            <div style="font-size:9px;opacity:.8;margin-top:1px">Bills</div>
          </div>
          <div style="background:rgba(255,255,255,.15);border-radius:10px;padding:8px 14px;text-align:center;flex:1">
            <div style="font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;font-size:16px;font-weight:800">${selParty.boxes}</div>
            <div style="font-size:9px;opacity:.8;margin-top:1px">Boxes</div>
          </div>
          <div style="background:rgba(255,255,255,.15);border-radius:10px;padding:8px 14px;text-align:center;flex:1">
            <div style="font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;font-size:16px;font-weight:800">${selParty.bills.length?rup(Math.round(selParty.total/selParty.bills.length)):"-"}</div>

/* ══════════════ BILL HISTORY & SEARCH ══════════════ */
function rHistory(){
  const q=(ST.historySearch||"").toLowerCase().trim();
  const filt=ST.historyFilter||"all";
  const now=new Date();

  const matchDate=b=>{
    const d=new Date(b.date);
    /* v35: custom date range takes priority */
    const hFrom=ST.historyDateFrom||"";
    const hTo=ST.historyDateTo||"";
    if(hFrom||hTo) return dateInRange(b.date,hFrom,hTo);
    if(filt==="today") return d.toDateString()===now.toDateString();
    /* FIX Bug#13: Use midnight-normalized diff to avoid float off-by-one at day boundary */
    if(filt==="week"){const bd=new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();const td=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();return(td-bd)/(864e5)<7;}
    if(filt==="month") return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    return true;
  };

  const matchSearch=b=>{
    if(!q) return true;
    const amt=String(b.purchaseTotal||"");
    const date=fmtD(b.date).toLowerCase();
    return(
      (b.shopName||"").toLowerCase().includes(q)||
      (b.villageName||"").toLowerCase().includes(q)||
      (b.billNo||"").toLowerCase().includes(q)||
      (b.shopOwner||"").toLowerCase().includes(q)||
      amt.includes(q)||
      date.includes(q)||
      (b.items||[]).some(it=>(it.name||"").toLowerCase().includes(q))
    );
  };

  const results=[...ST.bills]
    .filter(b=>matchDate(b)&&matchSearch(b))
    .sort((a,b2)=>b2.date-a.date);

  const active=results.filter(b=>!b.returned);
  const totalAmt=active.reduce((s,b)=>s+(b.payment?.discountedBill||b.purchaseTotal),0);
  const totalCash=active.reduce((s,b)=>s+(b.payment?.cash||0),0);
  const totalUpi=active.reduce((s,b)=>s+(b.payment?.upi||0),0);
  /* v23: live udhari = original udhari minus any payments collected against each bill */
  const getLiveUdhari=b=>{
    const orig=b.payment?.udhari||0;if(orig<=0)return 0;
    /* BUG FIX v91: Purani udhari payments exclude karo */
    const paid=(ST.customerPayments||[]).filter(p=>String(p.billId)===String(b.id)&&!(p.note&&p.note.startsWith("Purani udhari"))).reduce((s,p)=>s+p.amount,0);
    return Math.max(0,orig-paid);
  };
  const totalUd=active.reduce((s,b)=>s+getLiveUdhari(b),0);

  const FILTERS=[
    {k:"all",l:"Sab"},
    {k:"today",l:"Aaj"},
    {k:"week",l:"7 Din"},
    {k:"month",l:"Mahina"},
  ];

  /* Party-wise grouping */
  const partyView = ST.historyPartyView||false;

  /* Group bills by shopName+villageId (BUG FIX v62: same name different village = separate party) */
  const groupByParty=()=>{
    const map={};
    results.forEach(b=>{
      const key=b.shopId?(b.villageId+"_"+b.shopId):("walkin_"+(b.shopName||"Walk-In").toLowerCase().trim());
      if(!map[key]) map[key]={shopName:b.shopName||"Walk-In",villageName:b.villageName||"",partyKey:key,bills:[],total:0,udhari:0};
      map[key].bills.push(b);
      if(!b.returned) map[key].total+=(b.payment?.discountedBill||b.purchaseTotal);
      if(!b.returned) map[key].udhari+=getLiveUdhari(b);
    });
    return Object.values(map).sort((a,b2)=>b2.total-a.total);
  };


  const payTag=b=>{
    const c=b.payment?.cash||0,u=b.payment?.upi||0;
    const liveUd=getLiveUdhari(b);
    const origUd=b.payment?.udhari||0;
    const tags=[];
    if(c>0) tags.push(`<span class="bh-tag bh-tag-cash">💵 ${rup(c)}</span>`);
    if(u>0) tags.push(`<span class="bh-tag bh-tag-upi">📱 ${rup(u)}</span>`);
    if(origUd>0){
      if(liveUd<=0) tags.push(`<span class="bh-tag bh-tag-cash">✅ Udhari Clear</span>`);
      else if(liveUd<origUd) tags.push(`<span class="bh-tag bh-tag-ud">📋 Baaki: ${rup(liveUd)}</span>`);
      else tags.push(`<span class="bh-tag bh-tag-ud">📋 ${rup(origUd)}</span>`);
    }
    if(b.returned) tags.push(`<span class="bh-tag bh-tag-ret">↩ Wapas</span>`);
    return tags.join("");
  };

  const payClass=b=>{
    const c=b.payment?.cash||0,u=b.payment?.upi||0,d=b.payment?.udhari||0;
    if(b.returned) return "returned";
    const cnt=(c>0?1:0)+(u>0?1:0)+(d>0?1:0);
    if(cnt>1) return "mixed";
    if(d>0) return "udhari";

        <button class="btn rip bsm" id="bh_bulk_toggle" style="background:${bulk?"var(--err)":"rgba(0,166,80,.1)"};color:${bulk?"#fff":"var(--pri2)"};border:1.5px solid ${bulk?"var(--err)":"rgba(0,166,80,.22)"};padding:6px 11px;font-size:11px;font-weight:800;border-radius:10px">${bulk?"✕ Cancel":"☑ Bulk"}</button>

    <!-- v18: Bulk-mode action bar -->

    <!-- Search bar -->

      </div>
      <div class="bh-stat">

    </div>`:""}

    <!-- Results -->
    ${results.length===0?`<div class="empty">
      <span class="eic" style="font-size:40px;opacity:.3">🔍</span>
      <div class="etit">${q?"Koi bill nahi mila":"Koi bill nahi"}</div>
      <div class="esub">${q?`"${esc(q)}" ke liye koi result nahi`:"Is period mein koi bill nahi"}</div>
    </div>`:""}

    ${partyView&&results.length>0?`
    <!-- ══ PARTY WISE VIEW ══ -->
    <div class="stag">
    ${groupByParty().map(party=>{
      const expanded = (ST.historyExpandedParty||[]).includes(party.partyKey);
      return`
      <!-- Party Header -->
      <div class="bh-party-hdr rip" data-party-toggle="${esc(party.partyKey)}" style="background:linear-gradient(135deg,rgba(0,166,80,.1),rgba(0,166,80,.05));border:1.5px solid rgba(0,166,80,.2);border-radius:14px;padding:13px 15px;margin-bottom:${expanded?"0":"10px"};cursor:pointer;${expanded?"border-bottom-left-radius:0;border-bottom-right-radius:0;border-bottom:none":""}">

/* BUG FIX v85: Bulk select/deselect ke liye lightweight DOM update —
   render() nahi karta isliye scroll upar nahi jaati */
function _updateBulkSelectionUI(){
  const sel=ST.historySelected||[];
  /* Update each card's selected state */
  document.querySelectorAll("[data-bhbill]").forEach(card=>{
    const k=card.dataset.bhbill;
    const on=sel.includes(k);
    card.classList.toggle("bh-sel",on);
    /* Update checkbox div */
    const chk=card.querySelector("[data-bhchk]");
    if(chk){
      chk.classList.toggle("on",on);
      chk.textContent=on?"✓":"";
    }
  });
  /* Update count label */
  const cntEl=document.querySelector(".bbb-cnt");
  if(cntEl) cntEl.textContent=sel.length+" selected";
  /* Update delete button disabled state */
  const delBtn=document.getElementById("bh_bulk_del");
  if(delBtn){
    delBtn.disabled=sel.length===0;
    delBtn.style.opacity=sel.length===0?"0.5":"1";
  }
}

function bHistory(){
  const inp=document.getElementById("bhs_inp");
  if(inp){
    inp.addEventListener("input",e=>{
      ST.historySearch=e.target.value;
      const cursorPos=e.target.selectionStart;
      clearTimeout(window._histRT);
      /* render() ke andar bhi setTimeout(4ms) hai — isliye seedha _r() call karo
         taaki hum khud focus timing control kar sakein */
      window._histRT=setTimeout(()=>{
        _r(); /* poora render — DOM replace hoga */
        /* _r() synchronous hai, ab naya DOM ready hai — focus restore karo */
        const newInp=document.getElementById("bhs_inp");
        if(newInp){
          newInp.focus();
          try{newInp.setSelectionRange(cursorPos,cursorPos);}catch(err){}
        }
      },180);
    });
  }
  /* v35: bind date filter */
  bindDateFilter("history");
  document.querySelectorAll("[data-bhf]").forEach(b=>b.addEventListener("click",()=>{
    ST.historyFilter=b.dataset.bhf;render();
  }));
  document.querySelector("[data-bhf_clear]")?.addEventListener("click",()=>{
    ST.historySearch="";ST.historyFilter="all";render();
  });
  /* v18: bulk toggle + actions */
  /* Party View toggle */
  document.getElementById("bh_party_toggle")?.addEventListener("click",()=>{
    ST.historyPartyView=!ST.historyPartyView;
    ST.historyExpandedParty=[];
    render();
  });

  /* Party expand/collapse — BUG FIX v101: render() loop fix.
     render() poora page re-render karta tha aur bBindHistory() dobara
     event listeners attach karta tha — rapid loop ban jaata tha.
     Fix: requestAnimationFrame se debounce + stopPropagation */
  document.querySelectorAll("[data-party-toggle]").forEach(el=>{
    el.addEventListener("click",(e)=>{
      e.stopPropagation();
      const key=el.dataset.partyToggle;
      if(!ST.historyExpandedParty)ST.historyExpandedParty=[];
      const idx=ST.historyExpandedParty.indexOf(key);
      if(idx>=0) ST.historyExpandedParty.splice(idx,1);
      else ST.historyExpandedParty.push(key);
      if(window._partyRenderPending)return;
      window._partyRenderPending=true;
      requestAnimationFrame(()=>{
        window._partyRenderPending=false;
        render();
      });
    });
  });

  document.getElementById("bh_bulk_toggle")?.addEventListener("click",()=>{
    ST.historyBulk=!ST.historyBulk;ST.historySelected=[];render();
  });
  document.getElementById("bh_bulk_all")?.addEventListener("click",()=>{
    /* select all currently visible bill cards */
    ST.historySelected=[...document.querySelectorAll("[data-bhbill]")].map(el=>el.dataset.bhbill);
    /* BUG FIX v85: lightweight update */
    _updateBulkSelectionUI();
  });
  document.getElementById("bh_bulk_clear")?.addEventListener("click",()=>{
    ST.historySelected=[];
    /* BUG FIX v85: lightweight update */
    _updateBulkSelectionUI();
  });
  document.getElementById("bh_bulk_del")?.addEventListener("click",()=>{
    const ids=[...(ST.historySelected||[])];
    if(ids.length===0)return;
    _doBulkDeleteBills(ids);
  });
  document.querySelectorAll("[data-bhchk]").forEach(el=>el.addEventListener("click",ev=>{
    ev.stopPropagation();
    const k=el.dataset.bhchk;
    const arr=ST.historySelected||[];
    ST.historySelected=arr.includes(k)?arr.filter(x=>x!==k):[...arr,k];
    /* BUG FIX v85: render() ke bajaye lightweight update — scroll top nahi jaayegi */
    _updateBulkSelectionUI();
  }));
  document.querySelectorAll(".bh-card").forEach(card=>card.addEventListener("click",ev=>{
    /* When in bulk mode, clicking the card toggles selection (unless action button clicked) */
    if(!ST.historyBulk)return;
    if(ev.target.closest("[data-bhchk]")||ev.target.closest("button"))return;
    const k=card.dataset.bhbill;
    const arr=ST.historySelected||[];
    ST.historySelected=arr.includes(k)?arr.filter(x=>x!==k):[...arr,k];
    /* BUG FIX v85: render() ke bajaye lightweight update — scroll top nahi jaayegi */
    _updateBulkSelectionUI();
  }));
  /* Per-bill action buttons */
  /* BUG FIX v85: String(b.id) === String(k) — numeric id type mismatch fix */
  const _findBill=k=>ST.bills.find(b=>String(b.id)===String(k))||ST.bills.find(b=>b.billNo===String(k));
  document.querySelectorAll("[data-bhview]").forEach(b=>b.addEventListener("click",ev=>{
    ev.stopPropagation();const bill=_findBill(b.dataset.bhview);if(bill)_showFullBillPopup(bill);
  }));
  document.querySelectorAll("[data-bhedit]").forEach(b=>b.addEventListener("click",ev=>{
    ev.stopPropagation();const bill=_findBill(b.dataset.bhedit);if(bill)_doEditBill(bill);
  }));
  document.querySelectorAll("[data-bhret]").forEach(b=>b.addEventListener("click",ev=>{
    ev.stopPropagation();const bill=_findBill(b.dataset.bhret);if(!bill)return;
    _styledConfirm({
      icon:"↩",
      title:"Bill Wapas Karo?",
      msg:`<b>${esc(bill.billNo)}</b> · ${esc(bill.shopName)}<br>${rup(bill.purchaseTotal)} ka bill returned mark hoga aur stock wapas aayega.`,
      okText:"Haan, Wapas",okClass:"danger",
      onYes:()=>{_doReturnBill(bill);}
    });
  }));
  document.querySelectorAll("[data-bhpdf]").forEach(b=>b.addEventListener("click",ev=>{
    ev.stopPropagation();const bill=_findBill(b.dataset.bhpdf);if(bill)_doStatementExport({type:"bill",bill});
  }));
  document.querySelectorAll("[data-bhdel]").forEach(b=>b.addEventListener("click",ev=>{
    ev.stopPropagation();const bill=_findBill(b.dataset.bhdel);if(bill)_doDeleteBill(bill.id);
  }));
  /* ══ WhatsApp Bill Share from History ══ */
  document.querySelectorAll("[data-bhwa]").forEach(btn=>btn.addEventListener("click",ev=>{
    ev.stopPropagation();
    const bill=_findBill(btn.dataset.bhwa);
    if(!bill)return;
    _showWaBillShareDialog(bill);
  }));
  /* ══ Screenshot Share from History ══ */
  document.querySelectorAll("[data-bhss]").forEach(btn=>btn.addEventListener("click",ev=>{
    ev.stopPropagation();
    const bill=_findBill(btn.dataset.bhss);
    if(!bill)return;
    _shareScreenshotOnly(bill);
  }));
}

/* ══════════════ CUSTOMER LEDGER SYSTEM ══════════════ */

/* Helper: get all active (non-returned) bills for a shop — used for ledger balance calculation */
function getShopBills(villageId,shopId){
  return ST.bills.filter(b=>b.villageId===villageId&&b.shopId===shopId&&!b.returned);
}

/* Helper: get all payments for a shop */
/* BUG FIX v96: String/Number mismatch fix — Firebase/JSON parse ke baad IDs string ban jaati hain.
   Strict === fail karta tha — ab loose == use karo taaki "5"==5 bhi match ho. */
function getShopPayments(villageId,shopId){
  // eslint-disable-next-line eqeqeq
  return (ST.customerPayments||[]).filter(p=>p.villageId==villageId&&p.shopId==shopId);
}

/* Helper: build running ledger for a shop
   BUG FIX: Include ALL bills (returned + active) so debit/credit pairs stay balanced.
   A returned bill already has a matching credit entry in customerPayments (added by _doReturnBill),
   so excluding the returned bill debit would create a phantom credit and negative balance. */
function buildLedger(villageId,shopId){
  // BUG FIX v96: loose == for String/Number mismatch after Firebase sync
  // eslint-disable-next-line eqeqeq
  const bills=ST.bills.filter(b=>b.villageId==villageId&&b.shopId==shopId)
    .map(b=>({...b,_type:"bill",_date:b.date}));
  /* BUG FIX v92 FINAL: Purani udhari payment INCLUDE karo credit mein.
     Aur bill debit mein bhi prevUdhari ADD karo — warna credit se balance negative ho jaata.
     Logic: bill debit = discountedBill + prevUdhari (jo is bill ke saath carry-forward tha)
            credit = actual payment (cash/upi) jo mila — including purani udhari ka hissa
     Result: agar sab payment ho gayi toh balance = 0. Sahi. */
  const pays=getShopPayments(villageId,shopId)
    .map(p=>({...p,_type:"pay",_date:p.date}));
  const all=[...bills,...pays].sort((a,b2)=>a._date-b2._date);
  let balance=0;
  return all.map(entry=>{
    if(entry._type==="bill"){
      /* BUG FIX v97: prevUdhari double count fix.
         prevUdhari pehle ki bill entry mein ALREADY debit ho chuki hoti hai (as udhari).
         Naye bill mein sirf discountedBill (aaj ka bill) add karo.
         prevUdhari yahan add karne ki zarurat NAHI — woh carry-forward balance hai,
         jo purani entries se already running balance mein hai.
         Exception: _manualUdhari entries (manual udhari) — inhe as-is add karo (purchaseTotal). */
      const discBill=(entry.payment?.discountedBill||entry.purchaseTotal);
      balance+=discBill;
    } else {
      balance-=entry.amount;
    }
    return{...entry,runningBalance:balance};
  });
}

/* Helper: get shop balance */
function getShopBalance(villageId,shopId){
  const ledger=buildLedger(villageId,shopId);
  return ledger.length?ledger[ledger.length-1].runningBalance:0;
}

/* ── rLedger ── */
function rLedger(){
  /* VILLAGE LIST */
  if(ST.ledgerTab==="villages"){
    const villagesWithData=ST.villages.map(v=>{
      const shops=v.shops.map(s=>({...s,balance:getShopBalance(v.id,s.id)}));
      const totalBal=shops.reduce((s,sh)=>s+sh.balance,0);
      const totalBills=getShopBills_village(v.id);
      return{...v,shops,totalBal,totalBills};
    });
    const grandTotal=villagesWithData.reduce((s,v)=>s+v.totalBal,0);
    /* Walk-In balance from walk-in bills */
    const walkInBills=(ST.bills||[]).filter(b=>b.walkIn&&!b.returned);
    const walkInGroups={};
    walkInBills.forEach(b=>{
      const k=(b.shopName||"Walk-In").toLowerCase().trim();
      if(!walkInGroups[k])walkInGroups[k]={shopName:b.shopName||"Walk-In",bills:[],paid:0};
      walkInGroups[k].bills.push(b);
    });
    /* Also manual udhari from udhari tab (shopId=null) */
    const walkInUdhari=(ST.udhari||[]).filter(u=>!u.shopId&&!u.cleared);
    walkInUdhari.forEach(u=>{
      const k=(u.shopName||"Walk-In").toLowerCase().trim();
      if(!walkInGroups[k])walkInGroups[k]={shopName:u.shopName||"Walk-In",bills:[],paid:0};
      walkInGroups[k]._udhariAmt=(walkInGroups[k]._udhariAmt||0)+Math.max(0,(u.amount||0)-(u.paid||0));
    });
    const walkInCustomers=Object.values(walkInGroups);
    const walkInPending=walkInBills.reduce((s,b)=>s+(b.payment?.udhari||0),0)
      +walkInUdhari.reduce((s,u)=>s+Math.max(0,(u.amount||0)-(u.paid||0)),0);
    const walkInBadge=walkInCustomers.length;
    return`<div class="page">
      <div class="pk">CUSTOMER ACCOUNTS</div>

          </div>

          </div>

      <div class="cl-village-card rip" id="cl_walkin_card" style="border:1.5px solid rgba(245,158,11,.3);background:linear-gradient(135deg,rgba(245,158,11,.06),rgba(255,255,255,1))">

          <div style="font-size:9px;color:var(--t3);margin-top:1px">${walkInPending>0?"pending":"clear"}</div>
        </div>
      </div>

    </div>`;
  }

  if(ST.ledgerTab==="shops"){
    const v=getVillage(ST.ledgerVillageId);if(!v)return rLedger_reset();

      <button class="btn b-info bfl rip" id="cl_add_pay" style="margin-bottom:9px;font-size:13px;padding:11px">💳 Payment Add Karo</button>
      <!-- v18: Statement Export -->
      <button class="btn b-ghost bfl rip" id="cl_stmt_pdf" style="margin-bottom:13px;font-size:12px;padding:10px;border:1.5px dashed rgba(99,102,241,.35);color:#4F46E5;background:rgba(99,102,241,.05)">📄 Statement PDF Export</button>

      <!-- v19: Deleted Bills toggle -->
      ${(ST.deletedBills||[]).filter(b=>b.villageId===v.id&&b.shopId===s.id).length>0?`
      <button class="btn bfl rip" id="cl_show_deleted" style="margin-bottom:11px;font-size:11px;padding:9px;background:${ST.ledgerShowDeleted?"rgba(239,68,68,.1)":"rgba(0,0,0,.04)"};color:${ST.ledgerShowDeleted?"var(--err)":"var(--t3)"};border:1.5px dashed rgba(239,68,68,.3)">
        🗑️ ${ST.ledgerShowDeleted?"Deleted Bills Chhupao":"Deleted Bills Dekho"} (${(ST.deletedBills||[]).filter(b=>b.villageId===v.id&&b.shopId===s.id).length})
      </button>`:""}

      <!-- Ledger Timeline -->
      <div style="font-size:10px;font-weight:700;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-bottom:11px">LEDGER TIMELINE</div>
      ${ledger.length===0?`<div class="empty" style="padding:30px 0"><span class="eic">📒</span><div class="etit">Koi entry nahi</div><div class="esub">Billing karo — yahan dikhega</div></div>`:""}
      <div class="stag">
      ${(()=>{
        /* v99 GROUP FIX: Same billId + same note wali payment entries ek card mein merge karo */
        const reversed=[...ledger].reverse();
        const grouped=[];
        const usedIdx=new Set();
        reversed.forEach((entry,i)=>{
          if(usedIdx.has(i))return;
          if(entry._type==="pay"&&entry.billId!=null){
            /* Is entry ke saath koi aur entry hai same billId+note se? */
            const siblings=[];
            reversed.forEach((e2,j)=>{
              if(j!==i&&!usedIdx.has(j)&&e2._type==="pay"&&String(e2.billId)===String(entry.billId)&&(e2.note||"")===(entry.note||"")&&Math.abs((e2.date||0)-(entry.date||0))<5000){
                siblings.push({e:e2,j});
              }
            });
            if(siblings.length>0){
              /* Merge: ek combined entry banao */
              siblings.forEach(s=>usedIdx.add(s.j));
              usedIdx.add(i);
              const allEntries=[entry,...siblings.map(s=>s.e)];
              const totalAmt=allEntries.reduce((s,e)=>s+(e.amount||0),0);
              const hasCash=allEntries.some(e=>e.mode==="cash");
              const hasOnline=allEntries.some(e=>e.mode==="online"||e.mode==="upi");
              const cashAmt=allEntries.filter(e=>e.mode==="cash").reduce((s,e)=>s+(e.amount||0),0);
              const onlineAmt=allEntries.filter(e=>e.mode==="online"||e.mode==="upi").reduce((s,e)=>s+(e.amount||0),0);
              /* runningBalance: lowest runningBalance among merged (jo latest credit ke baad aata hai) */
              const minBal=allEntries.reduce((min,e)=>Math.min(min,e.runningBalance??Infinity),Infinity);
              grouped.push({...entry,_merged:true,amount:totalAmt,runningBalance:minBal,_hasCash:hasCash,_hasOnline:hasOnline,_cashAmt:cashAmt,_onlineAmt:onlineAmt});
              return;
            }
          }
          usedIdx.add(i);
          grouped.push(entry);
        });
        return grouped.map(entry=>{
        if(entry._type==="bill"){
          const isMU=entry._manualUdhari===true;
          return`<div class="cl-entry cl-entry-bill" style="${isMU?"border-left:3px solid #e74c3c;background:rgba(231,76,60,.04)":""}">
            <div class="cl-entry-hdr">
              <div>

              </div>
            </div>
            <div class="cl-entry-body">
              ${isMU?"":((entry.items||[]).map(it=>`<div class="cl-item-row"><span class="cl-item-name">${esc(it.name)}</span><span style="color:var(--t3);font-size:10px;margin:0 8px">${it.boxQty} box</span><span class="cl-item-val">${rup(it.amount)}</span></div>`).join(""))}
              <div class="cl-balance-row">
                <span class="cl-balance-lbl">BALANCE AFTER</span>
                <span class="cl-balance-val" style="color:${entry.runningBalance>0?"var(--err)":"var(--ok)"}">${rup(entry.runningBalance)}</span>
              </div>
              <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
                <button class="cl-view-bill-btn rip" data-viewbill="${entry.id||entry.billNo}" style="${isMU?"display:none":""}">👁️ Full Bill Dekho</button>
                <button class="cl-view-bill-btn rip" data-ledger-delbill="${entry.id||entry.billNo}" style="background:rgba(239,68,68,.08);color:var(--err);border-color:rgba(239,68,68,.2)${isMU?";display:none":""}">🗑️ Delete</button>
                ${isMU?`<div style="font-size:10px;color:var(--t3);padding:4px 0">📋 Udhari Tab se manually add ki gayi — wahan se edit/delete karo</div>`:""}
              </div>
            </div>
          </div>`;
        } else if(entry._type==="prevud"){
          /* BUG FIX v92: Purani udhari debit entry — sirf display ke liye */
          return`<div class="cl-entry cl-entry-bill" style="border-left:3px solid #F59E0B;background:rgba(245,158,11,.04)">
            <div class="cl-entry-hdr">
              <div>
                <div class="cl-entry-type" style="background:rgba(245,158,11,.12);color:#92400E;border-color:rgba(245,158,11,.25);font-size:8px;font-weight:800;letter-spacing:.5px;padding:2px 7px;border-radius:99px;border:1px solid;display:inline-block">📋 PURANI UDHARI</div>
                <div class="cl-entry-no" style="font-size:11px;color:var(--t2);margin-top:3px">Bill ${esc(entry.billNo)} ke saath</div>
                <div class="cl-entry-date">${fmtD(entry._date+1)}</div>
              </div>
              <div style="text-align:right">
                <div class="cl-entry-amt" style="color:#D97706">+${rup(entry.amount)}</div>
                <div style="font-size:9px;color:var(--t3);margin-top:2px">Carry forward</div>
              </div>
            </div>
            <div class="cl-entry-body">
              <div class="cl-balance-row">
                <span class="cl-balance-lbl">BALANCE AFTER</span>
                <span class="cl-balance-val" style="color:${entry.runningBalance>0?"var(--err)":"var(--ok)"}">${rup(entry.runningBalance)}</span>
              </div>
            </div>
          </div>`;
        } else {
          /* v18: link to bill if billId present */
          const _linkedBill=entry.billId?ST.bills.find(b=>String(b.id)===String(entry.billId)):null;
          return`<div class="cl-entry cl-entry-pay">
            <div class="cl-entry-hdr">
              <div>
                <div class="cl-entry-type cl-pay-type">💳 PAYMENT</div>
                <div class="cl-entry-no">${esc(entry.note||"Payment Received")}</div>
                <div class="cl-entry-date">${fmtD(entry._date)}</div>
                ${_linkedBill?`<div class="exp-paidlink">✅ Mark as Paid: <b>${esc(_linkedBill.billNo)}</b></div>`:""}
              </div>
              <div style="text-align:right">
                <div class="cl-entry-amt" style="color:var(--ok)">−${rup(entry.amount)}</div>
                ${entry._merged&&entry._hasCash&&entry._hasOnline
                  ?`<div style="display:flex;gap:4px;justify-content:flex-end;flex-wrap:wrap;margin-top:4px"><div class="cl-pay-badge cl-pay-cash">💵 Cash ${rup(entry._cashAmt)}</div><div class="cl-pay-badge cl-pay-online">📱 Online ${rup(entry._onlineAmt)}</div></div>`
                  :`<div class="cl-pay-badge ${entry.mode==="cash"?"cl-pay-cash":"cl-pay-online"}">${entry.mode==="cash"?"💵 Cash":"📱 Online"}</div>`}
              </div>
            </div>
            <div class="cl-entry-body">
              <div class="cl-balance-row">
                <span class="cl-balance-lbl">BALANCE AFTER</span>
                <span class="cl-balance-val" style="color:${entry.runningBalance>0?"var(--err)":"var(--ok)"}">${rup(entry.runningBalance)}</span>
              </div>
            </div>
          </div>`;
        }
        }).join("")})()}
      </div>

      <!-- v19: Deleted Bills Section -->
      ${ST.ledgerShowDeleted?`
      <div style="margin-top:16px">
        <div style="font-size:10px;font-weight:700;color:var(--err);letter-spacing:2px;text-transform:uppercase;margin-bottom:11px;display:flex;align-items:center;gap:6px">
          <span>🗑️ DELETED BILLS</span>
          <span style="font-size:9px;color:var(--t3)">(restore kar sakte ho)</span>
        </div>
        ${(ST.deletedBills||[]).filter(b=>b.villageId===v.id&&b.shopId===s.id).map(b=>`
        <div style="background:rgba(239,68,68,.04);border:1.5px dashed rgba(239,68,68,.25);border-radius:14px;padding:12px 13px;margin-bottom:9px;opacity:.85">

              <div style="font-size:10px;color:var(--t3);margin-top:2px">Deleted: ${fmtD(b.deletedAt||Date.now())}</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:14px;font-weight:800;color:var(--err);text-decoration:line-through">${rup(b.purchaseTotal)}</div>
            </div>

          <div style="margin-top:9px">
            <button class="btn rip bsm" data-ledger-restore="${b.id||b.billNo}" style="background:rgba(0,166,80,.1);color:var(--pri2);border:1.5px solid rgba(0,166,80,.25);font-size:11px;padding:6px 12px">♻️ Restore Karo</button>
          </div>
        </div>`).join("")}
      </div>`:""}

    </div>`;
  }
  return rLedger_reset();
}

/* ── bLedger ── */
function bLedger(){
  document.querySelectorAll("[data-lv]").forEach(c=>c.addEventListener("click",()=>{
    ST.ledgerVillageId=+c.dataset.lv;ST.ledgerTab="shops";render();
  }));
  document.getElementById("cl_walkin_card")?.addEventListener("click",()=>{
    ST.tab="walkin-khata";ST.wkTab="list";render();
  });
  document.querySelectorAll("[data-ls]").forEach(c=>c.addEventListener("click",()=>{
    ST.ledgerShopId=+c.dataset.ls;ST.ledgerTab="detail";render();
  }));
  document.getElementById("cl_back_v")?.addEventListener("click",()=>{ST.ledgerTab="villages";render();});
  document.getElementById("cl_back_s")?.addEventListener("click",()=>{ST.ledgerTab="shops";render();});
  document.getElementById("cl_add_pay")?.addEventListener("click",()=>{
    _openLedgerPayForm(ST.ledgerVillageId,ST.ledgerShopId);
  });
  document.getElementById("cl_stmt_pdf")?.addEventListener("click",()=>{
    _doStatementExport({type:"ledger",villageId:ST.ledgerVillageId,shopId:ST.ledgerShopId});
  });

  /* v19: Deleted bills toggle */
  document.getElementById("cl_show_deleted")?.addEventListener("click",()=>{
    ST.ledgerShowDeleted=!ST.ledgerShowDeleted;render();
  });

  /* v19: Ledger bill delete button */
  document.querySelectorAll("[data-ledger-delbill]").forEach(btn=>btn.addEventListener("click",ev=>{
    ev.stopPropagation();
    const key=btn.dataset.ledgerDelbill;
    const bill=ST.bills.find(b=>String(b.id)===key||b.billNo===key);
    if(!bill)return;
    _styledConfirm({
      icon:"🗑️",
      title:"Bill Delete Karo?",
      msg:`<b>${esc(bill.billNo)}</b> — ${esc(bill.shopName)}<br><span style="color:var(--err);font-weight:800">${rup(bill.purchaseTotal)}</span> ka bill ledger se hata jaayega.<br><br>Stock aur udhari reverse ho jaayega.<br><span style="font-size:11px;color:var(--t3)">Recycling Bin mein jaayega — restore kar sakte ho.</span>`,
      okText:"Haan, Delete",okClass:"danger",
      onYes:()=>{
        /* Re-fetch fresh reference to guard stale state */
        const fresh=ST.bills.find(b=>String(b.id)===key||b.billNo===key);
        if(!fresh)return;
        /* Reverse FIRST, then snapshot to bin (avoid mutated object in bin) */
        _reverseBillEffects(fresh);
        if(!ST.deletedBills)ST.deletedBills=[];
        ST.deletedBills.push({...fresh, deletedAt:Date.now()});
        ST.bills=ST.bills.filter(b=>String(b.id)!==String(fresh.id));
        dbSave();render();
        _showToast(`🗑️ ${fresh.billNo} Recycling Bin mein gaya`,"#EF4444");
      }
    });
  }));

  /* v19: Restore deleted bill */
  document.querySelectorAll("[data-ledger-restore]").forEach(btn=>btn.addEventListener("click",ev=>{
    ev.stopPropagation();
    const key=btn.dataset.ledgerRestore;
    const bill=(ST.deletedBills||[]).find(b=>String(b.id)===key||b.billNo===key);
    if(!bill)return;
    const isReturned=!!bill.returned;
    _styledConfirm({
      icon:"♻️",
      title:"Bill Restore Karo?",
      msg:isReturned
        ? `<b>${esc(bill.billNo)}</b> wapas aa jaayega.<br><span style="color:var(--t3);font-size:11px">⚠️ Yeh bill pehle se return ho chuka tha — stock change nahi hoga.</span>`
        : `<b>${esc(bill.billNo)}</b> wapas aa jaayega.<br>Stock aur udhari phir se update honge.`,
      okText:"Haan, Restore",okClass:"",
      onYes:()=>{
        /* Re-fetch fresh reference */
        const fresh=(ST.deletedBills||[]).find(b=>String(b.id)===key||b.billNo===key);
        if(!fresh)return;
        _doRestoreBill(fresh);
        dbSave();render();
        _showToast(`♻️ ${fresh.billNo} restore ho gaya!`,"#00A650");
      }
    });
  }));

  /* View full bill popup */
  document.querySelectorAll("[data-viewbill]").forEach(btn=>btn.addEventListener("click",()=>{
    const key=btn.dataset.viewbill;
    const bill=ST.bills.find(b=>String(b.id)===key||b.billNo===key);
    if(bill)_showFullBillPopup(bill);
  }));
}

/* ══════════════ WALK-IN KHATA ══════════════ */
/* ST.wkTab = "list" | "detail"
   ST.wkDetailName = shopName key for detail view */

function _buildWalkInCustomers(){
  /* Gather all walk-in bills grouped by shopName */
  const map={};
  (ST.bills||[]).filter(b=>b.walkIn).forEach(b=>{
    const k=(b.shopName||"Walk-In").toLowerCase().trim();
    if(!map[k])map[k]={shopName:b.shopName||"Walk-In",mobile:b.shopMobile||"",bills:[],udhariEntries:[]};
    map[k].bills.push(b);
    if(b.shopMobile&&!map[k].mobile)map[k].mobile=b.shopMobile;
  });
  /* Also include manual udhari entries (shopId=null) from Udhari tab */
  (ST.udhari||[]).filter(u=>!u.shopId).forEach(u=>{
    const k=(u.shopName||"Walk-In").toLowerCase().trim();
    if(!map[k])map[k]={shopName:u.shopName||"Walk-In",mobile:u.shopMobile||"",bills:[],udhariEntries:[]};
    map[k].udhariEntries.push(u);
    if(u.shopMobile&&!map[k].mobile)map[k].mobile=u.shopMobile;
  });
  return Object.values(map).map(c=>{
    /* Balance = sum of unpaid bill udhari + unpaid manual udhari - standalone walk-in payments */
    const shopKey=(c.shopName||"").toLowerCase().trim();
    const billUdhari=c.bills.filter(b=>!b.returned).reduce((s,b)=>{
      const orig=b.payment?.udhari||0;
      /* BUG FIX v91: "Purani udhari payment" exclude karo — woh is bill ki payment nahi */
      const collected=(ST.customerPayments||[]).filter(p=>String(p.billId)===String(b.id)&&!(p.note&&p.note.startsWith("Purani udhari"))).reduce((a,p)=>a+p.amount,0);
      return s+Math.max(0,orig-collected);
    },0);
    const manUdhari=c.udhariEntries.reduce((s,u)=>s+Math.max(0,(u.amount||0)-(u.paid||0)),0);
    /* BUG FIX: Standalone walk-in payments (billId:null, _walkIn:true) reduce bill-side balance.
       Manual udhari balance already tracked via u.paid (no double-deduction risk there).
       Net: subtract standaloneCollected from (billUdhari + manUdhari), but cap at 0. */
    /* BUG FIX v91-WK2: "Purani udhari payment" entries exclude karo (safety filter) */
    const standaloneCollected=(ST.customerPayments||[]).filter(p=>p._walkIn&&p.billId==null&&!(p.note&&p.note.startsWith("Purani udhari"))&&(p.shopName||"").toLowerCase().trim()===shopKey).reduce((s,p)=>s+(p.amount||0),0);
    const balance=Math.max(0,billUdhari+manUdhari-standaloneCollected);
    const totalBills=c.bills.filter(b=>!b.returned).length;
    const lastDate=Math.max(...c.bills.map(b=>b.date||0),...c.udhariEntries.map(u=>u.date||0),0);
    return{...c,balance,totalBills,lastDate};
  }).sort((a,b2)=>b2.balance-a.balance);
}

function rWalkInKhata(){
  if(!ST.wkTab)ST.wkTab="list";

  /* ── DETAIL VIEW ── */
  if(ST.wkTab==="detail"){
    const key=(ST.wkDetailName||"").toLowerCase().trim();
    const all=_buildWalkInCustomers();
    const c=all.find(x=>x.shopName.toLowerCase().trim()===key);
    if(!c){ST.wkTab="list";return rWalkInKhata();}

    /* Build ledger timeline: bills + manual udhari + payments */
    const entries=[];
    c.bills.forEach(b=>entries.push({...b,_type:"bill",_date:b.date}));
    c.udhariEntries.forEach(u=>entries.push({...u,_type:"manual_ud",_date:u.date}));
    /* Walk-in customerPayments (billId linked) — Purani udhari payments exclude karo (alag balance hain) */
    (ST.customerPayments||[]).filter(p=>{
      if(p.note&&p.note.startsWith("Purani udhari"))return false;
      const linked=ST.bills.find(b=>String(b.id)===String(p.billId));
      return linked&&linked.walkIn&&(linked.shopName||"").toLowerCase().trim()===key;
    }).forEach(p=>entries.push({...p,_type:"pay",_date:p.date}));
    /* BUG FIX: Standalone walk-in payments (billId:null, _walkIn:true) bhi ledger mein dikhao */
    (ST.customerPayments||[]).filter(p=>p._walkIn&&p.billId==null&&(p.shopName||"").toLowerCase().trim()===key)
      .forEach(p=>entries.push({...p,_type:"pay",_date:p.date}));
    /* BUG FIX v91-WK2: u.history pay entries hata diye — ye entries _openWalkInPayForm se
       aati hain jo already customerPayments (standalone) mein bhi record hoti hain.
       Dono dikhane se ledger mein double credit aur balance double minus hota tha. */
    entries.sort((a,b2)=>a._date-b2._date);

    /* Running balance */
    let bal=0;
    const ledger=entries.map(e=>{
      if(e._type==="bill") bal+=(e.payment?.discountedBill||e.purchaseTotal);
      else if(e._type==="manual_ud") bal+=e.amount||0;
      else bal-=e.amount||0;
      return{...e,runningBalance:bal};
    });
    const totalBilled=ledger.filter(e=>e._type==="bill").reduce((s,e)=>s+(e.payment?.discountedBill||e.purchaseTotal),0)
      +ledger.filter(e=>e._type==="manual_ud").reduce((s,e)=>s+(e.amount||0),0);
    const totalPaid=ledger.filter(e=>e._type==="pay").reduce((s,e)=>s+(e.amount||0),0);

    return`<div class="page">
      <div style="display:flex;gap:9px;align-items:center;margin-bottom:14px">
        <button class="btn b-ghost rip bsm" id="wk_back">← Back</button>
        <div style="flex:1;min-width:0">
          <div style="font-family:'Outfit',sans-serif;font-size:16px;font-weight:800;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">🚶 ${esc(c.shopName)}</div>
          ${c.mobile?`<div style="font-size:11px;color:var(--t3)">${esc(c.mobile)}</div>`:""}
        </div>
        <div style="flex-shrink:0;text-align:right">
          <div style="font-size:17px;font-weight:800;color:${c.balance>0?"var(--err)":"var(--ok)"}">${rup(c.balance)}</div>
          <div style="font-size:9px;color:var(--t3)">${c.balance>0?"baaki":"clear"}</div>
        </div>
      </div>
      <div class="cl-summary-strip">
        <div class="cl-sum-item"><div class="cl-sum-lbl">Bills</div><div class="cl-sum-val" style="color:var(--pri)">${c.totalBills}</div></div>
        <div class="cl-sum-item"><div class="cl-sum-lbl">Billed</div><div class="cl-sum-val" style="color:var(--err)">${rup(totalBilled)}</div></div>
        <div class="cl-sum-item"><div class="cl-sum-lbl">Paid</div><div class="cl-sum-val" style="color:var(--ok)">${rup(totalPaid)}</div></div>
      </div>
      ${c.balance>0?`<button class="btn b-info bfl rip" id="wk_collect_btn" style="margin-bottom:9px;font-size:13px;padding:11px" data-wkname="${esc(c.shopName)}">💳 Payment Lena (${rup(c.balance)})</button>`:""}
      <div style="font-size:10px;font-weight:700;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-bottom:11px">LEDGER TIMELINE</div>
      ${ledger.length===0?`<div class="empty" style="padding:30px 0"><span class="eic">📒</span><div class="etit">Koi entry nahi</div></div>`:""}
      <div class="stag">
      ${[...ledger].reverse().map(e=>{
        if(e._type==="bill"){
          return`<div class="cl-entry cl-entry-bill">
            <div class="cl-entry-hdr">
              <div>
                <div class="cl-entry-type cl-bill-type">🧾 BILL</div>
                <div class="cl-entry-no">${esc(e.billNo)}</div>
                <div class="cl-entry-date">${fmtD(e._date)} ${fmtT(e._date)}</div>
              </div>
              <div style="text-align:right">
                <div class="cl-entry-amt" style="color:var(--err)">+${rup(e.payment?.discountedBill||e.purchaseTotal)}</div>
                <div style="font-size:9px;color:var(--t3)">${e.items?.length||0} items</div>
              </div>
            </div>
            <div class="cl-entry-body">
              ${(e.items||[]).map(it=>`<div class="cl-item-row"><span class="cl-item-name">${esc(it.name)}</span><span style="color:var(--t3);font-size:10px;margin:0 8px">${it.boxQty} box</span><span class="cl-item-val">${rup(it.amount)}</span></div>`).join("")}

              </div>
            </div>
            <div class="cl-entry-body">
              <div class="cl-balance-row">
                <span class="cl-balance-lbl">BALANCE AFTER</span>
                <span class="cl-balance-val" style="color:${e.runningBalance>0?"var(--err)":"var(--ok)"}">${rup(e.runningBalance)}</span>
              </div>

        } else {
          return`<div class="cl-entry cl-entry-pay">
            <div class="cl-entry-hdr">
              <div>
                <div class="cl-entry-type cl-pay-type">💳 PAYMENT</div>
                <div class="cl-entry-no">${esc(e.note||"Payment Received")}</div>
                <div class="cl-entry-date">${fmtD(e._date)}</div>
              </div>
              <div style="text-align:right">
                <div class="cl-entry-amt" style="color:var(--ok)">-${rup(e.amount||0)}</div>

            <div class="cl-entry-body">

              </div>
            </div>
          </div>`;
        }
      }).join("")}
      </div>
    </div>`;
  }

  /* ── LIST VIEW ── */
  const customers=_buildWalkInCustomers();
  const totalPending=customers.reduce((s,c)=>s+c.balance,0);
  return`<div class="page">
    <div class="pk">WALK-IN ACCOUNTS</div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">

    <div class="stag">
    ${customers.map((c,ci)=>{
      const _bc=c.balance>0?'var(--err)':c.balance<0?'#2563EB':'var(--ok)';
      const _bl=c.balance>0?'baaki':c.balance<0?'advance':'clear';
      const _hb=c.balance>0?'has-balance':'';
      const _lr=c.lastDate?`<div style="font-size:9px;color:var(--t3);margin-top:2px">Last: ${fmtD(c.lastDate)}</div>`:'';
      return`<div class="cl-shop-card rip ${_hb}" data-wkidx="${ci}">

    }).join('')}

  </div>`;
}

function bWalkInKhata(){
  document.getElementById("wk_back")?.addEventListener("click",()=>{ST.wkTab="list";render();});
  document.getElementById("wk_back_ledger")?.addEventListener("click",()=>{ST.tab="ledger";ST.ledgerTab="villages";render();});
  document.querySelectorAll("[data-wkidx]").forEach(c=>c.addEventListener("click",()=>{
    const customers=_buildWalkInCustomers();
    const idx=parseInt(c.dataset.wkidx)||0;
    const cust=customers[idx];
    if(cust){ST.wkDetailName=cust.shopName.toLowerCase().trim();ST.wkTab="detail";render();}
  }));
  document.querySelectorAll("[data-wk-viewbill]").forEach(btn=>btn.addEventListener("click",()=>{
    const key=btn.dataset.wkViewbill;
    const bill=ST.bills.find(b=>String(b.id)===key||b.billNo===key);
    if(bill)_showFullBillPopup(bill);
  }));
  /* Collect payment for walk-in customer */
  document.getElementById("wk_collect_btn")?.addEventListener("click",(e)=>{
    const btn=e.currentTarget;
    const nameKey=btn.dataset.wkname||ST.wkDetailName;
    _openWalkInPayForm(nameKey);
  });
}

function _openWalkInPayForm(shopNameKey){
  const customers=_buildWalkInCustomers();
  const c=customers.find(x=>x.shopName.toLowerCase().trim()===(shopNameKey||"").toLowerCase().trim());
  if(!c)return;
  const balance=c.balance;
  const todayYMD=new Date().toISOString().split("T")[0];
  let wkpMode="cash";
  const div=document.createElement("div");div.className="ovlayer ovs";
  div.innerHTML=`<div class="ovsc as">
    <div style="font-family:'Outfit',sans-serif;font-size:17px;font-weight:800;color:var(--t1);margin-bottom:4px">💳 Payment Lena</div>
    <div style="font-size:12px;color:var(--t3);margin-bottom:14px">🚶 ${esc(c.shopName)} · Baaki: <b style="color:var(--err)">${rup(balance)}</b></div>
    <div style="margin-bottom:11px">
      <label style="font-size:11px;font-weight:700;color:var(--t2);display:block;margin-bottom:5px">💰 Amount *</label>

    </div>
    <div style="margin-bottom:11px">
      <label style="font-size:11px;font-weight:700;color:var(--t2);display:block;margin-bottom:5px">💳 Payment Mode</label>
      <div style="display:flex;gap:7px">
        <div id="wkp_cash" style="flex:1;padding:9px;border-radius:11px;border:2px solid var(--pri);background:var(--priL);text-align:center;cursor:pointer;font-size:12px;font-weight:700;color:var(--pri2)">💵 Cash</div>
        <div id="wkp_upi" style="flex:1;padding:9px;border-radius:11px;border:2px solid rgba(59,130,246,.2);background:rgba(59,130,246,.04);text-align:center;cursor:pointer;font-size:12px;font-weight:700;color:var(--t3)">📱 UPI</div>

      <input id="wkp_date" class="inp" type="date" value="${todayYMD}" max="${todayYMD}">
    </div>
    <div style="margin-bottom:14px">
      <label style="font-size:11px;font-weight:700;color:var(--t2);display:block;margin-bottom:5px">📝 Note</label>
      <input id="wkp_note" class="inp" placeholder="Cash / UPI / Cheque..." value="Payment Received">

    </div>
  </div>`;
  /* Mode toggle */
  const setMode=m=>{
    wkpMode=m;
    ["cash","upi","cheque"].forEach(k=>{
      const el=div.querySelector(`#wkp_${k}`);if(!el)return;
      const active=k===m;
      if(k==="cash"){el.style.borderColor=active?"var(--pri)":"rgba(0,0,0,.1)";el.style.background=active?"var(--priL)":"#fafafa";el.style.color=active?"var(--pri2)":"var(--t3)";}
      else if(k==="upi"){el.style.borderColor=active?"#3B82F6":"rgba(0,0,0,.1)";el.style.background=active?"rgba(59,130,246,.1)":"#fafafa";el.style.color=active?"#2563EB":"var(--t3)";}
      else{el.style.borderColor=active?"#8B5CF6":"rgba(0,0,0,.1)";el.style.background=active?"rgba(139,92,246,.1)":"#fafafa";el.style.color=active?"#7C3AED":"var(--t3)";}
    });
  };
  div.querySelector("#wkp_cash").addEventListener("click",()=>setMode("cash"));
  div.querySelector("#wkp_upi").addEventListener("click",()=>setMode("upi"));
  div.querySelector("#wkp_cheque").addEventListener("click",()=>setMode("cheque"));
  div.addEventListener("click",e=>{if(e.target===div)div.remove();});

    const nowMs=dateStr?(()=>{const [y,m,d]=dateStr.split("-").map(Number);return new Date(y,m-1,d).getTime();})():Date.now();

       Pehle u.paid bhi update hota tha → manUdhari reduce hota tha → aur standaloneCollected
       bhi balance se minus hota tha = double deduction.
       Fix: u.paid mat update karo. standaloneCollected se hi balance reduce hoga.
       u.history mein entry add karo sirf record ke liye (balance calculation mein nahi aayega). */
    ST.udhari=(ST.udhari||[]).map(u=>{

    _showToast("✅ Payment save ho gayi!","#00A650");
  });

}

function _openLedgerPayForm(villageId,shopId){
  const v=getVillage(villageId),s=v?.shops?.find(sh=>sh.id===shopId);
  if(!s)return;
  const balance=getShopBalance(villageId,shopId);
  /* v18: collect pending udhari bills for "Mark as Paid" linkage */
  const pendingBills=ST.bills.filter(b=>b.shopId===shopId&&b.villageId===villageId&&!b.returned&&(b.payment?.udhari||0)>0)
    .filter(b=>{
      /* BUG FIX v91: "Purani udhari payment" entries exclude karo — woh is bill ki udhari nahi hain */
      const used=(ST.customerPayments||[]).filter(p=>String(p.billId)===String(b.id)&&!(p.note&&p.note.startsWith("Purani udhari"))).reduce((s,p)=>s+p.amount,0);
      return used<(b.payment?.udhari||0);
    })
    .sort((a,b2)=>b2.date-a.date).slice(0,8);
  let linkedBillId=null;
  const div=document.createElement("div");div.className="ovs";
  div.innerHTML=`<div class="ovsc as" style="max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch">
    <div style="font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;font-size:17px;font-weight:800;color:var(--t1);margin-bottom:4px">💳 Payment Add Karo</div>
    <div style="font-size:11px;color:var(--t3);margin-bottom:14px">🏪 ${esc(s.name)} · 📍 ${esc(v.name)}</div>
    <div style="background:${balance>0?'rgba(239,68,68,.07)':balance<0?'rgba(0,166,80,.07)':'rgba(0,0,0,.04)'};border:1.5px solid ${balance>0?'rgba(239,68,68,.2)':balance<0?'rgba(0,166,80,.2)':'rgba(0,0,0,.1)'};border-radius:13px;padding:11px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:11px;color:var(--t3);font-weight:600">${balance>0?'Pending Balance':balance<0?'Advance Balance':'Balance'}</span>
      <span style="font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;font-size:18px;font-weight:800;color:${balance>0?'var(--err)':balance<0?'var(--pri)':'var(--t1)'}">${rup(Math.abs(balance))}</span>
    </div>
    ${pendingBills.length>0?`<div class="fg">
      <label class="fl">🔗 Mark as Paid (optional) — kis bill ke liye?</label>
      <div id="cp_billpick_wrap" style="display:flex;flex-direction:column;gap:6px;max-height:160px;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;flex-shrink:0;background:var(--card3);border-radius:11px;padding:7px;border:1.5px solid rgba(0,166,80,.15)">
        ${pendingBills.map(b=>{
          /* BUG FIX v91: exclude "Purani udhari" payments from due calc */
          const used=(ST.customerPayments||[]).filter(p=>String(p.billId)===String(b.id)&&!(p.note&&p.note.startsWith("Purani udhari"))).reduce((s,p)=>s+p.amount,0);
          const due=(b.payment?.udhari||0)-used;
          return`<div class="cp-billpick" data-cpbill="${b.id}" data-cpdue="${due}" style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:9px;background:#fff;border:1.5px solid rgba(0,166,80,.15);cursor:pointer;font-size:11px;flex-shrink:0">
            <div><div style="font-weight:800;color:var(--t1)">${esc(b.billNo)}</div><div style="font-size:9.5px;color:var(--t3);margin-top:1px">${fmtD(b.date)}</div></div>
            <div style="text-align:right"><div style="font-family:'Outfit','Samsung Sans','Roboto','Noto Sans',system-ui,sans-serif;font-weight:800;color:var(--err)">${rup(due)}</div><div style="font-size:9px;color:var(--t3)">due</div></div>
          </div>`;
        }).join("")}
      </div>
      <div style="font-size:9.5px;color:var(--t3);margin-top:4px">Bill chuno toh amount auto fill ho jayegi & link save hoga.</div>
    </div>`:""}
    <div class="fg">
      <label class="fl">💰 Amount (₹) <span id="cp_link_lbl" style="color:var(--pri2);font-weight:800;display:none"></span></label>
      <input class="inp" id="cp_amt" type="number" placeholder="${balance>0?balance:''}" inputmode="numeric" min="0" style="font-size:18px;font-weight:800;color:var(--pri)">
    </div>
    <div class="fg">
      <label class="fl">💳 Payment Mode</label>
      <div style="display:flex;gap:8px">
        <div id="cp_cash" class="rip" style="flex:1;padding:10px;border-radius:12px;border:2px solid var(--pri);background:var(--priL);text-align:center;cursor:pointer;font-size:13px;font-weight:700;color:var(--pri2);transition:all .18s">💵 Cash</div>
        <div id="cp_online" class="rip" style="flex:1;padding:10px;border-radius:12px;border:2px solid rgba(59,130,246,.2);background:rgba(59,130,246,.05);text-align:center;cursor:pointer;font-size:13px;font-weight:700;color:var(--t3);transition:all .18s">📱 Online</div>
      </div>
    </div>
    <div class="fg">
      <label class="fl">📅 Date</label>
      <input class="inp" id="cp_date" type="date" value="${new Date().toISOString().split("T")[0]}">
    </div>
    <div class="fg">
      <label class="fl">📝 Note (optional)</label>
      <input class="inp" id="cp_note" placeholder="e.g. Cash diya, GPay...">
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn b-ghost rip" style="flex:1" id="cp_cancel">Cancel</button>
      <button class="btn b-pri rip" style="flex:1" id="cp_save">✓ Save Payment</button>
    </div>
  </div>`;
  let payMode="cash";
  const setCash=()=>{
    payMode="cash";
    div.querySelector("#cp_cash").style.cssText="flex:1;padding:10px;border-radius:12px;border:2px solid var(--pri);background:var(--priL);text-align:center;cursor:pointer;font-size:13px;font-weight:700;color:var(--pri2);transition:all .18s";
    div.querySelector("#cp_online").style.cssText="flex:1;padding:10px;border-radius:12px;border:2px solid rgba(59,130,246,.2);background:rgba(59,130,246,.05);text-align:center;cursor:pointer;font-size:13px;font-weight:700;color:var(--t3);transition:all .18s";
  };
  const setOnline=()=>{
    payMode="online";
    div.querySelector("#cp_cash").style.cssText="flex:1;padding:10px;border-radius:12px;border:2px solid rgba(0,166,80,.2);background:rgba(0,166,80,.04);text-align:center;cursor:pointer;font-size:13px;font-weight:700;color:var(--t3);transition:all .18s";
    div.querySelector("#cp_online").style.cssText="flex:1;padding:10px;border-radius:12px;border:2px solid #2563EB;background:rgba(59,130,246,.1);text-align:center;cursor:pointer;font-size:13px;font-weight:700;color:#2563EB;transition:all .18s";
  };
  div.querySelector("#cp_cash").addEventListener("click",setCash);
  div.querySelector("#cp_online").addEventListener("click",setOnline);
  /* v18: bill picker click → mark as paid + auto fill amount */
  div.querySelectorAll(".cp-billpick").forEach(el=>el.addEventListener("click",()=>{
    const bid=+el.dataset.cpbill;
    if(linkedBillId===bid){
      linkedBillId=null;
      el.style.borderColor="rgba(0,166,80,.15)";el.style.background="#fff";
      div.querySelector("#cp_link_lbl").style.display="none";
    } else {
      linkedBillId=bid;
      div.querySelectorAll(".cp-billpick").forEach(x=>{x.style.borderColor="rgba(0,166,80,.15)";x.style.background="#fff";});
      el.style.borderColor="var(--pri)";el.style.background="rgba(0,166,80,.08)";
      const due=parseFloat(el.dataset.cpdue)||0;
      const amtEl=div.querySelector("#cp_amt");
      if(amtEl)amtEl.value=due;
      const lbl=div.querySelector("#cp_link_lbl");
      const bill=ST.bills.find(b=>b.id===bid);
      if(lbl&&bill){lbl.style.display="inline";lbl.textContent=` · linked to ${bill.billNo}`;}
    }
  }));
  div.addEventListener("click",e=>{if(e.target===div)div.remove();});
  div.querySelector("#cp_cancel").addEventListener("click",()=>div.remove());
  div.querySelector("#cp_save").addEventListener("click",()=>{
    const amt=Math.abs(parseFloat(div.querySelector("#cp_amt")?.value)||0);
    const note=div.querySelector("#cp_note")?.value?.trim();
    const dateStr=div.querySelector("#cp_date")?.value;
    if(!amt){alert("Amount daalo!");return;}
    /* FIX Bug#22: Parse date as local midnight */
    const dateMs=dateStr?(()=>{const [y,m,d]=dateStr.split("-").map(Number);return new Date(y,m-1,d).getTime();})():Date.now();
    if(!ST.customerPayments)ST.customerPayments=[];
    const _linked=linkedBillId?ST.bills.find(b=>b.id===linkedBillId):null;
    const payNote=note||(_linked?`Mark as Paid: ${_linked.billNo}`:"Payment Received");
    ST.customerPayments.push({
      id:Date.now(),
      villageId,shopId,
      villageName:v.name,shopName:s.name,
      amount:amt,mode:payMode,
      date:dateMs,
      note:payNote,
      billId:linkedBillId||null
    });

    /* v95 SYNC FIX: Khatabook se payment → udhari.paid bhi update karo.
       buildLedger customerPayments se Khatabook balance calculate karta hai — sahi.
       Lekin Udhari tab udhari.paid se balance dikhata hai — isliye dono sync honni chahiye.
       Double deduction nahi hoga kyunki:
         - buildLedger sirf customerPayments count karta hai (udhari.paid nahi)
         - Udhari tab sirf udhari.paid count karta hai
       Dono alag displays hain — dono independently update hone chahiye. */
    if(ST.udhari){
      const _linkedBillForUdhari=linkedBillId?ST.bills.find(b=>b.id===linkedBillId):null;
      let _remainingAmt=amt;
      ST.udhari=ST.udhari.map(x=>{
        if(_remainingAmt<=0)return x;
        /* Match by shopId+villageId */
        const _match=x.shopId===shopId&&x.villageId===villageId&&!x.cleared;
        if(!_match)return x;
        const _currentBal=Math.max(0,(x.amount||0)-(x.paid||0));
        if(_currentBal<=0)return x;
        const _applyAmt=Math.min(_remainingAmt,_currentBal);
        _remainingAmt-=_applyAmt;
        const newPaid=Math.min((x.paid||0)+_applyAmt,x.amount);
        const cleared=newPaid>=x.amount;
        const balAfter=Math.max(0,x.amount-newPaid);
        return{...x,paid:newPaid,cleared,
          clearedDate:cleared?(x.clearedDate||dateMs):x.clearedDate,
          history:[...(x.history||[]),{type:"pay",amount:_applyAmt,date:dateMs,note:payNote,mode:payMode,balAfter}]};
      });
    }

    dbSave();

/* Reverse stock + udhari + customerPayment links for one bill (used by edit/delete).
   NOTE: returned bills already had stock restored — skip stock/udhari reversal for them. */
function _reverseBillEffects(b){
  if(!b)return;
  if(b.returned){
    /* For returned bills — stock was already restored when returned.
       But stock.returned counter AND vehicle stock.sold (which _doReturnBill decremented) need cleanup. */
    const _ritems=b.items||[];
    const _vkr=b.vehicleKey||ST.activeVehicle||"v1";
    /* Clean ST.stock.returned counter */
    if(ST.stock&&ST.stock.returned){
      _ritems.forEach(it=>{
        ST.stock.returned[it.id]=Math.max(0,(ST.stock.returned[it.id]||0)-it.boxQty);
      });
    }
    if(b.schemeApplied&&b.freeProduct&&ST.stock?.returned){
      ST.stock.returned[b.freeProduct.id]=Math.max(0,(ST.stock.returned[b.freeProduct.id]||0)-b.freeProduct.boxQty);
    }
    /* _doReturnBill decremented vehicle stock.sold — but the bill is now fully gone,
       so we must re-add those sold counts back (the sale is being un-done entirely) */
    if(ST.vehicles[_vkr]?.stock?.sold){
      _ritems.forEach(it=>{
        /* _doReturnBill already subtracted these from sold; deleting returned bill means
           the return itself is undone → net effect: sale never happened → sold stays at 0 for this bill.
           _doReturnBill already set sold[id] -= qty, so no further change needed here. */
      });
    }
    /* Remove the credit entry _doReturnBill added (billId:null, note has billNo) */
    if(ST.customerPayments){
      ST.customerPayments=ST.customerPayments.filter(p=>
        !(p.billId===null&&p.note&&p.note==="Bill Return — "+b.billNo&&p.villageId===b.villageId&&p.shopId===b.shopId)
      );
    }
    return;
  }
  /* Stock — restore product stock */
  const _items=b.items||[];
  ST.products=ST.products.map(p=>{
    const it=_items.find(i=>i.id===p.id);
    return it?{...p,stock:(p.stock||0)+it.boxQty}:p;
  });
  /* Global sold counter */
  if(ST.stock&&ST.stock.sold){
    _items.forEach(it=>{
      ST.stock.sold[it.id]=Math.max(0,(ST.stock.sold[it.id]||0)-it.boxQty);
    });
  }
  /* Vehicle sold counter — use stored vehicleKey if available, else activeVehicle */
  const vk=b.vehicleKey||ST.activeVehicle||"v1";
  if(ST.vehicles[vk]?.stock?.sold){
    _items.forEach(it=>{
      ST.vehicles[vk].stock.sold[it.id]=Math.max(0,(ST.vehicles[vk].stock.sold[it.id]||0)-it.boxQty);
    });
  }
  /* FIX: Also restore free product stock on edit/delete */
  if(b.schemeApplied&&b.freeProduct){
    const fp=b.freeProduct;
    ST.products=ST.products.map(p=>p.id===fp.id?{...p,stock:(p.stock||0)+fp.boxQty}:p);
    if(ST.stock?.sold)ST.stock.sold[fp.id]=Math.max(0,(ST.stock.sold[fp.id]||0)-fp.boxQty);
    if(ST.vehicles[vk]?.stock?.sold)
      ST.vehicles[vk].stock.sold[fp.id]=Math.max(0,(ST.vehicles[vk].stock.sold[fp.id]||0)-fp.boxQty);
  }
  /* Udhari reversal */
  const ud=b.payment?.udhari||0;
  if(ud>0){
    const ex=b.shopId
      ? (ST.udhari.find(u=>u.shopId===b.shopId&&u.villageId===b.villageId&&!u.cleared) ||
         ST.udhari.find(u=>u.shopId===b.shopId&&u.villageId===b.villageId))
      : (ST.udhari.find(u=>u.shopName.toLowerCase().trim()===b.shopName.toLowerCase().trim()&&!u.cleared) ||
         ST.udhari.find(u=>u.shopName.toLowerCase().trim()===b.shopName.toLowerCase().trim()));
    if(ex){
      /* BUG FIX v91: Sirf aaj ke bill ki direct payments reverse karo.
         "Purani udhari payment" entries alag udhari entry ka hissa hain — yahan nahi aayengi.
         Note filter: "Payment saath" ya "advance" wali entries = aaj ke bill ki payments. */
      const billDirectPayAmt=(ST.customerPayments||[])
        .filter(p=>String(p.billId)===String(b.id)&&!(p.note&&p.note.startsWith("Purani udhari")))
        .reduce((s,p)=>s+p.amount,0);
      ex.amount=Math.max(0,ex.amount-ud);
      ex.paid=Math.max(0,(ex.paid||0)-billDirectPayAmt);
      if(ex.history)ex.history=ex.history.filter(h=>!(h.type==="bill"&&h.billNo===b.billNo));
      /* Re-evaluate cleared status */
      if(ex.amount<=0){ex.cleared=true;ex.amount=0;ex.paid=0;}
      else if(ex.paid<ex.amount)ex.cleared=false;
    }
  }
  /* Reverse prevUdhari payment separately — restore the udhari.paid that was reduced */
  const prevUdPaid=b.payment?.prevUdhari||0;
  const totalPaidB=(b.payment?.cash||0)+(b.payment?.upi||0);
  if(prevUdPaid>0&&totalPaidB>0){
    const payForPrev=Math.min(totalPaidB,prevUdPaid);
    const prevEx=b.shopId
      ? ST.udhari.find(u=>u.shopId===b.shopId&&u.villageId===b.villageId)
      : ST.udhari.find(u=>u.shopName.toLowerCase().trim()===b.shopName.toLowerCase().trim());
    if(prevEx&&payForPrev>0){
      prevEx.paid=Math.max(0,(prevEx.paid||0)-payForPrev);
      if(prevEx.paid<prevEx.amount)prevEx.cleared=false;
    }
  }
  /* Remove customerPayments linked to this bill */
  if(ST.customerPayments){
    ST.customerPayments=ST.customerPayments.filter(p=>String(p.billId)!==String(b.id));
  }
  /* Fix walkingCustomers billCount on walk-in bill delete */
  if(b.walkIn&&b.shopName){
    const wc=(ST.walkingCustomers||[]).find(c=>c.shopName.toLowerCase().trim()===b.shopName.toLowerCase().trim());
    if(wc){wc.billCount=Math.max(0,(wc.billCount||1)-1);}
  }
}

/* Calculate single-bill profit using current product purchaseRate */
function _calcBillProfit(b){
  if(!b||!b.items)return 0;
  /* BUG FIX v57: Discount ko profit mein consider karo.
     Pehle: sellPrice = it.boxPrice (original, before discount) → profit overstated tha.
     Fix: discount factor apply karo proportionally har item pe.
     discountFactor = discountedBill / purchaseTotal (e.g. 10% discount → factor=0.9) */
  const discountFactor=(()=>{
    const tot=b.purchaseTotal||0;
    const disc=b.payment?.discountedBill;
    if(!disc||tot<=0)return 1;
    return disc/tot;
  })();
  const itemProfit=b.items.reduce((s,it)=>{
    const p=ST.products.find(x=>x.id===it.id);
    const pr=p?.purchaseRate||0;
    /* FIX: always use it.boxPrice (price at time of billing), not current product price */
    /* Apply discount factor so actual realized price is used for profit */
    const sellPrice=(it.boxPrice||0)*discountFactor;
    return s+(sellPrice-pr)*it.boxQty;
  },0);
  /* FIX: Also subtract free product purchase cost */
  const freeCost=(()=>{
    if(!b.schemeApplied||!b.freeProduct)return 0;
    const fp=ST.products.find(p=>p.id===b.freeProduct.id);
    return (fp?.purchaseRate||0)*b.freeProduct.boxQty;
  })();
  return itemProfit-freeCost;
}

/* Delete a single bill — confirm + reverse + remove */
function _doDeleteBill(billId){
  const b=ST.bills.find(x=>String(x.id)===String(billId));if(!b)return;
  _styledConfirm({
    icon:"🗑️",
    title:"Bill Delete Karo?",
    msg:`<b>${esc(b.billNo)}</b> · ${esc(b.shopName)}<br><span style="color:var(--err);font-weight:800">${rup(b.purchaseTotal)}</span> ka bill Recycling Bin mein jaayega. Stock, udhari aur profit reverse honge.<br><br><span style="color:var(--t3);font-size:11px;font-weight:700">♻️ Recycling Bin se restore bhi kar sakte ho.</span>`,
    okText:"Haan, Delete",okClass:"danger",
    onYes:()=>{
      /* Re-fetch fresh reference in case array changed between confirm open & yes-click */
      const fresh=ST.bills.find(x=>String(x.id)===String(billId));
      if(!fresh)return;
      _reverseBillEffects(fresh);
      ST.bills=ST.bills.filter(x=>String(x.id)!==String(billId));
      if(!ST.deletedBills)ST.deletedBills=[];
      ST.deletedBills.push({...fresh, deletedAt:Date.now()});
      dbSave();render();
      _showToast(`🗑️ ${fresh.billNo} Recycling Bin mein gaya`,"#EF4444");
    }
  });
}

/* Bulk delete — accepts array of bill ids/billNos as strings */
function _doBulkDeleteBills(keys){
  const bills=keys.map(k=>ST.bills.find(b=>String(b.id)===k||b.billNo===k)).filter(Boolean);
  if(bills.length===0)return;
  const total=bills.reduce((s,b)=>s+(b.purchaseTotal||0),0);
  _styledConfirm({
    icon:"🗑️",
    title:`${bills.length} Bills Delete Karo?`,
    msg:`Total <b style="color:var(--err)">${rup(total)}</b> ke <b>${bills.length}</b> bills Recycling Bin mein jayenge. Stock, udhari aur profit sab reverse honge.<br><br><span style="color:var(--t3);font-size:11px;font-weight:700">♻️ Recycling Bin se restore bhi kar sakte ho.</span>`,
    okText:`Haan, ${bills.length} Delete`,okClass:"danger",
    onYes:()=>{
      /* Re-fetch fresh references to guard against stale state */
      const freshBills=keys.map(k=>ST.bills.find(b=>String(b.id)===k||b.billNo===k)).filter(Boolean);
      if(freshBills.length===0)return;
      freshBills.forEach(b=>_reverseBillEffects(b));
      const idSet=new Set(freshBills.map(b=>String(b.id)));
      ST.bills=ST.bills.filter(b=>!idSet.has(String(b.id)));
      if(!ST.deletedBills)ST.deletedBills=[];
      const now=Date.now();
      const existingBinIds=new Set(ST.deletedBills.map(b=>String(b.id)));
      freshBills.forEach(b=>{
        if(!existingBinIds.has(String(b.id))){
          ST.deletedBills.push({...b, deletedAt:now});
        }
      });
      ST.historyBulk=false;ST.historySelected=[];
      dbSave();render();
      _showToast(`🗑️ ${freshBills.length} bills Recycling Bin mein gaye`,"#EF4444");
    }
  });
}

/* Edit a bill — confirm, reverse, prefill cart, jump to billing */
function _doEditBill(b){
  if(!b)return;
  const billId=b.id;
  _styledConfirm({
    icon:"✎",
    title:"Bill Edit Karo?",
    msg:`<b>${esc(b.billNo)}</b> · ${esc(b.shopName)}<br>Yeh bill hata diya jaayega aur cart mein items load ho jayenge. Items badal ke phir <b>Save Bill</b> dabao — naya bill ban jaayega.`,
    okText:"Haan, Edit",okClass:"",
    onYes:()=>{
      /* BUG FIX v85: Re-fetch using String comparison — type-safe */
      const fresh=ST.bills.find(x=>String(x.id)===String(billId));
      if(!fresh){_showToast("⚠️ Bill nahi mili — reload karo","#EF4444");return;}
      /* BUG FIX v85: Deep-clone before removing — agar kuch fail ho to restore kar sako */
      const billBackup=JSON.parse(JSON.stringify(fresh));
      try{
        _reverseBillEffects(fresh);
        ST.bills=ST.bills.filter(x=>String(x.id)!==String(billId));
        /* prefill cart */
        ST.cart={};
        ST.sessionPrices={}; /* Clear stale session prices from any previous bill */
        (fresh.items||[]).forEach(it=>{
          ST.cart[it.id]=it.boxQty;
          /* Restore session price override if bill was saved with a non-default price */
          const prod=ST.products.find(p=>p.id===it.id);
          if(prod&&it.boxPrice!==prod.boxPrice){
            ST.sessionPrices[it.id]=it.boxPrice;
          }
        });
        if(fresh.walkIn){
          ST.walkMode=true;
          ST.walkShopName=fresh.shopName||"";
          ST.walkMobile=fresh.shopMobile||"";
          ST.selVillageId=null;ST.selShopId=null;
        } else {
          ST.selVillageId=fresh.villageId;
          ST.selShopId=fresh.shopId;
        }
        /* BUG FIX v85: Store original billNo for reference */
        ST._editingOrigBillNo=fresh.billNo;
        ST.tab="billing";
        dbSave();render();
        _showToast("✎ Edit mode — items badal ke Save karo","#2563EB");
      } catch(err){
        /* BUG FIX v85: Error hua — bill wapas restore karo taaki data loss na ho */
        console.error("Edit bill error:",err);
        const alreadyGone=!ST.bills.find(x=>String(x.id)===String(billId));
        if(alreadyGone) ST.bills.push(billBackup);
        _showToast("⚠️ Edit mein error — bill restore ho gaya, dobara try karo","#EF4444");
        dbSave();render();
      }
    }
  });
}

/* ══════════════════════════════════════════════════════════════════
   PDF EXPORT — jsPDF based, works in Android WebView + Browser both
   window.print() NAHI use karta — WebView mein kaam nahi karta
   ══════════════════════════════════════════════════════════════════ */

/* Load jsPDF from CDN — ek baar load hota hai */
function _loadJsPDF(){
  return new Promise((resolve,reject)=>{
    if(window.jspdf&&window.jspdf.jsPDF){resolve(window.jspdf.jsPDF);return;}
    if(window._jspdfLoading){
      let waited=0;
      const check=setInterval(()=>{
        waited+=100;
        if(window.jspdf&&window.jspdf.jsPDF){clearInterval(check);resolve(window.jspdf.jsPDF);return;}
        /* FIX: timeout after 10s so we don't poll forever on load failure */
        if(waited>10000){clearInterval(check);window._jspdfLoading=false;reject(new Error("jsPDF load timeout"));}
      },100);
      return;
    }
    window._jspdfLoading=true;
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
    s.onload=()=>{window._jspdfLoading=false;resolve(window.jspdf.jsPDF);};
    s.onerror=()=>{window._jspdfLoading=false;reject(new Error("jsPDF load nahi hua — internet check karo"));};
    document.head.appendChild(s);
  });
}

/* Show loading toast while PDF generates */
function _pdfLoading(msg){
  const d=document.createElement("div");
  d.id="pdf_loading_toast";
  d.style.cssText="position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1e40af;color:#fff;padding:12px 22px;border-radius:12px;font-size:13px;font-weight:700;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3);white-space:nowrap";
  d.textContent=msg||"📄 PDF ban raha hai...";
  document.body.appendChild(d);
  return d;
}
